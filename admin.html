<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Staff | Arcadia Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:italic,wght@0,300;1,300&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body { background:#0a0a0a; color:white; font-family:'Montserrat'; }
        .glass { background:#111; border:1px solid rgba(255,255,255,0.05); border-radius:15px; }
        .input-staff { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); padding:10px; border-radius:5px; color:white; font-size:12px; }
        #mainContent { display:none; }
    </style>
</head>
<body class="p-6">

    <div id="mainContent" class="authorized">
        <header class="flex justify-between items-center mb-10 border-b border-white/10 pb-6">
            <h1 class="font-serif text-4xl italic">Staff Control Panel</h1>
            <div class="flex gap-4">
                <a href="index.html" class="text-xs uppercase tracking-widest bg-white/10 px-4 py-2 rounded">Site Live</a>
                <button onclick="sessionStorage.clear(); location.reload();" class="text-xs uppercase tracking-widest bg-red-900/20 text-red-500 px-4 py-2 rounded">Déconnexion</button>
            </div>
        </header>

        <div class="grid lg:grid-cols-3 gap-8">
            
            <div class="glass p-6">
                <h2 class="text-gold uppercase text-[10px] tracking-[4px] mb-6">Ajouter un Bien / Article</h2>
                <input type="text" id="bTitle" placeholder="Titre" class="input-staff w-full mb-3">
                <input type="text" id="bPrice" placeholder="Prix" class="input-staff w-full mb-3">
                <select id="bCat" class="input-staff w-full mb-3">
                    <option value="Villa">Villa</option>
                    <option value="Article">Article Blog</option>
                    <option value="Service">Service</option>
                </select>
                <textarea id="bDesc" placeholder="Description" class="input-staff w-full h-24 mb-3"></textarea>
                <input type="file" id="bFiles" class="text-[10px] mb-4" multiple>
                <button id="btnPublish" class="w-full bg-gold text-black font-bold p-3 rounded uppercase text-[10px]">Publier</button>
            </div>

            <div class="lg:col-span-2 glass p-6">
                <h2 class="text-gold uppercase text-[10px] tracking-[4px] mb-6">Commandes Clients & Visualisation</h2>
                <div id="orderList" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        if(sessionStorage.getItem('arcadia_auth') === 'true') {
            document.getElementById('mainContent').style.display = 'block';
        } else {
            let p = prompt("Clé d'accès :");
            if(p === "Immo30") { sessionStorage.setItem('arcadia_auth', 'true'); location.reload(); }
        }

        // --- GESTION COMMANDES ---
        onValue(ref(db, 'orders'), (snap) => {
            const orders = snap.val();
            const container = document.getElementById('orderList');
            if(!orders) { container.innerHTML = "Aucun message."; return; }

            let html = "";
            Object.entries(orders).reverse().forEach(([id, ord]) => {
                html += `
                <div class="bg-white/5 p-4 rounded-lg border border-white/10 flex flex-col md:flex-row justify-between gap-4">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="bg-gold text-black text-[8px] font-bold px-2 py-0.5 rounded">${ord.status}</span>
                            <span class="text-xs font-bold">${ord.prenom} ${ord.nom}</span>
                            <span class="text-[10px] opacity-40">— ${ord.tel}</span>
                        </div>
                        <p class="text-sm italic text-white/80">"Commande de ${ord.service} pour ${ord.prix}"</p>
                        <p class="text-[9px] opacity-30 mt-2">Reçu le : ${ord.date}</p>
                    </div>
                    <div class="flex flex-col gap-2 min-w-[200px]">
                        <select onchange="reply('${id}', this.value)" class="input-staff text-[10px]">
                            <option>Réponse rapide...</option>
                            <option value="Demande acceptée, un agent va vous appeler.">Accepter</option>
                            <option value="Désolé, ce service est indisponible actuellement.">Refuser</option>
                            <option value="Votre rendez-vous est fixé pour demain 14h.">RDV Demain</option>
                        </select>
                        <button onclick="delOrder('${id}')" class="text-[9px] uppercase text-red-500 hover:bg-red-500/10 p-2 rounded">Supprimer</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        });

        window.reply = (id, msg) => {
            if(msg === "Réponse rapide...") return;
            alert("Réponse simulée envoyée au client : " + msg);
            update(ref(db, `orders/${id}`), { status: 'Traité' });
        };

        window.delOrder = (id) => { if(confirm("Supprimer ce message ?")) remove(ref(db, `orders/${id}`)); };

        // --- LOGIQUE PUBLICATION (Similaire à avant) ---
        let currentImgs = [];
        document.getElementById('bFiles').onchange = (e) => {
            currentImgs = [];
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader(); r.onload = ev => currentImgs.push(ev.target.result);
                r.readAsDataURL(f);
            });
        };

        document.getElementById('btnPublish').onclick = () => {
            const data = {
                title: document.getElementById('bTitle').value,
                price: document.getElementById('bPrice').value,
                cat: document.getElementById('bCat').value,
                desc: document.getElementById('bDesc').value,
                images: currentImgs
            };
            push(ref(db, 'listings'), data).then(() => { alert("Publié !"); location.reload(); });
        };
    </script>
</body>
</html>
