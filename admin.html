<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Arcadia Staff | Management Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background:#050505; color:white; font-family:'Montserrat', sans-serif; }
        .glass { background:#111; border:1px solid rgba(255,255,255,0.05); border-radius:15px; }
        .input-staff { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1); padding:12px; border-radius:8px; color:white; width:100%; margin-bottom:10px; font-size:12px; transition: 0.3s; }
        .input-staff:focus { border-color: #b38e44; background: rgba(255,255,255,0.08); outline: none; }
        .btn-gold { background:#b38e44; color:black; font-weight:bold; padding:12px; border-radius:8px; text-transform:uppercase; font-size:10px; width:100%; transition: 0.3s; }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(179, 142, 68, 0.3); }
        #mainContent { display:none; }
        .last-reply { font-size: 10px; color: #b38e44; margin-top: 8px; border-top: 1px solid rgba(179, 142, 68, 0.1); padding-top: 6px; }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="mainContent" class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 border-b border-white/10 pb-8">
            <div>
                <h1 class="text-3xl font-serif italic text-gold" style="font-family: serif;">Arcadia Staff Suite</h1>
                <p class="text-[10px] opacity-40 tracking-[3px] uppercase mt-1">Gestion de l'empire immobilier</p>
            </div>
            
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-3 bg-white/5 p-3 rounded-xl border border-white/10">
                    <span class="text-[9px] uppercase tracking-widest opacity-60">État Studio :</span>
                    <button id="statusToggle" class="badge bg-green-500/20 text-green-500 border border-green-500/50">Ouvert</button>
                </div>
                <button onclick="sessionStorage.clear(); location.reload();" class="text-[10px] text-red-500 border border-red-500/20 px-4 py-2 rounded-lg hover:bg-red-500/10 transition-all">Quitter</button>
            </div>
        </header>

        <div class="grid lg:grid-cols-4 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="glass p-6">
                    <h3 class="text-gold text-[10px] uppercase mb-6 font-bold tracking-widest border-b border-gold/10 pb-2">Nouveau Bien</h3>
                    
                    <input type="text" id="bTitle" placeholder="Nom du bien (ex: Villa Del Perro)" class="input-staff">
                    <input type="text" id="bPrice" placeholder="Prix (ex: 2 500 000 €)" class="input-staff">
                    
                    <select id="bCat" class="input-staff">
                        <option value="Villa">Villa de Luxe</option>
                        <option value="Manoir">Manoir</option>
                        <option value="Appartement">Appartement</option>
                        <option value="Service">Service / Sécurité</option>
                        <option value="Entreprise">Extension Entreprise</option>
                    </select>

                    <div class="mt-4">
                        <label class="text-[9px] opacity-40 uppercase block mb-2">Photos du bien</label>
                        <input type="file" id="bFiles" class="text-[10px] mb-4 block w-full file:bg-white/10 file:text-white file:border-0 file:px-3 file:py-1 file:rounded file:mr-4 cursor-pointer" multiple>
                        <div id="imgPreview" class="grid grid-cols-3 gap-2 mb-4"></div>
                    </div>

                    <button id="btnPublish" class="btn-gold">Mettre en vente</button>
                </div>

                <div class="glass p-6">
                    <h3 class="text-white/40 text-[9px] uppercase tracking-widest mb-4">Activité</h3>
                    <div class="space-y-4">
                        <div>
                            <p class="text-2xl font-light" id="statOrders">0</p>
                            <p class="text-[9px] opacity-40 uppercase">Demandes totales</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="glass p-8">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-gold text-[10px] uppercase font-bold tracking-widest">Flux des demandes clients</h3>
                        <span class="text-[10px] opacity-30">Mise à jour en direct</span>
                    </div>
                    
                    <div id="orderContainer" class="space-y-4">
                        <p class="text-center py-10 opacity-20 italic">Aucune demande dans le flux...</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- AUTHENTIFICATION ---
        if(sessionStorage.getItem('arcadia_auth') === 'true') {
            document.getElementById('mainContent').style.display = 'block';
        } else {
            let pass = prompt("Code d'accès Staff :");
            if(pass === "Immo30") { 
                sessionStorage.setItem('arcadia_auth', 'true'); 
                location.reload(); 
            } else {
                alert("Accès refusé.");
                window.location.href = "index.html";
            }
        }

        // --- GESTION ÉTAT STUDIO ---
        const statusBtn = document.getElementById('statusToggle');
        onValue(ref(db, 'studioStatus'), (snap) => {
            const isOpen = snap.val();
            statusBtn.innerText = isOpen ? "Ouvert" : "Fermé";
            statusBtn.className = isOpen ? "badge bg-green-500/20 text-green-500 border border-green-500/50" : "badge bg-red-500/20 text-red-500 border border-red-500/50";
        });

        statusBtn.onclick = () => {
            const current = statusBtn.innerText === "Ouvert";
            set(ref(db, 'studioStatus'), !current);
        };

        // --- FLUX DES COMMANDES ---
        onValue(ref(db, 'orders'), (snap) => {
            const data = snap.val();
            const container = document.getElementById('orderContainer');
            document.getElementById('statOrders').innerText = data ? Object.keys(data).length : 0;

            if(!data) { container.innerHTML = "<p class='text-center py-10 opacity-20'>Le flux est vide.</p>"; return; }
            
            let html = "";
            Object.entries(data).reverse().forEach(([id, ord]) => {
                const isNew = ord.status === 'En attente';
                html += `
                <div class="bg-white/5 p-6 rounded-2xl border ${isNew ? 'border-gold/30' : 'border-white/5'} flex flex-col md:flex-row justify-between items-center gap-6 transition-all hover:bg-white/[0.07]">
                    <div class="flex-1 w-full">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="badge ${isNew ? 'bg-gold text-black' : 'bg-white/10 text-white/40'}">${ord.status}</span>
                            <h4 class="font-bold text-sm">${ord.prenom} ${ord.nom}</h4>
                            <span class="text-[10px] font-mono opacity-40">Tél: ${ord.tel}</span>
                        </div>
                        <p class="text-xs text-white/70 italic">Souhaite acquérir : <span class="text-gold font-medium">${ord.service}</span> (${ord.prix})</p>
                        ${ord.reponseStaff ? `<div class="last-reply"><b>Dernière réponse :</b> ${ord.reponseStaff}</div>` : ""}
                        <p class="text-[8px] opacity-20 uppercase mt-4 tracking-widest">${ord.date}</p>
                    </div>

                    <div class="flex flex-col gap-2 w-full md:w-48">
                        <select onchange="replyOrder('${id}', this.value)" class="input-staff !mb-0 text-[10px]">
                            <option>Action rapide...</option>
                            <option value="✅ Demande acceptée. Un agent vous contactera en ville sous peu.">Accepter</option>
                            <option value="❌ Demande refusée. Nous ne pouvons honorer cette requête pour le moment.">Refuser</option>
                            <option value="📅 RDV fixé. Merci de vous présenter au Studio Arcadia.">Fixer RDV</option>
                            <option value="⚠️ Dossier incomplet. Merci de repasser au studio.">Incomplet</option>
                        </select>
                        <button onclick="deleteOrder('${id}')" class="text-[9px] text-red-500/50 hover:text-red-500 uppercase tracking-tighter transition-colors">Supprimer l'archive</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        });

        window.replyOrder = (id, text) => {
            if(text.includes("Action")) return;
            update(ref(db, `orders/${id}`), { 
                status: 'Répondu', 
                reponseStaff: text 
            });
        };

        window.deleteOrder = (id) => {
            if(confirm("Voulez-vous vraiment supprimer définitivement ce dossier client ?")) {
                remove(ref(db, `orders/${id}`));
            }
        };

        // --- LOGIQUE PUBLICATION BIENS ---
        let currentImgs = [];
        document.getElementById('bFiles').onchange = (e) => {
            currentImgs = [];
            const preview = document.getElementById('imgPreview');
            preview.innerHTML = "";
            
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader(); 
                r.onload = ev => {
                    currentImgs.push(ev.target.result);
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    img.className = "h-12 w-12 object-cover rounded border border-white/10";
                    preview.appendChild(img);
                };
                r.readAsDataURL(f);
            });
        };

        document.getElementById('btnPublish').onclick = () => {
            const title = document.getElementById('bTitle').value;
            const price = document.getElementById('bPrice').value;
            const cat = document.getElementById('bCat').value;

            if(!title || currentImgs.length === 0) return alert("Le titre et au moins une image sont obligatoires.");

            const val = {
                title,
                price,
                cat,
                images: currentImgs,
                date: new Date().toLocaleString('fr-FR')
            };

            push(ref(db, 'listings'), val).then(() => {
                alert("Bien publié avec succès !");
                location.reload();
            });
        };
    </script>
</body>
</html>
