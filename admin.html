<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Studio | Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #b38e44; --dark: #0a0a0a; --panel: #111111; }
        * { transition: all 0.25s ease; cursor: crosshair; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; overflow-x: hidden; min-height: 100vh; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }

        /* Login Screen Overlay */
        #loginOverlay {
            position: fixed; inset: 0; background: var(--dark); z-index: 9999;
            display: flex; flex-col; justify-content: center; align-items: center;
        }

        .input-pro { 
            width: 100%; border: 1px solid rgba(255,255,255,0.1); padding: 14px; 
            border-radius: 8px; outline: none; margin-bottom: 15px; font-size: 13px; 
            background: rgba(255,255,255,0.03); color: white;
        }
        .input-pro:focus { border-color: var(--gold); background: rgba(255,255,255,0.07); }
        
        .btn-gold { 
            background: var(--gold); color: black; font-weight: 700;
            text-transform: uppercase; letter-spacing: 2px; font-size: 10px;
            padding: 12px 30px; border-radius: 4px;
        }

        .glass-panel { background: var(--panel); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; }
        
        /* Hide content initially */
        #mainContent { display: none; }
        #mainContent.authorized { display: block; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="text-center p-10 glass-panel max-w-sm w-full border border-gold/20">
            <h1 class="font-serif text-4xl italic mb-2 text-gold">Arcadia</h1>
            <p class="text-[10px] tracking-[5px] uppercase opacity-50 mb-8">Espace Réservé</p>
            <input type="password" id="passInput" placeholder="Clé d'accès" class="input-pro text-center">
            <button onclick="checkPass()" class="btn-gold w-full">Entrer dans le Studio</button>
            <p id="errorMsg" class="text-red-500 text-[10px] mt-4 opacity-0 uppercase tracking-widest">Accès Refusé</p>
        </div>
    </div>

    <div id="mainContent">
        <section class="h-40 flex items-center justify-center relative overflow-hidden border-b border-gold/20">
            <div class="relative text-center z-10">
                <h1 class="font-serif text-5xl italic">Management Suite</h1>
                <button onclick="logout()" class="text-[9px] uppercase tracking-[3px] text-gold mt-2 opacity-50 hover:opacity-100">Déconnexion</button>
            </div>
        </section>

        <div class="max-w-7xl mx-auto px-6 py-10 grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div class="glass-panel p-8">
                <h3 class="font-serif text-2xl italic mb-6 border-b border-white/5 pb-4">Nouvelle Propriété</h3>
                <input type="hidden" id="edit_id_bien">
                <input type="text" id="bTitle" placeholder="Nom du bien" class="input-pro">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="bPrice" placeholder="Prix" class="input-pro">
                    <select id="bCat" class="input-pro">
                        <option value="Villa">Villa</option>
                        <option value="Penthouse">Penthouse</option>
                        <option value="Manoir">Manoir</option>
                    </select>
                </div>
                <textarea id="bDesc" placeholder="Description..." class="input-pro h-32"></textarea>
                <input type="file" id="bFiles" class="text-xs mb-4" multiple>
                <div id="bImgGrid" class="grid grid-cols-4 gap-2 mb-6"></div>
                <button id="btnPublish" class="btn-gold w-full">Enregistrer le bien</button>
            </div>

            <div>
                <h3 class="text-[10px] font-bold uppercase tracking-[4px] mb-6 opacity-40 italic">Catalogue Actuel</h3>
                <div id="listBiensAdmin" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- MOT DE PASSE ---
        const MASTER_PASS = "Immo30"; // MODIFIE TON MOT DE PASSE ICI

        window.checkPass = () => {
            const val = document.getElementById('passInput').value;
            if(val === MASTER_PASS) {
                sessionStorage.setItem('arcadia_auth', 'true');
                showAdmin();
            } else {
                document.getElementById('errorMsg').style.opacity = "1";
            }
        };

        function showAdmin() {
            if(sessionStorage.getItem('arcadia_auth') === 'true') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').classList.add('authorized');
            }
        }

        window.logout = () => {
            sessionStorage.removeItem('arcadia_auth');
            location.reload();
        };

        // Garder la session au rafraîchissement
        showAdmin();

        // --- LOGIQUE FIREBASE ---
        let currentImgs = [];
        const get = id => document.getElementById(id);

        get('bFiles').onchange = (e) => {
            currentImgs = []; get('bImgGrid').innerHTML = "";
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader(); r.onload = ev => {
                    currentImgs.push(ev.target.result);
                    get('bImgGrid').innerHTML += `<img src="${ev.target.result}" class="w-full aspect-square object-cover rounded">`;
                }; r.readAsDataURL(f);
            });
        };

        get('btnPublish').onclick = () => {
            const id = get('edit_id_bien').value;
            const data = {
                title: get('bTitle').value, price: get('bPrice').value,
                cat: get('bCat').value, desc: get('bDesc').value,
                images: currentImgs, date: Date.now()
            };
            if(id) update(ref(db, `listings/${id}`), data).then(() => location.reload());
            else push(ref(db, 'listings'), data).then(() => location.reload());
        };

        onValue(ref(db, 'listings'), (snap) => {
            let html = "";
            if(snap.val()) Object.entries(snap.val()).reverse().forEach(([id, it]) => {
                html += `
                <div class="glass-panel p-4 flex items-center justify-between border-l border-gold">
                    <div class="flex items-center gap-4">
                        <img src="${it.images[0]}" class="w-10 h-10 rounded object-cover">
                        <span class="text-[10px] font-bold uppercase">${it.title}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="del('${id}')" class="text-red-500 text-[9px] uppercase tracking-widest px-2 py-1 border border-red-900/20">Suppr</button>
                    </div>
                </div>`;
            });
            get('listBiensAdmin').innerHTML = html;
        });

        window.del = (id) => { if(confirm("Supprimer ?")) remove(ref(db, `listings/${id}`)); };

    </script>
</body>
</html>
