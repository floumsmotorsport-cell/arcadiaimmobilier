<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Arcadia Staff | Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background:#0a0a0a; color:white; font-family:'Montserrat', sans-serif; }
        .glass { background:#111; border:1px solid rgba(255,255,255,0.05); border-radius:15px; }
        .input-staff { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); padding:10px; border-radius:8px; color:white; width:100%; margin-bottom:10px; font-size:12px; }
        .btn-gold { background:#b38e44; color:black; font-weight:bold; padding:10px; border-radius:5px; text-transform:uppercase; font-size:10px; width:100%; }
        #mainContent { display:none; }
        .last-reply { font-size: 10px; color: #b38e44; margin-top: 8px; border-top: 1px solid rgba(179, 142, 68, 0.2); padding-top: 4px; }
    </style>
</head>
<body class="p-8">

    <div id="mainContent">
        <header class="flex justify-between items-center mb-12 border-b border-white/10 pb-6">
            <h1 class="text-3xl font-serif italic">Arcadia Staff Suite</h1>
            <button onclick="sessionStorage.clear(); location.reload();" class="text-[10px] text-red-500">Quitter</button>
        </header>

        <div class="grid lg:grid-cols-3 gap-10">
            <div class="glass p-6 h-fit">
                <h3 class="text-gold text-[10px] uppercase mb-6 font-bold tracking-widest">Nouveau Bien</h3>
                <input type="text" id="bTitle" placeholder="Titre" class="input-staff">
                <input type="text" id="bPrice" placeholder="Prix" class="input-staff">
                <select id="bCat" class="input-staff">
                    <option value="Villa">Villa</option>
                    <option value="Service">Service</option>
                </select>
                <input type="file" id="bFiles" class="text-[10px] mb-4" multiple>
                <button id="btnPublish" class="btn-gold">Publier</button>
            </div>

            <div class="lg:col-span-2 glass p-6">
                <h3 class="text-gold text-[10px] uppercase mb-6 font-bold tracking-widest">Demandes Clients</h3>
                <div id="orderContainer" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        if(sessionStorage.getItem('arcadia_auth') === 'true') {
            document.getElementById('mainContent').style.display = 'block';
        } else {
            if(prompt("Code Staff :") === "Immo30") { sessionStorage.setItem('arcadia_auth', 'true'); location.reload(); }
        }

        onValue(ref(db, 'orders'), (snap) => {
            const data = snap.val();
            const container = document.getElementById('orderContainer');
            if(!data) { container.innerHTML = "Aucune demande."; return; }
            let html = "";
            Object.entries(data).reverse().forEach(([id, ord]) => {
                html += `<div class="bg-white/5 p-5 rounded-xl border border-white/5 flex flex-col md:flex-row justify-between">
                    <div>
                        <p class="font-bold text-sm">${ord.prenom} ${ord.nom} <span class="text-gold opacity-50 ml-2">#${ord.tel}</span></p>
                        <p class="text-xs italic opacity-80 mt-1">${ord.service}</p>
                        ${ord.reponseStaff ? `<div class="last-reply italic">Réponse : ${ord.reponseStaff}</div>` : ""}
                    </div>
                    <div class="mt-4 md:mt-0">
                        <select onchange="replyOrder('${id}', this.value)" class="input-staff text-[10px]">
                            <option>Répondre...</option>
                            <option value="✅ Demande acceptée. On vous contacte.">Accepter</option>
                            <option value="❌ Demande refusée.">Refuser</option>
                            <option value="📅 RDV fixé au Studio.">Fixer RDV</option>
                        </select>
                        <button onclick="deleteOrder('${id}')" class="text-[9px] text-red-500 block mt-2">Supprimer</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        });

        window.replyOrder = (id, text) => {
            if(text.includes("Répondre")) return;
            update(ref(db, `orders/${id}`), { status: 'Répondu', reponseStaff: text });
        };

        window.deleteOrder = (id) => { if(confirm("Supprimer ?")) remove(ref(db, `orders/${id}`)); };

        // Logique images/publier identique à avant...
        let currentImgs = [];
        document.getElementById('bFiles').onchange = (e) => {
            currentImgs = [];
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader(); r.onload = ev => currentImgs.push(ev.target.result); r.readAsDataURL(f);
            });
        };
        document.getElementById('btnPublish').onclick = () => {
            const val = { title: document.getElementById('bTitle').value, price: document.getElementById('bPrice').value, cat: document.getElementById('bCat').value, images: currentImgs };
            push(ref(db, 'listings'), val).then(() => location.reload());
        };
    </script>
</body>
</html>
