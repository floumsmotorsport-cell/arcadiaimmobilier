<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Prestige | Conciergerie Interactive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .hero-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), 
                        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; height: 60vh;
        }
        .view-section { display: none; }
        .active-view { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #adminBar { display: none; background: #0f172a; border-bottom: 2px solid #b45309; }
        .is-admin #adminBar { display: flex; }
        
        .music-player {
            position: fixed; bottom: 20px; left: 20px; z-index: 200;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 10px 15px; border-radius: 50px; border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .chat-bubble { border-radius: 20px; padding: 10px 15px; margin-bottom: 10px; max-width: 85%; font-size: 12px; }
        .chat-admin { background: #0f172a; color: white; margin-left: auto; border-bottom-right-radius: 2px; }
        .chat-client { background: #f1f5f9; color: #1e293b; border-bottom-left-radius: 2px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="music-player flex items-center gap-4">
        <button id="playPauseBtn" class="bg-amber-600 text-white p-2 rounded-full w-10 h-10 flex items-center justify-center transition hover:scale-110">
            <span id="musicIcon">▶</span>
        </button>
        <div class="flex flex-col">
            <span class="text-[9px] font-black uppercase tracking-widest text-slate-400">Playlist Arcadia</span>
            <select id="trackSelect" class="bg-transparent text-[11px] font-bold text-slate-700 outline-none cursor-pointer border-b border-slate-200">
                <option value="">Choisir un titre</option>
                <option value="rk_chopard.mp3">RK - Big Chopard</option>
                <option value="lafouine_vision.mp3">La Fouine ft. Kaaris - Vision</option>
                <option value="rnboi_bebe.mp3">RNBOI - Mon Bébé</option>
            </select>
        </div>
        <audio id="bgMusic" loop><source id="musicSource" src="" type="audio/mpeg"></audio>
        <audio id="notifSound"><source src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" type="audio/mpeg"></audio>
    </div>

    <div id="adminBar" class="fixed top-0 w-full text-white py-3 px-8 z-[100] justify-between items-center text-[10px] font-bold uppercase tracking-widest shadow-2xl">
        <div class="flex items-center space-x-6">
            <span class="text-amber-500">SESSION : <span id="activeUserDisplay"></span></span>
            <button onclick="showView('adminPanel')">PANEL DE CONTRÔLE</button>
            <button onclick="showView('publicContent')">VUE CLIENT</button>
        </div>
        <button onclick="logout()" class="bg-red-600 px-4 py-1 rounded-full hover:bg-red-700 transition">Déconnexion</button>
    </div>

    <main id="publicContent" class="view-section active-view">
        <section class="hero-bg flex flex-col items-center justify-center text-center px-6 relative">
            <h1 class="text-white text-6xl font-serif font-bold tracking-tight mb-2">Arcadia Prestige</h1>
            <p class="text-amber-400 font-bold uppercase tracking-[0.3em] text-[10px]">Réservations & Expertise Mondiale</p>
            <button onclick="openLogin()" class="absolute bottom-4 right-6 text-white/20 hover:text-white/60 text-[10px] font-bold transition">STAFF ONLY</button>
        </section>

        <section class="container mx-auto -mt-20 px-6 relative z-10 pb-10">
            <div class="bg-white rounded-[3rem] shadow-2xl p-8 md:p-12 border border-slate-100 max-w-5xl mx-auto">
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-serif font-bold">Réserver une visite privée</h2>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <input type="text" id="resName" placeholder="Votre Nom complet" class="bg-slate-50 p-4 rounded-2xl outline-none">
                    <input type="email" id="resEmail" placeholder="Votre adresse e-mail" class="bg-slate-50 p-4 rounded-2xl outline-none col-span-1 md:col-span-2">
                    <select id="resType" class="bg-slate-50 p-4 rounded-2xl outline-none">
                        <option value="Visite">Demande de visite</option>
                        <option value="Création">Projet de création</option>
                        <option value="Vente">Estimation de bien</option>
                    </select>
                    <input type="date" id="resDate" class="bg-slate-50 p-4 rounded-2xl outline-none">
                    <input type="time" id="resTime" class="bg-slate-50 p-4 rounded-2xl outline-none">
                </div>
                <textarea id="resMsg" rows="3" placeholder="Parlez-nous de votre projet..." class="w-full bg-slate-50 p-4 rounded-2xl mt-6 outline-none"></textarea>
                <button id="btnReserve" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold uppercase mt-8 hover:bg-amber-600 transition-all">Confirmer la demande</button>
            </div>
        </section>

        <section class="container mx-auto px-6 mb-20">
            <div class="max-w-2xl mx-auto bg-slate-100 p-8 rounded-[2rem] border-2 border-dashed border-slate-200">
                <h3 class="text-center font-serif font-bold text-xl mb-4">Suivre mon dossier</h3>
                <div class="flex gap-2">
                    <input type="email" id="checkEmail" placeholder="Entrez votre email" class="flex-1 p-4 rounded-xl outline-none text-sm">
                    <button onclick="checkMyMessages()" class="bg-amber-600 text-white px-6 rounded-xl font-bold text-xs uppercase">Vérifier</button>
                </div>
                <div id="clientChatHistory" class="mt-8 space-y-4 hidden"></div>
            </div>
        </section>

        <section class="py-16 bg-white">
            <div class="container mx-auto px-6">
                <div id="allContent" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
            </div>
        </section>
    </main>

    <main id="adminPanel" class="view-section pt-24 pb-20 container mx-auto px-6">
        <div class="flex gap-4 mb-8 overflow-x-auto pb-2 items-center">
            <button onclick="switchTab('V')" id="tabV" class="tab-btn px-6 py-3 rounded-xl font-black bg-slate-900 text-white text-[10px] uppercase">🏠 Villas</button>
            <button onclick="switchTab('C')" id="tabC" class="tab-btn px-6 py-3 rounded-xl font-black bg-slate-100 text-slate-400 text-[10px] uppercase">🛠 Créations</button>
            <button onclick="switchTab('A')" id="tabA" class="tab-btn px-6 py-3 rounded-xl font-black bg-slate-100 text-slate-400 text-[10px] uppercase">📰 Articles</button>
            <div class="h-8 w-px bg-slate-200 mx-2"></div>
            <button onclick="switchTab('M')" id="tabM" class="tab-btn px-6 py-3 rounded-xl font-black bg-amber-100 text-amber-700 text-[10px] relative uppercase tracking-widest">
                📩 Messages <span id="msgCount" class="hidden absolute -top-2 -right-2 bg-red-600 text-white w-5 h-5 rounded-full flex items-center justify-center text-[10px] animate-bounce">0</span>
            </button>
        </div>

        <div id="adminContentContainer" class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div id="formSection" class="lg:col-span-7 bg-white p-10 rounded-[2.5rem] shadow-2xl border">
                <div class="space-y-6">
                    <div onclick="document.getElementById('fileInput').click()" class="border-2 border-dashed border-slate-200 p-10 rounded-[2rem] text-center cursor-pointer">
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                        <p id="fileStatus" class="text-[10px] font-black text-slate-400 uppercase">Glisser une image</p>
                    </div>
                    <input type="text" id="inTitle" placeholder="Titre" class="w-full bg-slate-50 p-4 rounded-xl outline-none">
                    <input type="text" id="inPrice" placeholder="Prix / Info" class="w-full bg-slate-50 p-4 rounded-xl outline-none">
                    <textarea id="inDesc" rows="4" placeholder="Description" class="w-full bg-slate-50 p-4 rounded-xl outline-none"></textarea>
                    <button id="btnPublish" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold uppercase transition hover:bg-amber-600 shadow-xl">Publier</button>
                </div>
            </div>
            <div id="listSection" class="lg:col-span-5"><div id="adminList" class="space-y-4"></div></div>
            <div id="messagesSection" class="hidden lg:col-span-12"><div id="messagesList" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div></div>
        </div>
    </main>

    <div id="loginOverlay" class="fixed inset-0 z-[500] hidden flex items-center justify-center bg-slate-900/95 backdrop-blur-md p-6">
        <div class="bg-slate-800 p-10 rounded-[3rem] text-white text-center w-full max-w-sm">
            <h2 class="text-3xl font-serif font-bold mb-6">Staff Access</h2>
            <input type="text" id="userLogin" placeholder="Identifiant" class="w-full bg-slate-700 p-4 rounded-2xl mb-4 outline-none border-none">
            <input type="password" id="passLogin" placeholder="Mot de passe" class="w-full bg-slate-700 p-4 rounded-2xl mb-6 outline-none border-none">
            <button id="btnLoginAction" class="w-full bg-amber-600 py-4 rounded-2xl font-bold uppercase">Entrer</button>
            <button onclick="closeLogin()" class="mt-4 text-slate-500 text-[10px] uppercase font-black">Retour</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBg9JIb2XAFacftazyDcAXOnCpfvaQ2PYI",
            authDomain: "arcadiaimmobilier-ee335.firebaseapp.com",
            databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arcadiaimmobilier-ee335",
            storageBucket: "arcadiaimmobilier-ee335.firebasestorage.app",
            messagingSenderId: "718967628351",
            appId: "1:718967628351:web:2c60b5bd68916773bdce8a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const ACCOUNTS = { "Axel": "Axel30", "Alden": "Alden30" };
        let currentUser = sessionStorage.getItem('arcadia_user');
        let currentMode = 'V';
        let currentImg = "";
        let globalData = {};
        let lastReplyCount = 0; // Pour la notif sonore

        window.openLogin = () => document.getElementById('loginOverlay').classList.remove('hidden');
        window.closeLogin = () => document.getElementById('loginOverlay').classList.add('hidden');
        window.logout = () => { sessionStorage.removeItem('arcadia_user'); location.reload(); };
        window.showView = (id) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
            document.getElementById(id).classList.add('active-view');
        };

        document.getElementById('btnLoginAction').onclick = () => {
            const u = document.getElementById('userLogin').value;
            const p = document.getElementById('passLogin').value;
            if (ACCOUNTS[u] === p) { sessionStorage.setItem('arcadia_user', u); location.reload(); }
        };

        window.switchTab = (m) => {
            currentMode = m;
            const isMsg = m === 'M';
            document.getElementById('formSection').style.display = isMsg ? 'none' : 'block';
            document.getElementById('listSection').style.display = isMsg ? 'none' : 'block';
            document.getElementById('messagesSection').classList.toggle('hidden', !isMsg);
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('bg-slate-900', 'text-white'));
            document.getElementById('tab' + m).classList.add('bg-slate-900', 'text-white');
            if(!isMsg) refreshAdminList();
        };

        // SUIVI CLIENT & NOTIFICATION
        window.checkMyMessages = () => {
            const email = document.getElementById('checkEmail').value.toLowerCase();
            const historyDiv = document.getElementById('clientChatHistory');
            if(!email) return alert("Entrez votre email");

            onValue(ref(db, 'messages'), (snap) => {
                const msgs = snap.val() || {};
                let html = "";
                let found = false;
                let currentReplies = 0;

                Object.values(msgs).forEach(m => {
                    if(m.email.toLowerCase() === email) {
                        found = true;
                        if(m.adminReply) currentReplies++;
                        html += `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                            <p class="text-[10px] font-black text-amber-600 uppercase mb-2">Demande du ${m.date}</p>
                            <div class="chat-bubble chat-client mb-2">"${m.msg}"</div>
                            ${m.adminReply ? `
                                <div class="chat-bubble chat-admin bg-slate-900 text-white ml-auto">
                                    <p class="font-bold text-[10px] text-amber-400 mb-1">CONCIERGERIE :</p>
                                    ${m.adminReply}
                                </div>
                            ` : `<p class="text-[10px] italic text-slate-400 text-right mt-2">En attente...</p>`}
                        </div>`;
                    }
                });

                if(found) {
                    // Jouer son si nouvelle réponse
                    if(currentReplies > lastReplyCount && lastReplyCount !== 0) {
                        document.getElementById('notifSound').play();
                    }
                    lastReplyCount = currentReplies;
                    historyDiv.innerHTML = html;
                    historyDiv.classList.remove('hidden');
                } else { alert("Aucun dossier trouvé."); }
            });
        };

        // GESTION ADMIN MESSAGES
        onValue(ref(db, 'messages'), (snap) => {
            const msgs = snap.val() || {};
            const badge = document.getElementById('msgCount');
            const unreadCount = Object.values(msgs).filter(m => m.status === 'unread').length;
            badge.innerText = unreadCount;
            badge.classList.toggle('hidden', unreadCount === 0);
            if(currentMode === 'M') renderMessages(msgs);
        });

        window.sendChatReply = (key, clientEmail, clientName) => {
            const replyText = document.getElementById(`replyInput-${key}`).value;
            if(!replyText) return;
            update(ref(db, `messages/${key}`), { adminReply: replyText, status: 'read' });
            
            const subject = encodeURIComponent(`Arcadia Prestige | Suite à votre demande`);
            const body = encodeURIComponent(`Cher(e) ${clientName},\n\nNous avons répondu à votre demande.\n\nNOTRE RÉPONSE :\n"${replyText}"\n\nConsultez votre suivi sur le site.\n\nCordialement,\nL'équipe Arcadia`);
            window.location.href = `mailto:${clientEmail}?subject=${subject}&body=${body}`;
        };

        function renderMessages(msgs) {
            const container = document.getElementById('messagesList');
            container.innerHTML = "";
            Object.entries(msgs).reverse().forEach(([key, m]) => {
                container.innerHTML += `
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-100">
                    <div class="flex justify-between items-start mb-6">
                        <span class="bg-amber-100 text-amber-700 text-[9px] px-3 py-1 rounded-full font-black uppercase">${m.type}</span>
                        <button onclick="deleteMsg('${key}')" class="text-slate-300 hover:text-red-500">✕</button>
                    </div>
                    <div class="chat-container mb-6">
                        <div class="chat-bubble chat-client"><p class="font-bold mb-1">${m.name} :</p>${m.msg}</div>
                        ${m.adminReply ? `<div class="chat-bubble chat-admin"><p class="font-bold mb-1">Vous :</p>${m.adminReply}</div>` : ''}
                    </div>
                    <div class="relative mt-4">
                        <input type="text" id="replyInput-${key}" placeholder="Répondre..." class="w-full bg-slate-50 p-4 pr-32 rounded-2xl outline-none text-sm border focus:border-amber-500">
                        <button onclick="sendChatReply('${key}', '${m.email}', '${m.name}')" class="absolute right-2 top-2 bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Répondre</button>
                    </div>
                </div>`;
            });
        }

        // PUBLICATION CONTENU
        onValue(ref(db, 'content'), (snap) => {
            globalData = snap.val() || {};
            const container = document.getElementById('allContent');
            let html = "";
            ['villas', 'creations', 'articles'].forEach(cat => {
                if(globalData[cat]) Object.values(globalData[cat]).forEach(item => {
                    html += `<div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100 transition hover:scale-[1.02]"><img src="${item.img}" class="h-64 w-full object-cover"><div class="p-8"><span class="text-[9px] font-black text-amber-600 uppercase tracking-widest">${item.type}</span><h4 class="text-2xl font-serif font-bold mt-1">${item.title}</h4><p class="text-amber-700 font-bold mt-2">${item.price}</p><p class="text-slate-500 text-sm mt-4">${item.desc}</p></div></div>`;
                });
            });
            container.innerHTML = html;
            refreshAdminList();
        });

        function refreshAdminList() {
            const types = { 'V': 'villas', 'C': 'creations', 'A': 'articles' };
            const list = globalData[types[currentMode]] || {};
            const container = document.getElementById('adminList');
            container.innerHTML = "";
            Object.entries(list).forEach(([key, item]) => {
                container.innerHTML += `<div class="bg-white p-4 rounded-2xl shadow-sm border flex items-center justify-between"><div class="flex items-center gap-4"><img src="${item.img}" class="w-12 h-12 rounded-lg object-cover"><span class="text-xs font-bold">${item.title}</span></div><button onclick="deleteItem('${types[currentMode]}', '${key}')" class="text-red-500 text-[10px] font-black">SUPPRIMER</button></div>`;
            });
        }

        document.getElementById('btnReserve').onclick = () => {
            const d = new Date();
            const res = {
                name: document.getElementById('resName').value,
                email: document.getElementById('resEmail').value,
                type: document.getElementById('resType').value,
                date: d.toLocaleDateString(),
                time: d.toLocaleTimeString(),
                msg: document.getElementById('resMsg').value,
                status: 'unread'
            };
            if(!res.name || !res.email) return alert("Nom et email requis.");
            push(ref(db, 'messages'), res).then(() => { alert("Envoyé !"); document.querySelectorAll('input, textarea').forEach(i => i.value = ""); });
        };

        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { currentImg = ev.target.result; document.getElementById('fileStatus').innerText = "✅ IMAGE PRÊTE"; };
            reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('btnPublish').onclick = () => {
            const types = { 'V': 'villas', 'C': 'creations', 'A': 'articles' };
            const data = { title: document.getElementById('inTitle').value, price: document.getElementById('inPrice').value, desc: document.getElementById('inDesc').value, img: currentImg, type: types[currentMode] };
            if(!data.title || !data.img) return alert("Titre et image requis.");
            push(ref(db, `content/${types[currentMode]}`), data).then(() => { alert("Publié !"); location.reload(); });
        };

        window.deleteItem = (t, k) => { if(confirm("Supprimer ?")) remove(ref(db, `content/${t}/${k}`)); };
        window.deleteMsg = (k) => { if(confirm("Supprimer ?")) remove(ref(db, `messages/${k}`)); };

        // MUSIQUE
        const audio = document.getElementById('bgMusic');
        const playBtn = document.getElementById('playPauseBtn');
        const musicIcon = document.getElementById('musicIcon');
        playBtn.onclick = () => { 
            if (audio.paused) { if(!audio.src || audio.src === window.location.href) return; audio.play(); musicIcon.innerText = "⏸"; } 
            else { audio.pause(); musicIcon.innerText = "▶"; } 
        };
        document.getElementById('trackSelect').onchange = (e) => { if(e.target.value) { document.getElementById('musicSource').src = e.target.value; audio.load(); audio.play(); musicIcon.innerText = "⏸"; } };

        if (currentUser) { document.body.classList.add('is-admin'); document.getElementById('activeUserDisplay').innerText = currentUser; }
    </script>
</body>
</html>
