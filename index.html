<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Prestige | Excellence Immobilière</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; transition: opacity 0.3s ease; }
        .font-serif { font-family: 'Playfair Display', serif; }

        /* Animations & Glassmorphism */
        @keyframes revealUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: revealUp 0.8s ease forwards; }
        
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }

        .hero-bg {
            background: linear-gradient(rgba(10, 15, 30, 0.85), rgba(10, 15, 30, 0.85)),
                        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; height: 90vh;
        }

        .view-section { display: none; }
        .active-view { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-hover { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-hover:hover { transform: translateY(-15px) scale(1.03); box-shadow: 0 30px 60px rgba(0,0,0,0.15); }

        #adminBar { display: none; background: #0f172a; border-bottom: 2px solid #b45309; }
        .is-admin #adminBar { display: flex; }
        
        .fav-badge { position: absolute; top: -5px; right: -5px; background: #b45309; color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="adminBar" class="fixed top-0 w-full text-white py-3 px-8 z-[100] justify-between items-center text-[10px] font-bold uppercase tracking-widest">
        <div class="flex items-center space-x-6">
            <span class="text-amber-500 border-r border-white/20 pr-6">STAFF: <span id="activeUserDisplay"></span></span>
            <button onclick="showView('adminPanel')" class="hover:text-amber-500 transition">GESTION CONTENT</button>
            <button onclick="showView('publicContent')" class="hover:text-amber-500 transition">RETOUR SITE</button>
        </div>
        <button id="btnLogout" class="bg-red-600 px-4 py-1 rounded-full hover:bg-red-700 transition">DECONNEXION</button>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/80 z-[999] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white max-w-2xl w-full rounded-[2rem] overflow-hidden shadow-2xl relative">
            <button onclick="closeDetail()" class="absolute top-4 right-4 text-2xl z-20 bg-white/50 rounded-full w-10 h-10 flex items-center justify-center hover:bg-white transition">✕</button>
            
            <div class="relative h-80 bg-slate-200">
                <img id="carouselImg" class="w-full h-full object-cover">
                <button onclick="prevImg()" class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/80 p-2 rounded-full hover:bg-white shadow-lg transition">‹</button>
                <button onclick="nextImg()" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/80 p-2 rounded-full hover:bg-white shadow-lg transition">›</button>
            </div>

            <div class="p-8">
                <h2 id="detailTitle" class="text-3xl font-serif font-bold mb-2 italic"></h2>
                <p id="detailPrice" class="text-amber-600 font-bold text-xl mb-4"></p>
                <p id="detailDesc" class="text-slate-600 text-sm leading-relaxed whitespace-pre-line h-32 overflow-y-auto"></p>
                <button onclick="openDevis(); closeDetail();" class="mt-8 w-full bg-slate-900 text-white py-4 rounded-xl font-bold uppercase tracking-widest text-xs hover:bg-amber-600 transition">S'informer sur ce bien</button>
            </div>
        </div>
    </div>

    <div id="clientSpace" class="hidden fixed inset-0 bg-slate-950/90 z-[999] flex items-center justify-center backdrop-blur-md">
        <div class="bg-white p-12 rounded-[3rem] w-full max-w-md text-center">
            <h3 class="text-3xl font-serif font-bold mb-4">Espace Client</h3>
            <p class="text-slate-400 text-xs uppercase tracking-widest mb-8">Suivez vos favoris et vos demandes</p>
            <input id="clientEmail" placeholder="Email" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none focus:ring-2 ring-amber-500">
            <input id="clientPass" type="password" placeholder="Mot de passe" class="w-full p-4 bg-slate-100 rounded-2xl mb-6 outline-none focus:ring-2 ring-amber-500">
            <button onclick="loginClient()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-amber-600 transition shadow-lg">Connexion</button>
            <button onclick="get('clientSpace').classList.add('hidden')" class="mt-6 text-[10px] text-slate-400 uppercase font-bold tracking-widest">Fermer</button>
        </div>
    </div>

    <div id="devisBox" class="fixed inset-0 bg-slate-900/80 z-[999] hidden flex items-center justify-center backdrop-blur-md">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-lg shadow-2xl mx-4">
            <h3 class="text-3xl font-serif font-bold mb-8 text-center">Estimation Privée</h3>
            <input id="devisName" placeholder="Votre Nom" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <input id="devisEmail" placeholder="Email" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <textarea id="devisMsg" placeholder="Votre projet..." class="w-full p-4 bg-slate-100 rounded-2xl mb-6 h-32 outline-none"></textarea>
            <button onclick="sendDevis()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-amber-600 transition">Envoyer</button>
            <button onclick="closeDevis()" class="mt-4 text-[10px] text-slate-400 w-full text-center font-bold uppercase">Fermer</button>
        </div>
    </div>

    <main id="publicContent" class="view-section active-view">
        <section class="hero-bg flex flex-col items-center justify-center text-center px-6 relative">
            <div class="reveal">
                <h1 class="text-white text-6xl md:text-9xl font-serif font-bold mb-4">Arcadia</h1>
                <p class="text-amber-500 font-bold uppercase tracking-widest text-[14px] mb-12">L'Art de Vivre d'Exception</p>
                <div class="flex flex-col md:flex-row gap-6 justify-center">
                    <button onclick="openDevis()" class="bg-amber-600 text-white px-10 py-4 rounded-full font-bold text-xs uppercase hover:bg-white hover:text-slate-900 transition-all shadow-2xl">Demander un Devis</button>
                    <button onclick="get('clientSpace').classList.remove('hidden')" class="glass text-white px-10 py-4 rounded-full font-bold text-xs uppercase hover:bg-white hover:text-slate-900 transition-all">Espace Client</button>
                </div>
            </div>
            <button onclick="openLogin()" class="absolute bottom-6 left-1/2 -translate-x-1/2 text-white/20 text-[10px] tracking-widest hover:text-white transition uppercase">Staff Privé</button>
        </section>

        <section id="portfolio" class="py-24">
            <div id="allContent" class="container mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-12"></div>
        </section>
    </main>

    <main id="adminPanel" class="view-section pt-32 pb-24 container mx-auto px-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 h-fit">
                <h2 class="text-3xl font-serif font-bold mb-8">Ajouter une Propriété</h2>
                <div class="space-y-4">
                    <select id="inCategory" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                        <option value="villas">Villas en vente</option>
                        <option value="biens">Biens d'exception</option>
                    </select>
                    <input type="text" id="inTitle" placeholder="Nom de la propriété" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                    <input type="text" id="inPrice" placeholder="Prix (ex: 2 500 000 €)" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                    <textarea id="inDesc" placeholder="Description..." class="w-full p-4 bg-slate-100 rounded-2xl h-32 outline-none"></textarea>
                    
                    <div class="p-6 border-2 border-dashed border-slate-200 rounded-2xl text-center">
                        <p class="text-[10px] font-bold uppercase mb-4 text-slate-400">Sélectionner plusieurs photos HD</p>
                        <input type="file" id="multiFileInput" multiple accept="image/*" class="text-xs">
                    </div>

                    <button id="btnPublish" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold hover:bg-amber-600 transition tracking-widest uppercase text-xs">Publier sur Arcadia</button>
                </div>
            </div>
            <div id="adminMessages" class="space-y-6"></div>
        </div>
    </main>

    <div id="loginOverlay" class="fixed inset-0 z-[500] hidden flex items-center justify-center bg-slate-950/95 backdrop-blur-xl">
        <div class="bg-white p-12 rounded-[3.5rem] w-96 text-center">
            <h3 class="text-2xl font-serif font-bold mb-8">Authentification Staff</h3>
            <input type="text" id="userLogin" placeholder="Identifiant" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 outline-none">
            <input type="password" id="passLogin" placeholder="Mot de passe" class="w-full p-4 bg-slate-100 rounded-2xl mb-8 outline-none">
            <button id="btnLoginAction" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase text-xs">Accéder</button>
            <button onclick="closeLogin()" class="mt-6 text-[10px] text-slate-400 font-bold uppercase">Annuler</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURATION FIREBASE (À conserver telle quelle)
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "arcadiaimmobilier-ee335.firebaseapp.com",
            databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arcadiaimmobilier-ee335",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const get = id => document.getElementById(id);
        
        let globalData = {};
        let multiImages = [];
        let currentCarouselImages = [];
        let currentCarouselIndex = 0;

        // --- NAVIGATION & UI ---
        window.showView = (id) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
            get(id).classList.add('active-view');
            window.scrollTo(0,0);
        };
        window.openLogin = () => get('loginOverlay').classList.remove('hidden');
        window.closeLogin = () => get('loginOverlay').classList.add('hidden');
        window.openDevis = () => get('devisBox').classList.remove('hidden');
        window.closeDevis = () => get('devisBox').classList.add('hidden');

        // --- CARROUSEL ---
        window.openDetail = (item) => {
            currentCarouselImages = item.images || [item.img];
            currentCarouselIndex = 0;
            updateCarousel();
            get('detailTitle').innerText = item.title;
            get('detailPrice').innerText = item.price || "Sur demande";
            get('detailDesc').innerText = item.desc || "Aucune description.";
            get('detailModal').classList.remove('hidden');
        };
        window.closeDetail = () => get('detailModal').classList.add('hidden');
        
        window.updateCarousel = () => {
            get('carouselImg').src = currentCarouselImages[currentCarouselIndex];
        };
        window.nextImg = () => {
            currentCarouselIndex = (currentCarouselIndex + 1) % currentCarouselImages.length;
            updateCarousel();
        };
        window.prevImg = () => {
            currentCarouselIndex = (currentCarouselIndex - 1 + currentCarouselImages.length) % currentCarouselImages.length;
            updateCarousel();
        };

        // --- AUTH STAFF ---
        const ACCOUNTS = { "Axel": "Axel30", "Alden": "Alden30" };
        get('btnLoginAction').onclick = () => {
            const u = get('userLogin').value, p = get('passLogin').value;
            if(ACCOUNTS[u] === p){
                sessionStorage.setItem('arcadia_user', u);
                location.reload();
            } else alert("Accès refusé");
        };
        if(sessionStorage.getItem('arcadia_user')){
            document.body.classList.add('is-admin');
            get('activeUserDisplay').innerText = sessionStorage.getItem('arcadia_user');
        }
        get('btnLogout').onclick = () => { sessionStorage.removeItem('arcadia_user'); location.reload(); };

        // --- LOGIN CLIENT ---
        window.loginClient = () => {
            const email = get('clientEmail').value;
            if(email.includes('@')) {
                localStorage.setItem('client_email', email);
                alert('Bienvenue dans votre espace prestige.');
                get('clientSpace').classList.add('hidden');
            }
        };

        // --- GESTION DES IMAGES (UPLOAD MULTIPLE) ---
        get('multiFileInput').onchange = (e) => {
            multiImages = [];
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = () => multiImages.push(reader.result);
                reader.readAsDataURL(file);
            });
            alert("Photos prêtes pour l'envoi.");
        };

        // --- FIREBASE : ENREGISTREMENT ---
        get('btnPublish').onclick = () => {
            const title = get('inTitle').value, price = get('inPrice').value, 
                  cat = get('inCategory').value, desc = get('inDesc').value;
            
            if(!title || multiImages.length === 0) return alert("Titre et photos requis.");

            push(ref(db, `content/${cat}`), { 
                title, price, desc, 
                img: multiImages[0], // Image principale
                images: multiImages     // Galerie complète
            }).then(() => {
                alert("Propriété publiée avec succès !");
                location.reload();
            });
        };

        // --- RENDER ---
        onValue(ref(db, 'content'), (snap) => {
            globalData = snap.val() || {};
            let html = "";
            ['villas','biens'].forEach(cat => {
                if(globalData[cat]) Object.entries(globalData[cat]).forEach(([id, item]) => {
                    const isAdmin = document.body.classList.contains('is-admin');
                    const itemData = JSON.stringify(item).replace(/'/g, "&apos;");
                    html += `
                    <div class="card-hover bg-white rounded-[2.5rem] shadow-xl overflow-hidden reveal cursor-pointer" onclick='openDetail(${itemData})'>
                        <img src="${item.img}" class="h-80 w-full object-cover">
                        <div class="p-8">
                            <span class="text-[9px] font-black text-amber-600 uppercase tracking-widest">${cat}</span>
                            <h4 class="text-2xl font-serif font-bold mt-1 italic">${item.title}</h4>
                            <p class="text-slate-900 font-bold mt-2">${item.price || 'Sur demande'}</p>
                            ${isAdmin ? `<button onclick="event.stopPropagation(); deletePost('${cat}','${id}')" class="mt-4 text-red-500 text-[10px] font-bold uppercase">Supprimer</button>` : ''}
                        </div>
                    </div>`;
                });
            });
            get('allContent').innerHTML = html;
        });

        window.deletePost = (cat, id) => { if(confirm("Supprimer ?")) remove(ref(db, `content/${cat}/${id}`)); };
        window.get = get; // Pour accès global si besoin
    </script>
</body>
</html>
