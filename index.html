<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Immobilier | Prestige & Excellence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');
        :root { --primary: #065f46; --accent: #10b981; }
        body { font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
        .admin-panel { display: none; }
        .admin-active .admin-panel { display: block; }
        .admin-active .public-view { display: none; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .card-hover:hover { transform: translateY(-10px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="fixed w-full z-50 glass border-b border-emerald-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-emerald-800 rounded-lg flex items-center justify-center text-white font-bold text-xl">A</div>
                <h1 class="text-2xl font-bold text-emerald-900 tracking-tighter">ARCADIA</h1>
            </div>
            <div class="hidden md:flex items-center space-x-10 text-sm font-semibold uppercase tracking-widest">
                <a href="#catalogue" class="hover:text-emerald-600 transition">Propriétés</a>
                <button onclick="toggleAdmin()" id="adminBtn" class="bg-emerald-900 text-white px-5 py-2 rounded-full hover:bg-emerald-700 transition shadow-lg">
                    <i class="fas fa-lock-open mr-2"></i>Espace Admin
                </button>
            </div>
        </div>
    </nav>

    <div class="public-view">
        <header class="relative h-[60vh] flex items-center justify-center overflow-hidden">
            <img src="https://images.unsplash.com/photo-1600607687940-4e524cb3529a?auto=format&fit=crop&q=80" class="absolute inset-0 w-full h-full object-cover" alt="Luxury Home">
            <div class="absolute inset-0 bg-black/40"></div>
            <div class="relative z-10 text-center text-white px-4">
                <h2 class="text-5xl md:text-7xl font-bold mb-4">Votre Havre de Paix</h2>
            </div>
        </header>

        <section class="max-w-6xl mx-auto -mt-16 relative z-20 px-4">
            <div class="bg-white p-8 rounded-2xl shadow-2xl flex flex-wrap gap-4 items-end border border-emerald-50">
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Recherche</label>
                    <input type="text" id="searchInput" onkeyup="filterProperties()" placeholder="Ville, Nom..." class="w-full p-3 bg-gray-50 border rounded-xl focus:ring-2 ring-emerald-500 outline-none">
                </div>
                <div class="flex-1 min-w-[200px]">
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Budget Max</label>
                    <select id="priceFilter" onchange="filterProperties()" class="w-full p-3 bg-gray-50 border rounded-xl focus:ring-2 ring-emerald-500 outline-none">
                        <option value="all">Tous les prix</option>
                        <option value="500000">Sous 500 000 €</option>
                        <option value="1000000">Sous 1 000 000 €</option>
                        <option value="2000000">Sous 2 000 000 €</option>
                    </select>
                </div>
            </div>
        </section>

        <section id="catalogue" class="py-20 px-6 max-w-7xl mx-auto">
            <div id="property-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                </div>
        </section>
    </div>

    <div class="admin-panel pt-32 pb-20 bg-slate-100 min-h-screen">
        <div class="max-w-5xl mx-auto px-6">
            <div class="bg-white rounded-3xl p-10 shadow-xl border">
                <div class="flex justify-between items-center mb-10">
                    <h2 id="formTitle" class="text-3xl font-bold text-emerald-900">Gestion de l'annonce</h2>
                    <button onclick="toggleAdmin()" class="text-red-500 font-bold">Quitter l'admin</button>
                </div>
                <form id="propForm" class="space-y-6">
                    <input type="hidden" id="editIndex">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" id="title" placeholder="Nom" class="p-4 bg-slate-50 rounded-xl border" required>
                        <input type="number" id="price" placeholder="Prix (Nombre seul, ex: 1200000)" class="p-4 bg-slate-50 rounded-xl border" required>
                        <input type="text" id="loc" placeholder="Localisation" class="p-4 bg-slate-50 rounded-xl border" required>
                        <select id="type" class="p-4 bg-slate-50 rounded-xl border">
                            <option value="Vente">Vente</option>
                            <option value="Location">Location</option>
                        </select>
                    </div>
                    <div class="border-2 border-dashed p-4 rounded-xl text-center">
                        <input type="file" id="imgFile" accept="image/*">
                        <input type="hidden" id="existingImg">
                    </div>
                    <textarea id="desc" rows="3" placeholder="Description" class="w-full p-4 bg-slate-50 rounded-xl border" required></textarea>
                    <div class="flex gap-4">
                        <button type="submit" id="submitBtn" class="flex-1 bg-emerald-800 text-white py-4 rounded-xl font-bold">Enregistrer</button>
                        <button type="button" id="cancelBtn" onclick="resetForm()" class="hidden px-8 bg-gray-200 py-4 rounded-xl">Annuler</button>
                    </div>
                </form>
            </div>
            <div class="mt-8 bg-white rounded-xl shadow-lg overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-emerald-900 text-white"><tr><th class="p-4">Bien</th><th class="p-4">Prix</th><th class="p-4">Actions</th></tr></thead>
                    <tbody id="admin-list" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBg9JIb2XAFacftazyDcAXOnCpfvaQ2PYI",
            authDomain: "arcadiaimmobilier-ee335.firebaseapp.com",
            databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arcadiaimmobilier-ee335",
            storageBucket: "arcadiaimmobilier-ee335.firebasestorage.app",
            messagingSenderId: "718967628351",
            appId: "1:718967628351:web:2c60b5bd68916773bdce8a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app);
        const dbRef = ref(db, 'properties');

        let properties = [];

        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            properties = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
            window.renderPublic(properties);
            window.renderAdmin();
        });

        // --- FONCTIONS EXPOSÉES AU WINDOW POUR LES ONCLICK ---
        
        window.toggleAdmin = () => {
            document.body.classList.toggle('admin-active');
        };

        window.resetForm = () => {
            document.getElementById('propForm').reset();
            document.getElementById('editIndex').value = "";
            document.getElementById('existingImg').value = "";
            document.getElementById('cancelBtn').classList.add('hidden');
        };

        window.filterProperties = () => {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const maxPrice = document.getElementById('priceFilter').value;
            
            const filtered = properties.filter(p => {
                const matchText = p.title.toLowerCase().includes(search) || p.loc.toLowerCase().includes(search);
                const matchPrice = maxPrice === "all" || parseInt(p.price) <= parseInt(maxPrice);
                return matchText && matchPrice;
            });
            window.renderPublic(filtered);
        };

        window.renderPublic = (data) => {
            const grid = document.getElementById('property-grid');
            if(data.length === 0) { grid.innerHTML = "<p>Aucun bien trouvé.</p>"; return; }
            grid.innerHTML = data.map(p => `
                <div class="bg-white rounded-3xl overflow-hidden shadow-lg card-hover border border-gray-100">
                    <img src="${p.img}" class="h-64 w-full object-cover">
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-2">
                            <h3 class="text-xl font-bold">${p.title}</h3>
                            <span class="text-emerald-600 font-bold">${parseInt(p.price).toLocaleString()} €</span>
                        </div>
                        <p class="text-gray-500 text-sm mb-4">${p.desc}</p>
                        <div class="text-xs text-gray-400 font-bold"><i class="fas fa-map-marker-alt mr-1"></i>${p.loc}</div>
                    </div>
                </div>
            `).join('');
        };

        window.renderAdmin = () => {
            const list = document.getElementById('admin-list');
            list.innerHTML = properties.map(p => `
                <tr>
                    <td class="p-4 font-bold">${p.title}</td>
                    <td class="p-4">${p.price} €</td>
                    <td class="p-4 space-x-2">
                        <button onclick="editProperty('${p.id}')" class="text-blue-600">Editer</button>
                        <button onclick="deleteProperty('${p.id}')" class="text-red-600">Supprimer</button>
                    </td>
                </tr>
            `).join('');
        };

        window.editProperty = (id) => {
            const p = properties.find(item => item.id === id);
            document.getElementById('editIndex').value = p.id;
            document.getElementById('title').value = p.title;
            document.getElementById('price').value = p.price;
            document.getElementById('loc').value = p.loc;
            document.getElementById('type').value = p.type;
            document.getElementById('existingImg').value = p.img;
            document.getElementById('desc').value = p.desc;
            document.getElementById('cancelBtn').classList.remove('hidden');
        };

        window.deleteProperty = (id) => {
            if(confirm("Supprimer ?")) remove(ref(db, `properties/${id}`));
        };

        // --- GESTION DU FORMULAIRE ---
        document.getElementById('propForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const id = document.getElementById('editIndex').value;
            const file = document.getElementById('imgFile').files[0];
            let imageUrl = document.getElementById('existingImg').value;

            btn.disabled = true;
            btn.innerText = "Chargement...";

            try {
                if (file) {
                    const storageRef = sRef(storage, `properties/${Date.now()}_${file.name}`);
                    const snap = await uploadBytes(storageRef, file);
                    imageUrl = await getDownloadURL(snap.ref);
                }

                const data = {
                    title: document.getElementById('title').value,
                    price: document.getElementById('price').value,
                    loc: document.getElementById('loc').value,
                    type: document.getElementById('type').value,
                    img: imageUrl || "https://via.placeholder.com/400",
                    desc: document.getElementById('desc').value
                };

                if (id) await update(ref(db, `properties/${id}`), data);
                else await push(dbRef, data);

                window.resetForm();
                alert("Terminé !");
            } catch (err) {
                alert("Erreur: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Enregistrer";
            }
        });
    </script>
</body>
</html>
