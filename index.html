<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Immobilier | Luxury Real Estate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@100;200;300;400&display=swap');
        
        :root { --gold: #c5a059; --dark: #121212; --light: #ffffff; }

        body { font-family: 'Montserrat', sans-serif; background: var(--light); color: var(--dark); overflow-x: hidden; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }

        /* Navbar & Navigation */
        #mainNavbar { 
            position: fixed; top: 0; width: 100%; height: 100px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 5%; z-index: 1500; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            background: transparent;
        }
        #mainNavbar.scrolled { height: 75px; background: rgba(255, 255, 255, 0.98); border-bottom: 1px solid #f0f0f0; }
        #mainNavbar.scrolled .nav-link { color: var(--dark); }
        .nav-link { color: white; font-size: 10px; letter-spacing: 3px; font-weight: 300; text-transform: uppercase; transition: opacity 0.3s; }

        /* Hero avec Parallaxe Fixe */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.2)), 
                        url('https://images.unsplash.com/photo-1600607687940-477a28b6d080?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
            background-attachment: fixed; /* Parallaxe natif Hero */
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white;
        }

        /* Conteneur Parallaxe pour les cartes */
        .parallax-container {
            position: relative; overflow: hidden; height: 100%; width: 100%;
            aspect-ratio: 16/10;
        }
        .parallax-img {
            position: absolute; top: -15%; left: 0; width: 100%; height: 130%;
            object-fit: cover; will-change: transform; transition: transform 0.1s linear;
        }

        /* Reveal Animation au scroll */
        .reveal { opacity: 0; transform: translateY(40px); transition: all 1s cubic-bezier(0.2, 1, 0.3, 1); }
        .reveal.visible { opacity: 1; transform: translateY(0); }

        /* Admin Bar */
        #adminBar { display: none; background: #000; color: #fff; position: fixed; top: 0; width: 100%; z-index: 2000; font-size: 9px; height: 30px; align-items: center; padding: 0 5%; letter-spacing: 2px; text-transform: uppercase; }
        .is-admin #adminBar { display: flex; }
        .is-admin #mainNavbar { top: 30px; }

        /* Custom Cursor */
        #cursor { width: 12px; height: 12px; border: 1px solid var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; transition: transform 0.15s ease-out; }

        .view-section { display: none; }
        .active-view { display: block; }

        /* Boutons Kretz */
        .btn-minimal {
            border: 1px solid var(--dark); padding: 18px 45px; font-size: 10px; letter-spacing: 4px;
            text-transform: uppercase; transition: 0.4s; position: relative;
        }
        .btn-minimal:hover { background: var(--dark); color: white; padding-right: 55px; }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="adminBar">
        <span>Arcadia Staff : <span id="activeUserDisplay" class="font-bold"></span></span>
        <div class="ml-10 space-x-6">
            <button onclick="showView('adminPanel')">Biens</button>
            <button onclick="showView('adminBlog')">Édito</button>
            <button onclick="showView('adminInbox')">Conciergerie</button>
        </div>
        <button onclick="logout()" class="ml-auto opacity-50">Déconnexion</button>
    </div>

    <nav id="mainNavbar">
        <div class="flex gap-12 w-1/3">
            <button onclick="showView('publicContent')" class="nav-link">Collection</button>
            <button onclick="showView('blogView')" class="nav-link">L'Édito</button>
        </div>
        <img src="https://image2url.com/r2/default/images/1774637280338-edb5fb97-c196-45e7-bdfa-1af5a2805830.png" 
             alt="Arcadia" class="h-8 cursor-pointer invert" id="navLogo" onclick="showView('publicContent')">
        <div class="flex gap-12 w-1/3 justify-end">
            <button onclick="showView('contactView')" class="nav-link">Contact</button>
            <button onclick="openLogin()" class="nav-link opacity-30">Staff</button>
        </div>
    </nav>

    <main id="publicContent" class="view-section active-view">
        <section class="hero">
            <h1 class="font-serif text-8xl md:text-[10rem] italic font-light mb-2">Arcadia</h1>
            <p class="uppercase tracking-[0.6em] text-[11px] font-light opacity-80">L'Excellence Immobilière</p>
        </section>

        <section class="py-40 px-[5%]">
            <div id="allContent" class="grid grid-cols-1 md:grid-cols-2 gap-x-16 gap-y-32">
                </div>
        </section>
    </main>

    <main id="contactView" class="view-section pt-40 px-[5%]">
        <div class="max-w-4xl mx-auto py-20">
            <h2 class="font-serif text-7xl italic mb-20 text-center">Une demande particulière ?</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-20">
                <input type="text" id="msgName" placeholder="NOM COMPLET" class="border-b border-black/10 p-4 outline-none uppercase text-[10px] tracking-widest">
                <input type="text" id="msgEmail" placeholder="RADIO / COORDONNÉES" class="border-b border-black/10 p-4 outline-none uppercase text-[10px] tracking-widest">
                <textarea id="msgBody" placeholder="VOTRE MESSAGE" class="md:col-span-2 border-b border-black/10 p-4 outline-none uppercase text-[10px] tracking-widest h-32"></textarea>
                <button onclick="sendMessage()" class="btn-minimal md:col-span-2">Envoyer le message</button>
            </div>
        </div>
    </main>

    <div id="loginOverlay" class="fixed inset-0 z-[3000] hidden bg-white flex items-center justify-center">
        <div class="w-full max-w-xs text-center">
            <h3 class="font-serif text-4xl italic mb-12">Privé</h3>
            <input type="text" id="userLogin" placeholder="ID" class="w-full border-b mb-6 p-2 text-center">
            <input type="password" id="passLogin" placeholder="CODE" class="w-full border-b mb-12 p-2 text-center">
            <button id="btnLoginAction" class="btn-minimal w-full">Entrer</button>
            <button onclick="closeLogin()" class="mt-8 text-[9px] uppercase tracking-widest opacity-40">Retour</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const get = id => document.getElementById(id);

        // --- GESTION PARALLAXE & REVEAL ---
        window.addEventListener('scroll', () => {
            const nav = get('mainNavbar');
            const logo = get('navLogo');
            const scrollPos = window.scrollY;

            // Navbar
            if(scrollPos > 80) {
                nav.classList.add('scrolled');
                logo.classList.remove('invert');
            } else if(get('publicContent').classList.contains('active-view')) {
                nav.classList.remove('scrolled');
                logo.classList.add('invert');
            }

            // Animation Parallaxe des images
            document.querySelectorAll('.parallax-img').forEach(img => {
                const parent = img.parentElement;
                const rect = parent.getBoundingClientRect();
                if(rect.top < window.innerHeight && rect.bottom > 0) {
                    const shift = (window.innerHeight - rect.top) * 0.12; // Vitesse parallaxe
                    img.style.transform = `translateY(${shift}px)`;
                }
            });

            // Animation Reveal
            document.querySelectorAll('.reveal').forEach(el => {
                if(el.getBoundingClientRect().top < window.innerHeight * 0.85) el.classList.add('visible');
            });
        });

        // --- NAVIGATION ---
        window.showView = (id) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
            get(id).classList.add('active-view');
            window.scrollTo(0,0);
            window.dispatchEvent(new Event('scroll')); // Reset navbar style
        };

        window.openLogin = () => get('loginOverlay').classList.remove('hidden');
        window.closeLogin = () => get('loginOverlay').classList.add('hidden');

        // --- DATA READ ---
        onValue(ref(db, 'listings'), (snap) => {
            let html = ""; const data = snap.val();
            if(data) Object.entries(data).reverse().forEach(([id, it]) => {
                html += `
                <div class="reveal">
                    <div class="parallax-container">
                        <img src="${it.images[0]}" class="parallax-img">
                    </div>
                    <div class="py-8 border-b border-black/5 flex justify-between items-end">
                        <div>
                            <span class="text-[9px] tracking-[3px] uppercase text-slate-400 mb-2 block">${it.cat}</span>
                            <h3 class="text-3xl font-serif italic">${it.title}</h3>
                        </div>
                        <div class="text-right">
                            <p class="font-light tracking-widest text-sm">${it.price}</p>
                            ${localStorage.getItem('arcadia_staff') ? `<button onclick="del('listings/${id}')" class="text-[8px] text-red-400 mt-2 uppercase">Supprimer</button>` : ''}
                        </div>
                    </div>
                </div>`;
            });
            get('allContent').innerHTML = html;
        });

        // --- AUTH & MISC ---
        get('btnLoginAction').onclick = () => {
            const STAFF = { "Axel": "Axel30", "Alden": "Alden30" };
            if(STAFF[get('userLogin').value] === get('passLogin').value) {
                localStorage.setItem('arcadia_staff', get('userLogin').value);
                location.reload();
            } else alert("Identifiants incorrects.");
        };

        window.logout = () => { localStorage.removeItem('arcadia_staff'); location.reload(); };

        // Custom Cursor simple
        document.addEventListener('mousemove', e => {
            get('cursor').style.left = e.clientX + 'px';
            get('cursor').style.top = e.clientY + 'px';
        });

        // Init
        const user = localStorage.getItem('arcadia_staff');
        if(user) { get('activeUserDisplay').innerText = user; document.body.classList.add('is-admin'); }
    </script>
</body>
</html>
