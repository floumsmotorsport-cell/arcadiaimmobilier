<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia | Paros • L'Héritage du Luxe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:italic,wght@700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --gold: #b38e44; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        #cursor { width: 10px; height: 10px; background: var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; }
        #cursor-follower { width: 45px; height: 45px; border: 1px solid var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transition: transform 0.1s ease; }

        .btn-gold { background: linear-gradient(90deg, #8a6d3b, #b38e44, #8a6d3b); background-size: 200% auto; color: black; font-weight: 800; transition: 0.5s; text-align: center; cursor: pointer; border-radius: 50px; }
        .btn-gold:hover { background-position: right center; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(179,142,68,0.4); }

        .glass-card { background: rgba(15, 15, 15, 0.95); border: 1px solid rgba(179, 142, 68, 0.2); border-radius: 30px; backdrop-filter: blur(15px); overflow: hidden; }
        
        .arcadia-input { background: #111; border: 1px solid #222; border-radius: 12px; color: white; padding: 15px; width: 100%; outline: none; }
        .arcadia-input:focus { border-color: var(--gold); }

        .drop-zone { border: 2px dashed #333; border-radius: 15px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; background: #0c0c0c; }
        .drop-zone.dragover { border-color: var(--gold); background: rgba(179, 142, 68, 0.1); }

        .discord-embed { background: #121212; border-left: 4px solid var(--gold); border-radius: 4px; padding: 15px; max-width: 100%; }

        .status-badge { position: absolute; top: 20px; left: 20px; padding: 6px 15px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; z-index: 10; }
        .bg-vendu { background: #ef4444; color: white; }
        .bg-dispo { background: #22c55e; color: white; }
    </style>
</head>
<body>

<div id="cursor" class="hidden md:block"></div>
<div id="cursor-follower" class="hidden md:block"></div>

<nav class="fixed w-full z-50 px-12 py-6 flex justify-between items-center bg-black/80 backdrop-blur-lg border-b border-white/5">
    <div class="flex flex-col">
        <span class="text-2xl font-serif italic leading-none">Arcadia<span class="text-gold">.</span></span>
        <span class="text-[9px] tracking-[4px] uppercase text-gold">Paros • International</span>
    </div>
    <div class="hidden lg:flex gap-10 items-center">
        <a href="#villas" class="text-[10px] uppercase tracking-[3px] opacity-60 hover:opacity-100 transition">Catalogue</a>
        <a href="#presse" class="text-[10px] uppercase tracking-[3px] opacity-60 hover:opacity-100 transition">Presse</a>
        <a href="tel:0629070034" class="text-gold font-bold tracking-widest text-xs">06 29 07 00 34</a>
    </div>
    <div class="flex items-center gap-6">
        <button onclick="checkStaffAccess()" class="opacity-10 hover:opacity-100 transition text-[9px]">ADMIN</button>
        <button onclick="openOrderModal()" class="btn-gold px-8 py-3 text-[10px] uppercase tracking-widest">Commander</button>
    </div>
</nav>

<section class="h-screen flex items-center justify-center relative overflow-hidden">
    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?q=80&w=2075')] bg-cover bg-center opacity-60"></div>
    <div class="relative z-10 text-center px-4" data-aos="zoom-out">
        <h2 class="text-gold tracking-[15px] text-[10px] uppercase mb-4 font-bold">L'Excellence à Paros</h2>
        <h1 class="text-6xl md:text-9xl font-serif italic mb-6">Pureté & Prestige</h1>
        <button onclick="document.getElementById('villas').scrollIntoView()" class="btn-gold px-12 py-4 text-xs">Explorer le Catalogue</button>
    </div>
</section>

<section id="villas" class="py-32 px-10">
    <div class="max-w-7xl mx-auto">
        <h3 class="text-4xl font-serif italic mb-16">Collection Privée</h3>
        <div id="listingGrid" class="grid md:grid-cols-3 gap-10"></div>
    </div>
</section>

<div id="staffModal" class="fixed inset-0 z-[2000] bg-black hidden flex items-center justify-center p-6">
    <div class="w-full max-w-6xl h-[90vh] glass-card flex flex-col border-gold/30">
        <div class="p-6 border-b border-white/10 flex justify-between bg-white/5 items-center">
            <span class="font-serif italic text-xl text-gold">● Arcadia Control Panel</span>
            <button onclick="closeStaffModal()" class="text-3xl opacity-40">&times;</button>
        </div>
        <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
            <div class="w-full md:w-1/2 p-8 border-r border-white/5 space-y-6 overflow-y-auto">
                <input type="hidden" id="editId">
                <input type="text" id="vTitle" placeholder="NOM DU BIEN" class="arcadia-input" oninput="updatePreview()">
                <input type="number" id="vPrice" placeholder="PRIX (€)" class="arcadia-input" oninput="updatePreview()">
                <select id="vStatus" class="arcadia-input" onchange="updatePreview()">
                    <option value="dispo">Disponible</option>
                    <option value="vendu">Vendu</option>
                </select>
                <textarea id="vDesc" placeholder="DESCRIPTION" class="arcadia-input h-20" oninput="updatePreview()"></textarea>
                
                <div id="dropZone" class="drop-zone">
                    <p id="dropText" class="text-[10px] uppercase tracking-widest opacity-40">Glissez votre image ici</p>
                    <input type="file" id="fileInput" hidden accept="image/*">
                    <input type="hidden" id="vImg">
                </div>

                <div class="discord-embed">
                    <div class="text-white font-bold mb-2" id="preTitle">Aperçu du Dossier</div>
                    <div class="text-xs text-gray-400">Prix: <span class="text-white" id="prePrice">0 €</span></div>
                    <div class="text-xs text-gray-400 mb-4">Statut: <span class="text-white" id="preStatus">Disponible</span></div>
                    <img src="" id="preImg" class="w-full h-32 object-cover rounded mt-2 border border-white/10 hidden">
                </div>
                <button onclick="saveListing()" class="btn-gold w-full py-4 text-xs" id="saveBtn">Publier l'unité</button>
            </div>
            <div class="w-full md:w-1/2 p-8 overflow-y-auto bg-black/40">
                <h4 class="text-[10px] uppercase font-bold opacity-30 mb-6 tracking-widest">Unités Actives</h4>
                <div id="adminList" class="space-y-4"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialisation Base de données
    let listings = JSON.parse(localStorage.getItem('arcadia_final')) || [
        { id: 1, title: "Villa Syrta", price: 128000000, status: "vendu", img: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=600" },
        { id: 2, title: "Domaine GOUV", price: 110000000, status: "vendu", img: "https://images.unsplash.com/photo-1600607687940-477a284e6923?w=600" }
    ];

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    // Drag & Drop
    dropZone.onclick = () => fileInput.click();
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('bg-gold/10'); };
    dropZone.ondragleave = () => dropZone.classList.remove('bg-gold/10');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        handleFile(e.dataTransfer.files[0]);
    };
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    function handleFile(file) {
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('vImg').value = e.target.result;
                updatePreview();
                document.getElementById('dropText').innerText = "IMAGE CHARGÉE ✓";
            };
            reader.readAsDataURL(file);
        }
    }

    // Rendu des listes
    function render() {
        const grid = document.getElementById('listingGrid');
        const adminList = document.getElementById('adminList');
        grid.innerHTML = ""; adminList.innerHTML = "";

        listings.forEach(v => {
            // Catalogue Public
            grid.innerHTML += `
                <div class="glass-card group relative" data-aos="fade-up">
                    <div class="status-badge bg-${v.status}">${v.status}</div>
                    <img src="${v.img}" class="w-full h-72 object-cover group-hover:scale-110 transition duration-1000">
                    <div class="p-10 text-center">
                        <h3 class="text-2xl font-serif italic mb-2">${v.title}</h3>
                        <p class="text-gold font-bold text-xl">${v.price.toLocaleString()} €</p>
                    </div>
                </div>`;

            // Liste Admin
            adminList.innerHTML += `
                <div class="flex justify-between items-center p-4 bg-white/5 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-4">
                        <img src="${v.img}" class="w-12 h-12 rounded-lg object-cover">
                        <div>
                            <p class="font-bold text-sm">${v.title}</p>
                            <p class="text-[10px] opacity-40">${v.price.toLocaleString()}€ — ${v.status}</p>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="loadEdit(${v.id})" class="text-[9px] text-blue-400 font-bold uppercase">Modifier</button>
                        <button onclick="deleteListing(${v.id})" class="text-[9px] text-red-500 font-bold uppercase">Radier</button>
                    </div>
                </div>`;
        });
        localStorage.setItem('arcadia_final', JSON.stringify(listings));
    }

    function updatePreview() {
        document.getElementById('preTitle').innerText = document.getElementById('vTitle').value || "Nom de l'unité";
        document.getElementById('prePrice').innerText = (parseInt(document.getElementById('vPrice').value) || 0).toLocaleString() + " €";
        document.getElementById('preStatus').innerText = document.getElementById('vStatus').value === "dispo" ? "Disponible" : "Vendu";
        const img = document.getElementById('vImg').value;
        if(img) { document.getElementById('preImg').src = img; document.getElementById('preImg').classList.remove('hidden'); }
    }

    function saveListing() {
        const id = document.getElementById('editId').value;
        const title = document.getElementById('vTitle').value;
        const price = parseInt(document.getElementById('vPrice').value);
        const img = document.getElementById('vImg').value;

        if(!title || !price || !img) return alert("Veuillez remplir tous les champs et ajouter une image.");

        const data = {
            id: id ? parseInt(id) : Date.now(),
            title: title,
            price: price,
            status: document.getElementById('vStatus').value,
            img: img
        };

        if(id) {
            const index = listings.findIndex(l => l.id == id);
            listings[index] = data;
        } else {
            listings.push(data);
        }

        render();
        resetForm();
        closeStaffModal();
    }

    function deleteListing(id) {
        if(confirm("Confirmer la radiation définitive de cette unité ?")) {
            listings = listings.filter(l => l.id != id);
            render();
        }
    }

    function loadEdit(id) {
        const v = listings.find(l => l.id == id);
        document.getElementById('editId').value = v.id;
        document.getElementById('vTitle').value = v.title;
        document.getElementById('vPrice').value = v.price;
        document.getElementById('vStatus').value = v.status;
        document.getElementById('vImg').value = v.img;
        document.getElementById('saveBtn').innerText = "Enregistrer les modifications";
        updatePreview();
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('vTitle').value = "";
        document.getElementById('vPrice').value = "";
        document.getElementById('vImg').value = "";
        document.getElementById('saveBtn').innerText = "Publier l'unité";
        document.getElementById('dropText').innerText = "Glissez votre image ici";
        document.getElementById('preImg').classList.add('hidden');
    }

    // Modals
    window.closeStaffModal = () => document.getElementById('staffModal').classList.add('hidden');
    window.checkStaffAccess = () => { if(prompt("Code Terminal :") === "Immo30") document.getElementById('staffModal').classList.remove('hidden'); };

    // Animations
    document.addEventListener('mousemove', e => {
        gsap.to('#cursor', { x: e.clientX, y: e.clientY, duration: 0.1 });
        gsap.to('#cursor-follower', { x: e.clientX - 22, y: e.clientY - 22, duration: 0.3 });
    });

    AOS.init({ duration: 1200 });
    render();
</script>
</body>
</html>
