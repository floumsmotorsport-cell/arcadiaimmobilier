<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Studio | Management Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #b38e44; --dark: #0a0a0a; --panel: #111111; }

        /* Global Style - Fusion Dark Luxury */
        * { transition: all 0.25s ease; cursor: crosshair; }
        ::selection { background: var(--gold); color: white; }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--dark);
            color: white; 
            overflow-x: hidden;
        }
        .font-serif { font-family: 'Cormorant Garamond', serif; }

        /* Hero & Background Video */
        .hero-mini { height: 40vh; position: relative; overflow: hidden; border-bottom: 1px solid rgba(179,142,68,0.3); }
        .hero-mini video { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, var(--dark)); }

        /* Glass Panel Staff Edition */
        .glass-panel {
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .glass-panel:hover { border-color: var(--gold); transform: translateY(-3px); }

        /* Inputs Premium */
        .input-pro { 
            width: 100%; 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 14px; 
            border-radius: 8px; 
            outline: none; 
            margin-bottom: 15px; 
            font-size: 13px; 
            background: rgba(255,255,255,0.03);
            color: white;
        }
        .input-pro:focus { border-color: var(--gold); background: rgba(255,255,255,0.07); }
        
        /* Buttons */
        .btn-save { 
            background: var(--gold); 
            color: black; 
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 10px;
            padding: 12px;
            border-radius: 4px;
        }
        .btn-save:hover { transform: scale(1.02); filter: brightness(1.2); box-shadow: 0 0 20px rgba(179,142,68,0.4); }

        /* Animations Fade Up */
        .fade-up { opacity: 0; transform: translateY(30px); transition: 0.8s; }
        .fade-up.show { opacity: 1; transform: translateY(0); }

        /* Tabs */
        .tab-btn { position: relative; padding: 12px 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; opacity: 0.4; color: white; }
        .tab-btn.active { opacity: 1; color: var(--gold); }
        .tab-btn::after { content: ""; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background: var(--gold); transition: 0.3s; }
        .tab-btn.active::after { width: 100%; }

        .admin-section { display: none; }
        .admin-section.active { display: block; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Scrollbar Luxe */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--dark); }
        ::-webkit-scrollbar-thumb { background: var(--gold); }
    </style>
</head>
<body>

    <section class="hero-mini flex items-center justify-center">
        <video autoplay muted loop playsinline>
            <source src="https://cdn.coverr.co/videos/coverr-luxury-house-1574/1080p.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
        <div class="relative text-center z-10">
            <h1 class="font-serif text-5xl md:text-7xl italic fade-up show">Arcadia Studio</h1>
            <p class="text-[10px] tracking-[10px] uppercase opacity-60 mt-4 fade-up show">Staff Management Suite</p>
        </div>
    </section>

    <div class="max-w-7xl mx-auto px-6 -mt-20 relative z-20 pb-20">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div class="flex gap-6 border-b border-white/10 w-full md:w-auto">
                <button onclick="openTab('secBiens', this)" class="tab-btn active">Collection</button>
                <button onclick="openTab('secEdito', this)" class="tab-btn">Édito</button>
                <button onclick="openTab('secMsg', this)" class="tab-btn">Messages</button>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-[9px] font-bold uppercase tracking-widest bg-white/5 border border-white/10 px-4 py-2 rounded" id="userTag">Agent: Connecté</span>
                <button onclick="window.location.href='index.html'" class="text-[9px] uppercase font-bold text-gold underline">Sortir du Studio</button>
            </div>
        </div>

        <div id="secBiens" class="admin-section active grid grid-cols-1 lg:grid-cols-2 gap-12">
            
            <div class="glass-panel p-8 fade-up show">
                <h3 class="font-serif text-3xl italic mb-8 border-b border-white/5 pb-4">Configuration</h3>
                <input type="hidden" id="edit_id_bien">
                
                <input type="text" id="bTitle" placeholder="Nom de la propriété" class="input-pro" oninput="updatePreview()">
                
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="bPrice" placeholder="Prix (ex: 2 500 000€)" class="input-pro" oninput="updatePreview()">
                    <select id="bCat" class="input-pro text-gray-400" onchange="updatePreview()">
                        <option value="Villa">Villa Exclusive</option>
                        <option value="Penthouse">Penthouse Skyline</option>
                        <option value="Manoir">Manoir Royal</option>
                    </select>
                </div>

                <textarea id="bDesc" placeholder="Description poétique et luxueuse..." class="input-pro h-32" oninput="updatePreview()"></textarea>
                
                <label class="text-[9px] uppercase tracking-widest opacity-40 mb-4 block">Médias haute résolution</label>
                <input type="file" id="bFiles" class="text-xs mb-6 text-gray-500" multiple>
                <div id="bImgGrid" class="grid grid-cols-4 gap-2 mb-8"></div>
                
                <button id="btnPublish" class="btn-save w-full">Publier l'Annonce</button>
            </div>

            <div class="fade-up show" style="transition-delay: 0.2s;">
                <h3 class="text-[10px] font-bold uppercase tracking-[4px] mb-6 opacity-40 italic">Aperçu du Catalogue</h3>
                
                <div id="livePreview">
                    <div class="rounded-2xl overflow-hidden bg-[#111] border border-white/5 shadow-2xl">
                        <div class="h-80 bg-cover bg-center" style="background-image:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c')"></div>
                        <div class="p-8">
                            <span class="text-gold text-[10px] tracking-[3px] uppercase" id="preCat">Villa Exclusive</span>
                            <h4 class="font-serif text-4xl mt-2 italic" id="preTitle">Villa Horizon</h4>
                            <p class="text-sm opacity-50 mt-4 italic font-light leading-relaxed" id="preDesc">Le futur bien d'exception d'Arcadia...</p>
                            <div class="mt-8 pt-6 border-t border-white/5 flex justify-between items-center">
                                <span class="font-serif text-2xl" id="prePrice">2 500 000€</span>
                                <div class="w-10 h-10 border border-gold/30 rounded-full flex items-center justify-center text-gold">→</div>
                            </div>
                        </div>
                    </div>
                </div>

                <h3 class="text-[10px] font-bold uppercase tracking-[4px] mt-16 mb-6 opacity-40">Gestion du Portfolio</h3>
                <div id="listBiensAdmin" class="space-y-4"></div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const get = id => document.getElementById(id);

        // --- TABS ---
        window.openTab = (id, btn) => {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            get(id).classList.add('active');
            btn.classList.add('active');
        };

        // --- LIVE PREVIEW ---
        let currentImgs = [];
        window.updatePreview = () => {
            get('preTitle').innerText = get('bTitle').value || "Villa Horizon";
            get('prePrice').innerText = get('bPrice').value || "Prix sur demande";
            get('preCat').innerText = get('bCat').value;
            get('preDesc').innerText = get('bDesc').value || "Le futur bien d'exception d'Arcadia...";
        };

        // --- IMAGES ---
        get('bFiles').onchange = (e) => {
            currentImgs = []; get('bImgGrid').innerHTML = "";
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader(); r.onload = ev => {
                    currentImgs.push(ev.target.result);
                    get('bImgGrid').innerHTML += `<img src="${ev.target.result}" class="w-full aspect-square object-cover rounded border border-white/10">`;
                }; r.readAsDataURL(f);
            });
        };

        // --- CRUD FIREBASE ---
        get('btnPublish').onclick = () => {
            const id = get('edit_id_bien').value;
            const data = {
                title: get('bTitle').value,
                price: get('bPrice').value,
                cat: get('bCat').value,
                desc: get('bDesc').value,
                images: currentImgs,
                date: Date.now()
            };

            if(id) {
                update(ref(db, `listings/${id}`), data).then(() => location.reload());
            } else {
                push(ref(db, 'listings'), data).then(() => location.reload());
            }
        };

        // Chargement liste Admin
        onValue(ref(db, 'listings'), (snap) => {
            let html = "";
            if(snap.val()) Object.entries(snap.val()).reverse().forEach(([id, it]) => {
                html += `
                <div class="glass-panel p-4 flex items-center justify-between border-l-2 border-l-gold">
                    <div class="flex items-center gap-4">
                        <img src="${it.images[0]}" class="w-12 h-12 rounded object-cover">
                        <div>
                            <p class="text-xs font-bold uppercase">${it.title}</p>
                            <p class="text-[9px] text-gold tracking-widest">${it.price}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editBien('${id}')" class="text-[9px] border border-white/10 px-3 py-1 hover:bg-white/10 uppercase">Éditer</button>
                        <button onclick="del('${id}')" class="text-[9px] border border-red-900/30 text-red-500 px-3 py-1 hover:bg-red-500/10 uppercase">Suppr</button>
                    </div>
                </div>`;
            });
            get('listBiensAdmin').innerHTML = html;
        });

        window.editBien = (id) => {
            onValue(ref(db, `listings/${id}`), (snap) => {
                const it = snap.val();
                get('edit_id_bien').value = id;
                get('bTitle').value = it.title;
                get('bPrice').value = it.price;
                get('bCat').value = it.cat;
                get('bDesc').value = it.desc;
                currentImgs = it.images;
                get('btnPublish').innerText = "Sauvegarder les modifications";
                window.updatePreview();
                window.scrollTo({top: 300, behavior: 'smooth'});
            }, {onlyOnce: true});
        };

        window.del = (id) => { if(confirm("Supprimer ce bien du catalogue ?")) remove(ref(db, `listings/${id}`)); };

        // Animation on scroll
        const obs = new IntersectionObserver(entries => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('show'); });
        });
        document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
    </script>
</body>
</html>
