<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Studio | Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@200;300;400;500&display=swap');
        
        :root { --gold: #b38e44; --dark: #0f172a; --light: #fdfdfd; }
        body { font-family: 'Montserrat', sans-serif; background: #f4f4f4; color: var(--dark); }
        .font-serif { font-family: 'Cormorant Garamond', serif; }

        /* Style Panel Pro */
        .glass-panel { background: white; border: 1px solid #e5e7eb; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .input-pro { width: 100%; border: 1px solid #e5e7eb; padding: 12px; border-radius: 4px; outline: none; margin-bottom: 15px; font-size: 13px; transition: 0.3s; }
        .input-pro:focus { border-color: var(--gold); ring: 1px solid var(--gold); }
        
        .preview-box { border: 2px dashed #ddd; border-radius: 8px; min-height: 200px; padding: 20px; background: white; }
        
        /* Badge Status */
        .badge-star { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; padding: 2px 8px; font-size: 9px; font-weight: bold; border-radius: 10px; }
        
        /* Boutons */
        .btn-action { padding: 8px 15px; font-size: 10px; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; transition: 0.2s; border-radius: 4px; }
        .btn-save { background: var(--dark); color: white; }
        .btn-edit { background: #f3f4f6; color: #374151; }
        .btn-del { background: #fee2e2; color: #b91c1c; }

        /* Tab System */
        .tab-btn { padding: 10px 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; border-bottom: 2px solid transparent; opacity: 0.5; }
        .tab-btn.active { opacity: 1; border-bottom-color: var(--gold); color: var(--gold); }
        
        .admin-section { display: none; animation: fadeIn 0.4s ease; }
        .admin-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Images Preview Grid */
        .img-grid { display: grid; grid-template-cols: repeat(4, 1fr); gap: 10px; margin-top: 10px; }
        .img-preview { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="font-serif text-5xl italic">Arcadia Studio</h1>
                <p class="text-[10px] tracking-[5px] uppercase opacity-50 mt-2">Professional Management Suite</p>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-xs font-bold uppercase tracking-widest bg-white px-4 py-2 border rounded" id="userTag"></span>
                <button onclick="window.location.href='index.html'" class="text-[10px] uppercase font-bold text-gold underline">Voir le site public</button>
            </div>
        </div>

        <div class="flex gap-8 mb-8 border-b">
            <button onclick="openTab('secBiens', this)" class="tab-btn active">Immobilier</button>
            <button onclick="openTab('secEdito', this)" class="tab-btn">L'Édito / Articles</button>
            <button onclick="openTab('secMessages', this)" class="tab-btn">Messages Recus</button>
        </div>

        <div id="secBiens" class="admin-section active grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="glass-panel p-8">
                <h3 class="font-serif text-2xl italic mb-6">Configuration de l'annonce</h3>
                <input type="hidden" id="edit_id_bien">
                <input type="text" id="bTitle" placeholder="Nom de la villa (ex: The Rockford Palace)" class="input-pro" oninput="updatePreviewBien()">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="bPrice" placeholder="Prix (ex: $2.500.000)" class="input-pro" oninput="updatePreviewBien()">
                    <select id="bCat" class="input-pro" onchange="updatePreviewBien()">
                        <option value="Villa">Villa de Luxe</option>
                        <option value="Penthouse">Penthouse</option>
                        <option value="Appartement">Appartement</option>
                        <option value="Manoir">Manoir</option>
                    </select>
                </div>
                <textarea id="bDesc" placeholder="Description courte et élégante..." class="input-pro h-24" oninput="updatePreviewBien()"></textarea>
                <input type="file" id="bFiles" class="text-xs mb-6" multiple>
                <div class="img-grid" id="bImgGrid"></div>
                
                <div class="flex gap-4 mt-8">
                    <button id="btnPublishBien" class="btn-action btn-save flex-1">Publier l'annonce</button>
                    <button onclick="resetBienForm()" class="btn-action btn-edit">Reset</button>
                </div>
            </div>

            <div>
                <h3 class="text-[10px] font-bold uppercase tracking-widest mb-4 opacity-40 italic">Aperçu en direct</h3>
                <div id="previewBien" class="preview-box">
                    </div>
                
                <h3 class="text-[10px] font-bold uppercase tracking-widest mt-10 mb-4 opacity-40">Annonces Actives</h3>
                <div id="listBiensAdmin" class="space-y-4"></div>
            </div>
        </div>

        <div id="secEdito" class="admin-section grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="glass-panel p-8">
                <h3 class="font-serif text-2xl italic mb-6">Rédiger un article</h3>
                <input type="text" id="aTitle" placeholder="Titre de l'article" class="input-pro" oninput="updatePreviewArt()">
                <textarea id="aContent" placeholder="Contenu de l'article..." class="input-pro h-48" oninput="updatePreviewArt()"></textarea>
                <input type="file" id="aFile" class="text-xs mb-6">
                <button id="btnPublishArt" class="btn-action btn-save w-full">Publier l'Edito</button>
            </div>
            <div>
                <h3 class="text-[10px] font-bold uppercase tracking-widest mb-4 opacity-40">Aperçu Magazine</h3>
                <div id="previewArt" class="preview-box"></div>
                <div id="listArtAdmin" class="mt-10 space-y-4"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, set, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const get = id => document.getElementById(id);

        // --- TABS LOGIC ---
        window.openTab = (id, btn) => {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            get(id).classList.add('active');
            btn.classList.add('active');
        };

        // --- LIVE PREVIEWS ---
        window.updatePreviewBien = () => {
            const title = get('bTitle').value || "Titre de l'annonce";
            const price = get('bPrice').value || "Prix non défini";
            const cat = get('bCat').value;
            const desc = get('bDesc').value || "Description en attente...";
            
            get('previewBien').innerHTML = `
                <div class="border rounded-lg overflow-hidden bg-slate-50">
                    <div class="h-48 bg-slate-200 flex items-center justify-center text-xs text-slate-400">Image en attente</div>
                    <div class="p-6">
                        <span class="text-[9px] uppercase tracking-widest text-gold font-bold">${cat}</span>
                        <h4 class="font-serif text-3xl italic mt-2">${title}</h4>
                        <p class="text-xs mt-4 text-slate-500 italic">${desc}</p>
                        <div class="mt-6 pt-4 border-t flex justify-between items-center">
                            <span class="font-bold text-sm">${price}</span>
                            <span class="text-[9px] uppercase tracking-widest opacity-40">Preview Arcadia</span>
                        </div>
                    </div>
                </div>
            `;
        };

        window.updatePreviewArt = () => {
            const title = get('aTitle').value || "Titre de l'article";
            const content = get('aContent').value || "Contenu de l'article...";
            get('previewArt').innerHTML = `
                <div class="text-center">
                    <span class="text-[8px] tracking-[4px] uppercase text-gold block mb-4">Édito Arcadia</span>
                    <h2 class="font-serif text-4xl italic mb-6">${title}</h2>
                    <p class="text-sm text-slate-500 font-light leading-relaxed text-justify">${content.substring(0,200)}...</p>
                </div>
            `;
        };

        // --- GESTION MEDIA ---
        let bImgs = []; get('bFiles').onchange = (e) => {
            bImgs = []; get('bImgGrid').innerHTML = "";
            Array.from(e.target.files).forEach(f => {
                const r = new FileReader(); r.onload = ev => {
                    bImgs.push(ev.target.result);
                    get('bImgGrid').innerHTML += `<img src="${ev.target.result}" class="img-preview">`;
                }; r.readAsDataURL(f);
            });
        };

        // --- PUBLISH & MODIFIER ---
        get('btnPublishBien').onclick = () => {
            const id = get('edit_id_bien').value;
            const data = {
                title: get('bTitle').value,
                price: get('bPrice').value,
                cat: get('bCat').value,
                desc: get('bDesc').value,
                images: bImgs,
                date: Date.now(),
                featured: false
            };

            if(id) {
                update(ref(db, `listings/${id}`), data).then(() => { alert("Modifié !"); location.reload(); });
            } else {
                push(ref(db, 'listings'), data).then(() => { alert("Publié !"); location.reload(); });
            }
        };

        // --- CHARGEMENT LISTES ADMIN ---
        onValue(ref(db, 'listings'), (snap) => {
            let html = "";
            if(snap.val()) Object.entries(snap.val()).reverse().forEach(([id, it]) => {
                html += `
                <div class="glass-panel p-4 flex items-center gap-4">
                    <img src="${it.images[0]}" class="w-16 h-16 rounded object-cover">
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold">${it.title}</span>
                            ${it.featured ? '<span class="badge-star">Vedette</span>' : ''}
                        </div>
                        <p class="text-[9px] text-slate-400 uppercase tracking-widest">${it.price} - ${it.cat}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleFeature('${id}', ${it.featured})" class="btn-action bg-white border">⭐</button>
                        <button onclick="editBien('${id}')" class="btn-action btn-edit">Edit</button>
                        <button onclick="del('listings/${id}')" class="btn-action btn-del">Suppr</button>
                    </div>
                </div>`;
            });
            get('listBiensAdmin').innerHTML = html;
        });

        // --- FONCTIONS MODIF ---
        window.editBien = (id) => {
            onValue(ref(db, `listings/${id}`), (snap) => {
                const it = snap.val();
                get('edit_id_bien').value = id;
                get('bTitle').value = it.title;
                get('bPrice').value = it.price;
                get('bCat').value = it.cat;
                get('bDesc').value = it.desc;
                bImgs = it.images;
                get('btnPublishBien').innerText = "Sauvegarder les modifications";
                window.updatePreviewBien();
                window.scrollTo({top: 0, behavior: 'smooth'});
            }, {onlyOnce: true});
        };

        window.toggleFeature = (id, current) => {
            update(ref(db, `listings/${id}`), { featured: !current });
        };

        window.del = (path) => { if(confirm("Confirmer la suppression ?")) remove(ref(db, path)); };
        
        window.resetBienForm = () => { location.reload(); };

        // --- INIT ---
        const user = localStorage.getItem('staff');
        if(!user) window.location.href = 'index.html';
        get('userTag').innerText = `Agent: ${user}`;
        updatePreviewBien();
        updatePreviewArt();
    </script>
</body>
</html>
