<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Immobilier | Gestion Administrative</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap');
        body { font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; }
        .admin-panel { display: none; }
        .admin-active .admin-panel { display: block; }
        .admin-active .public-view { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-emerald-700 italic">ARCADIA</h1>
            <div class="flex items-center space-x-4">
                <button onclick="toggleAdmin()" id="adminBtn" class="text-sm bg-gray-200 px-4 py-2 rounded-full hover:bg-gray-300 transition">
                    <i class="fas fa-lock mr-2"></i>Mode Admin
                </button>
            </div>
        </div>
    </nav>

    <div class="public-view">
        <header class="relative h-[60vh] flex items-center justify-center text-white">
            <div class="absolute inset-0 z-0">
                <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80" class="w-full h-full object-cover brightness-50">
            </div>
            <div class="relative z-10 text-center">
                <h2 class="text-5xl font-bold">Nos Propriétés d'Exception</h2>
            </div>
        </header>

        <section class="py-16 max-w-7xl mx-auto px-6">
            <div id="property-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
                </div>
        </section>
    </div>

    <div class="admin-panel pt-24 min-h-screen bg-gray-100">
        <div class="max-w-4xl mx-auto p-6">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-emerald-800">Gestion du Catalogue</h2>
                <button onclick="toggleAdmin()" class="text-red-500 font-bold">Quitter</button>
            </div>

            <div class="bg-white p-8 rounded-xl shadow-md mb-12">
                <h3 id="formTitle" class="text-xl font-bold mb-4 italic text-emerald-600">Ajouter un nouveau bien</h3>
                <form id="propForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="hidden" id="editIndex">
                    <input type="text" id="title" placeholder="Titre (ex: Villa Moderne)" class="p-3 border rounded" required>
                    <input type="text" id="price" placeholder="Prix (ex: 450 000 €)" class="p-3 border rounded" required>
                    <input type="text" id="loc" placeholder="Localisation (ex: Cannes)" class="p-3 border rounded" required>
                    <select id="type" class="p-3 border rounded">
                        <option value="Vente">Vente</option>
                        <option value="Location">Location</option>
                    </select>
                    <input type="url" id="img" placeholder="URL de l'image (Lien Unsplash ou autre)" class="p-3 border rounded md:col-span-2" required>
                    <textarea id="desc" placeholder="Description courte" class="p-3 border rounded md:col-span-2" required></textarea>
                    <button type="submit" id="submitBtn" class="md:col-span-2 bg-emerald-600 text-white py-3 rounded-lg font-bold hover:bg-emerald-700">Enregistrer le bien</button>
                    <button type="button" id="cancelBtn" onclick="resetForm()" class="hidden md:col-span-2 bg-gray-400 text-white py-2 rounded-lg">Annuler la modification</button>
                </form>
            </div>

            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-emerald-50">
                        <tr>
                            <th class="p-4">Bien</th>
                            <th class="p-4">Prix</th>
                            <th class="p-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-list">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Initialisation des données (soit depuis le stockage local, soit par défaut)
        let properties = JSON.parse(localStorage.getItem('arcadia_props')) || [
            { title: "Villa Azur", price: "850 000 €", type: "Vente", loc: "Nice", img: "https://images.unsplash.com/photo-1613490493576-7fde63acd811?auto=format&fit=crop&q=80&w=500", desc: "Superbe villa vue mer." },
            { title: "Appartement Design", price: "1 200 €/mois", type: "Location", loc: "Paris", img: "https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?auto=format&fit=crop&q=80&w=500", desc: "Lumineux et moderne." }
        ];

        const propForm = document.getElementById('propForm');
        const grid = document.getElementById('property-grid');
        const adminList = document.getElementById('admin-list');

        function saveAndRefresh() {
            localStorage.setItem('arcadia_props', JSON.stringify(properties));
            renderPublic();
            renderAdmin();
        }

        // Affichage côté Public
        function renderPublic() {
            grid.innerHTML = properties.map(p => `
                <div class="bg-white rounded-xl shadow-lg overflow-hidden">
                    <img src="${p.img}" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <span class="text-xs font-bold text-emerald-600 uppercase">${p.type}</span>
                        <h4 class="text-xl font-bold">${p.title}</h4>
                        <p class="text-gray-500 text-sm mb-4">${p.desc}</p>
                        <div class="flex justify-between items-center border-t pt-4">
                            <span class="font-bold text-lg">${p.price}</span>
                            <span class="text-gray-400 text-sm"><i class="fas fa-map-marker-alt"></i> ${p.loc}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Affichage côté Admin
        function renderAdmin() {
            adminList.innerHTML = properties.map((p, index) => `
                <tr class="border-t">
                    <td class="p-4 font-bold">${p.title}</td>
                    <td class="p-4">${p.price}</td>
                    <td class="p-4 text-right">
                        <button onclick="editProperty(${index})" class="text-blue-500 mr-3"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProperty(${index})" class="text-red-500"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // Ajouter ou Modifier un bien
        propForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const index = document.getElementById('editIndex').value;
            const newProp = {
                title: document.getElementById('title').value,
                price: document.getElementById('price').value,
                loc: document.getElementById('loc').value,
                type: document.getElementById('type').value,
                img: document.getElementById('img').value,
                desc: document.getElementById('desc').value
            };

            if (index === "") {
                properties.push(newProp); // Ajouter
            } else {
                properties[index] = newProp; // Modifier
            }

            resetForm();
            saveAndRefresh();
        });

        function deleteProperty(index) {
            if(confirm("Supprimer ce bien ?")) {
                properties.splice(index, 1);
                saveAndRefresh();
            }
        }

        function editProperty(index) {
            const p = properties[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('title').value = p.title;
            document.getElementById('price').value = p.price;
            document.getElementById('loc').value = p.loc;
            document.getElementById('type').value = p.type;
            document.getElementById('img').value = p.img;
            document.getElementById('desc').value = p.desc;
            
            document.getElementById('formTitle').innerText = "Modifier : " + p.title;
            document.getElementById('submitBtn').innerText = "Mettre à jour";
            document.getElementById('cancelBtn').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function resetForm() {
            propForm.reset();
            document.getElementById('editIndex').value = "";
            document.getElementById('formTitle').innerText = "Ajouter un nouveau bien";
            document.getElementById('submitBtn').innerText = "Enregistrer le bien";
            document.getElementById('cancelBtn').classList.add('hidden');
        }

        function toggleAdmin() {
            document.body.classList.toggle('admin-active');
            const isAdmin = document.body.classList.contains('admin-active');
            document.getElementById('adminBtn').innerHTML = isAdmin ? 
                '<i class="fas fa-eye mr-2"></i>Voir le site' : 
                '<i class="fas fa-lock mr-2"></i>Mode Admin';
        }

        // Lancement initial
        renderPublic();
        renderAdmin();
    </script>
</body>
</html>
