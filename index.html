<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia | Paros • L'Héritage du Luxe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:italic,wght@700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --gold: #b38e44; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        #cursor { width: 10px; height: 10px; background: var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; }
        #cursor-follower { width: 45px; height: 45px; border: 1px solid var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9998; transition: transform 0.1s ease; }

        .btn-gold { background: linear-gradient(90deg, #8a6d3b, #b38e44, #8a6d3b); background-size: 200% auto; color: black; font-weight: 800; transition: 0.5s; text-align: center; cursor: pointer; border-radius: 50px; }
        .btn-gold:hover { background-position: right center; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(179,142,68,0.4); }

        .glass-card { background: rgba(15, 15, 15, 0.95); border: 1px solid rgba(179, 142, 68, 0.2); border-radius: 30px; backdrop-filter: blur(15px); overflow: hidden; }
        .arcadia-input { background: #111; border: 1px solid #222; border-radius: 12px; color: white; padding: 15px; width: 100%; outline: none; transition: 0.3s; }
        .arcadia-input:focus { border-color: var(--gold); }

        .drop-zone { border: 2px dashed #333; border-radius: 15px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; background: #0c0c0c; }
        .drop-zone.dragover { border-color: var(--gold); background: rgba(179, 142, 68, 0.1); }

        .discord-embed { background: #121212; border-left: 4px solid var(--gold); border-radius: 4px; padding: 15px; max-width: 100%; }
        
        .status-badge { position: absolute; top: 20px; left: 20px; padding: 6px 15px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; z-index: 10; }
        .bg-vendu { background: #ef4444; } .bg-dispo { background: #22c55e; }

        .service-card { border-left: 2px solid var(--gold); transition: 0.4s; }
        .service-card:hover { background: rgba(179, 142, 68, 0.05); transform: translateX(10px); }
    </style>
</head>
<body>

<div id="cursor" class="hidden md:block"></div>
<div id="cursor-follower" class="hidden md:block"></div>

<nav class="fixed w-full z-50 px-12 py-6 flex justify-between items-center bg-black/80 backdrop-blur-lg border-b border-white/5">
    <div class="flex flex-col">
        <span class="text-2xl font-serif italic leading-none">Arcadia<span class="text-gold">.</span></span>
        <span class="text-[9px] tracking-[4px] uppercase text-gold">Paros • International</span>
    </div>
    <div class="hidden lg:flex gap-10 items-center">
        <a href="#propos" class="text-[10px] uppercase tracking-[3px] opacity-60 hover:opacity-100 transition">À Propos</a>
        <a href="#villas" class="text-[10px] uppercase tracking-[3px] opacity-60 hover:opacity-100 transition">Catalogue</a>
        <a href="#services" class="text-[10px] uppercase tracking-[3px] opacity-60 hover:opacity-100 transition">Services & Sécurité</a>
        <a href="tel:0629070034" class="text-gold font-bold tracking-widest text-xs">06 29 07 00 34</a>
    </div>
    <div class="flex items-center gap-6">
        <button onclick="checkStaffAccess()" class="opacity-10 hover:opacity-100 transition text-[9px]">ADMIN</button>
        <button onclick="openOrderModal()" class="btn-gold px-8 py-3 text-[10px] uppercase tracking-widest">Commander</button>
    </div>
</nav>

<section class="h-screen flex items-center justify-center relative overflow-hidden">
    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?q=80&w=2075')] bg-cover bg-center opacity-40"></div>
    <div class="relative z-10 text-center px-4" data-aos="zoom-out">
        <h1 class="text-6xl md:text-9xl font-serif italic mb-6">L'Art de Vivre.</h1>
        <p class="tracking-[10px] uppercase text-xs text-gold">Immobilier d'exception & Sécurité de pointe</p>
    </div>
</section>

<section id="villas" class="py-32 px-10 bg-[#030303]">
    <div class="max-w-7xl mx-auto">
        <h3 class="text-5xl font-serif italic mb-16">Collection Privée</h3>
        <div id="listingGrid" class="grid md:grid-cols-3 gap-10"></div>
    </div>
</section>

<div id="detailModal" class="fixed inset-0 z-[1000] bg-black/95 hidden flex items-center justify-center p-4 backdrop-blur-xl">
    <div class="max-w-4xl w-full glass-card overflow-hidden flex flex-col md:flex-row border-gold/30">
        <div class="md:w-1/2 h-64 md:h-auto relative">
            <img id="detImg" src="" class="w-full h-full object-cover">
            <div id="detBadge" class="status-badge"></div>
        </div>
        <div class="md:w-1/2 p-12 relative">
            <button onclick="closeDetailModal()" class="absolute top-6 right-6 text-2xl opacity-40 hover:opacity-100">&times;</button>
            <h2 id="detTitle" class="text-4xl font-serif italic mb-2"></h2>
            <p id="detPrice" class="text-gold text-2xl font-bold mb-6"></p>
            <div class="space-y-4 mb-10">
                <p class="text-[10px] uppercase tracking-widest text-gold">Localisation</p>
                <p id="detLoc" class="text-gray-300 text-sm"></p>
                <p class="text-[10px] uppercase tracking-widest text-gold mt-6">Description</p>
                <p id="detDesc" class="text-gray-400 text-sm leading-relaxed"></p>
            </div>
            <button onclick="openOrderModal()" class="btn-gold w-full py-4 text-xs">Faire une offre</button>
        </div>
    </div>
</div>

<div id="staffModal" class="fixed inset-0 z-[2000] bg-black hidden flex items-center justify-center p-6">
    <div class="w-full max-w-6xl h-[90vh] glass-card flex flex-col border-gold/30">
        <div class="p-6 border-b border-white/10 flex justify-between bg-white/5 items-center">
            <span class="font-serif italic text-xl text-gold">● Arcadia Panel</span>
            <button onclick="closeStaffModal()" class="text-3xl opacity-40">&times;</button>
        </div>
        <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
            <div class="w-full md:w-1/2 p-8 border-r border-white/5 space-y-4 overflow-y-auto">
                <input type="hidden" id="editId">
                <input type="text" id="vTitle" placeholder="NOM DU BIEN" class="arcadia-input" oninput="updatePreview()">
                <input type="text" id="vLoc" placeholder="LOCALISATION (ex: Sofia)" class="arcadia-input" oninput="updatePreview()">
                <input type="number" id="vPrice" placeholder="PRIX (€)" class="arcadia-input" oninput="updatePreview()">
                <select id="vStatus" class="arcadia-input" onchange="updatePreview()">
                    <option value="dispo">Disponible</option>
                    <option value="vendu">Vendu</option>
                </select>
                <textarea id="vDesc" placeholder="DESCRIPTION" class="arcadia-input h-20" oninput="updatePreview()"></textarea>
                
                <div id="dropZone" class="drop-zone">
                    <p id="dropText" class="text-[10px] uppercase tracking-widest opacity-40">Glisser image ou cliquer</p>
                    <input type="file" id="fileInput" hidden accept="image/*">
                    <input type="hidden" id="vImg">
                </div>

                <div class="discord-embed">
                    <div class="text-white font-bold text-sm mb-1" id="preTitle">Aperçu</div>
                    <div class="text-[10px] text-gray-400"><span id="preLoc">Localisation</span> • <span id="prePrice">0 €</span></div>
                    <img src="" id="preImg" class="w-full h-24 object-cover rounded mt-3 hidden border border-white/10">
                </div>
                <button onclick="saveListing()" class="btn-gold w-full py-4 text-xs" id="saveBtn">Publier l'unité</button>
            </div>
            <div class="w-full md:w-1/2 p-8 overflow-y-auto bg-black/40">
                <div id="adminList" class="space-y-3"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialisation des données
    let listings = JSON.parse(localStorage.getItem('arcadia_v4')) || [
        { id: 1, title: "Villa Syrta", price: 128000000, status: "vendu", loc: "Côte Ouest", desc: "Un joyau architectural.", img: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=800" }
    ];

    // Fonctions de rendu (MISE À JOUR)
    function render() {
        const grid = document.getElementById('listingGrid');
        const adminList = document.getElementById('adminList');
        
        if (!grid || !adminList) return;

        grid.innerHTML = ""; 
        adminList.innerHTML = "";

        listings.forEach(v => {
            const location = v.loc || "Paros, International";
            const prix = (v.price || 0).toLocaleString();

            // Rendu Catalogue Public
            grid.innerHTML += `
                <div onclick="showDetails(${v.id})" class="glass-card group cursor-pointer relative" data-aos="fade-up">
                    <div class="status-badge bg-${v.status}">${v.status}</div>
                    <div class="h-64 overflow-hidden">
                        <img src="${v.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000">
                    </div>
                    <div class="p-8">
                        <p class="text-[9px] text-gold uppercase tracking-widest mb-2">${location}</p>
                        <h3 class="text-2xl font-serif italic mb-2">${v.title}</h3>
                        <p class="text-gold font-bold text-lg">${prix} €</p>
                    </div>
                </div>`;

            // Rendu Liste Admin
            adminList.innerHTML += `
                <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-white/5">
                    <div class="flex items-center gap-3">
                        <img src="${v.img}" class="w-10 h-10 rounded-lg object-cover">
                        <div>
                            <p class="font-bold text-[11px]">${v.title}</p>
                            <p class="text-[9px] opacity-40">${prix} € - ${v.status}</p>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="loadEdit(${v.id})" class="text-[9px] text-blue-400 font-bold uppercase">Editer</button>
                        <button onclick="deleteListing(${v.id})" class="text-[9px] text-red-500 font-bold uppercase">Radier</button>
                    </div>
                </div>`;
        });

        localStorage.setItem('arcadia_v4', JSON.stringify(listings));
    }

    // Fonction de sauvegarde (MISE À JOUR)
    function saveListing() {
        const id = document.getElementById('editId').value;
        const title = document.getElementById('vTitle').value;
        const loc = document.getElementById('vLoc').value;
        const price = parseInt(document.getElementById('vPrice').value) || 0;
        const status = document.getElementById('vStatus').value;
        const desc = document.getElementById('vDesc').value;
        const img = document.getElementById('vImg').value || "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=800";

        if(!title) return alert("Veuillez au moins donner un nom au bien.");

        const data = {
            id: id ? parseInt(id) : Date.now(),
            title: title,
            loc: loc,
            price: price,
            status: status,
            desc: desc,
            img: img
        };

        if(id) { 
            const index = listings.findIndex(l => l.id == id);
            listings[index] = data; 
        } else { 
            listings.push(data); 
        }

        render();
        closeStaffModal(); 
        resetForm();
    }

    // --- Reste des fonctions utilitaires ---
    function handleFile(file) {
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('vImg').value = e.target.result;
                updatePreview();
                document.getElementById('dropText').innerText = "IMAGE CHARGÉE ✓";
            };
            reader.readAsDataURL(file);
        }
    }

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    function updatePreview() {
        document.getElementById('preTitle').innerText = document.getElementById('vTitle').value || "Nom";
        document.getElementById('preLoc').innerText = document.getElementById('vLoc').value || "Localisation";
        document.getElementById('prePrice').innerText = (parseInt(document.getElementById('vPrice').value) || 0).toLocaleString() + " €";
        const img = document.getElementById('vImg').value;
        if(img) { document.getElementById('preImg').src = img; document.getElementById('preImg').classList.remove('hidden'); }
    }

    function showDetails(id) {
        const v = listings.find(l => l.id == id);
        document.getElementById('detTitle').innerText = v.title;
        document.getElementById('detLoc').innerText = v.loc || "Paros";
        document.getElementById('detPrice').innerText = v.price.toLocaleString() + " €";
        document.getElementById('detDesc').innerText = v.desc || "Pas de description.";
        document.getElementById('detImg').src = v.img;
        document.getElementById('detBadge').innerText = v.status;
        document.getElementById('detBadge').className = `status-badge bg-${v.status}`;
        document.getElementById('detailModal').classList.remove('hidden');
    }

    function deleteListing(id) {
        if(confirm("Radier ce bien ?")) { listings = listings.filter(l => l.id != id); render(); }
    }

    function loadEdit(id) {
        const v = listings.find(l => l.id == id);
        document.getElementById('editId').value = v.id;
        document.getElementById('vTitle').value = v.title;
        document.getElementById('vLoc').value = v.loc;
        document.getElementById('vPrice').value = v.price;
        document.getElementById('vStatus').value = v.status;
        document.getElementById('vDesc').value = v.desc;
        document.getElementById('vImg').value = v.img;
        document.getElementById('saveBtn').innerText = "Enregistrer";
        updatePreview();
    }

    function resetForm() {
        document.querySelectorAll('.arcadia-input').forEach(i => i.value = "");
        document.getElementById('editId').value = "";
        document.getElementById('vImg').value = "";
        document.getElementById('preImg').classList.add('hidden');
        document.getElementById('dropText').innerText = "Glisser image ou cliquer";
        document.getElementById('saveBtn').innerText = "Publier l'unité";
    }

    window.closeDetailModal = () => document.getElementById('detailModal').classList.add('hidden');
    window.closeStaffModal = () => document.getElementById('staffModal').classList.add('hidden');
    window.openOrderModal = () => document.getElementById('orderModal').classList.remove('hidden');
    window.checkStaffAccess = () => { if(prompt("Code Terminal :") === "Immo30") document.getElementById('staffModal').classList.remove('hidden'); };

    document.addEventListener('mousemove', e => {
        gsap.to('#cursor', { x: e.clientX, y: e.clientY, duration: 0.1 });
        gsap.to('#cursor-follower', { x: e.clientX - 22, y: e.clientY - 22, duration: 0.3 });
    });

    AOS.init({ duration: 1200 });
    render();
</script>
</body>
</html>
