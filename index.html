<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia | Paros • Terminal Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&family=Playfair+Display:italic,wght@700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        :root { --gold: #b38e44; --black: #050505; }
        body { background: var(--black); color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }

        .btn-gold { background: #b38e44; color: black; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; border-radius: 50px; }
        .btn-gold:hover { background: #d4af37; transform: scale(1.02); }

        .arcadia-input { background: #111; border: 1px solid #222; border-radius: 12px; color: white; padding: 15px; width: 100%; outline: none; }
        
        /* Zone de Drag & Drop */
        .drop-zone { border: 2px dashed #333; border-radius: 15px; padding: 30px; text-align: center; cursor: pointer; transition: 0.3s; background: #0c0c0c; }
        .drop-zone.dragover { border-color: var(--gold); background: rgba(179, 142, 68, 0.1); }

        /* Discord Embed Style */
        .discord-embed { background: #121212; border-left: 4px solid var(--gold); border-radius: 4px; padding: 15px; max-width: 450px; }
        
        .record-card { border: 1px solid rgba(179,142,68,0.2); background: linear-gradient(145deg, #0a0a0a, #111); border-radius: 30px; overflow: hidden; }
    </style>
</head>
<body>

<nav class="fixed w-full z-50 p-8 flex justify-between items-center bg-black/80 backdrop-blur-md border-b border-white/5">
    <div class="flex flex-col">
        <span class="text-2xl font-serif italic">Arcadia<span class="text-gold">.</span></span>
        <span class="text-[9px] tracking-[4px] uppercase text-gold">Paros • International</span>
    </div>
    <div class="hidden lg:flex gap-10 items-center">
        <a href="tel:0629070034" class="text-gold font-bold tracking-widest text-xs">06 29 07 00 34</a>
    </div>
    <button onclick="checkStaffAccess()" class="opacity-30 hover:opacity-100 text-[10px] tracking-widest">ACCÈS TERMINAL</button>
</nav>

<section id="villas" class="pt-40 pb-20 px-10 max-w-7xl mx-auto">
    <h3 class="text-4xl font-serif italic mb-12">Catalogue & Dernières Ventes</h3>
    <div id="listingGrid" class="grid md:grid-cols-3 gap-10"></div>
</section>

<div id="staffModal" class="fixed inset-0 z-[200] bg-black/98 hidden flex items-center justify-center p-4">
    <div class="w-full max-w-6xl bg-[#080808] border border-white/10 rounded-[30px] h-[90vh] flex flex-col overflow-hidden shadow-2xl">
        <div class="p-8 border-b border-white/5 flex justify-between items-center">
            <h3 class="font-serif italic text-xl">● Arcadia Management Terminal <span class="text-[10px] uppercase ml-4 opacity-40">Drag & Drop Enabled</span></h3>
            <button onclick="closeStaffModal()" class="text-2xl opacity-40">&times;</button>
        </div>
        
        <div class="flex flex-1 overflow-hidden">
            <div class="w-1/2 p-10 overflow-y-auto border-r border-white/5 space-y-6">
                <input type="hidden" id="editId">
                <input type="text" id="vTitle" placeholder="NOM DU BIEN" class="arcadia-input" oninput="updatePreview()">
                <input type="number" id="vPrice" placeholder="PRIX (€)" class="arcadia-input" oninput="updatePreview()">
                <select id="vStatus" class="arcadia-input" onchange="updatePreview()">
                    <option>Disponible</option>
                    <option>Vendu</option>
                </select>
                <textarea id="vDesc" placeholder="DESCRIPTION" class="arcadia-input h-20" oninput="updatePreview()"></textarea>
                
                <div id="dropZone" class="drop-zone">
                    <p class="text-[10px] uppercase tracking-widest opacity-40">Glissez votre image ici</p>
                    <p class="text-[9px] mt-2 italic">ou cliquez pour sélectionner</p>
                    <input type="file" id="fileInput" hidden accept="image/*">
                    <input type="hidden" id="vImg"> </div>

                <div class="discord-embed" id="previewEmbed">
                    <div class="text-white font-bold mb-2" id="preTitle">Aperçu du Dossier</div>
                    <div class="text-xs text-gray-400">Prix: <span class="text-white" id="prePrice">0 €</span></div>
                    <div class="text-xs text-gray-400 mb-4">Statut: <span class="text-white" id="preStatus">Disponible</span></div>
                    <img src="" id="preImg" class="w-full h-32 object-cover rounded mt-2 border border-white/10 hidden">
                </div>

                <button onclick="saveListing()" class="btn-gold w-full py-4 text-xs" id="saveBtn">Publier l'unité</button>
            </div>

            <div class="w-1/2 p-10 overflow-y-auto bg-black/40">
                <h4 class="text-[10px] uppercase font-bold opacity-30 mb-6 tracking-widest">Unités Actives</h4>
                <div id="adminList" class="space-y-4"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let listings = JSON.parse(localStorage.getItem('arcadia_v6')) || [
        { id: 1, title: "Villa Syrta", price: 128000000, status: "Vendu", img: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=600" },
        { id: 2, title: "Domaine GOUV", price: 110000000, status: "Vendu", img: "https://images.unsplash.com/photo-1600607687940-477a284e6923?w=600" }
    ];

    // --- GESTION DU DRAG & DROP ---
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.onclick = () => fileInput.click();

    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
    dropZone.ondragleave = () => dropZone.classList.remove('dragover');
    
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        handleFile(file);
    };

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        handleFile(file);
    };

    function handleFile(file) {
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (event) => {
                document.getElementById('vImg').value = event.target.result;
                updatePreview();
                dropZone.innerHTML = `<p class="text-gold text-[10px] font-bold uppercase">Image prête ✓</p>`;
            };
            reader.readAsDataURL(file);
        }
    }

    // --- LOGIQUE ADMIN ---
    function render() {
        const grid = document.getElementById('listingGrid');
        const adminList = document.getElementById('adminList');
        grid.innerHTML = ""; adminList.innerHTML = "";

        listings.forEach(v => {
            grid.innerHTML += `
                <div class="record-card group">
                    <img src="${v.img}" class="w-full h-64 object-cover opacity-80 group-hover:opacity-100 transition duration-700">
                    <div class="p-8 text-center">
                        <h3 class="text-2xl font-serif italic">${v.title}</h3>
                        <p class="text-gold font-bold">${v.price.toLocaleString()} €</p>
                        <p class="text-[9px] uppercase mt-2 opacity-40">${v.status}</p>
                    </div>
                </div>`;

            adminList.innerHTML += `
                <div class="flex justify-between items-center p-6 bg-zinc-900/40 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-4">
                        <img src="${v.img}" class="w-12 h-12 rounded-lg object-cover">
                        <div><p class="font-bold text-sm">${v.title}</p><p class="text-[10px] opacity-40">${v.price.toLocaleString()}€</p></div>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="loadEdit(${v.id})" class="text-[10px] text-blue-400 font-bold uppercase">Modifier</button>
                        <button onclick="deleteListing(${v.id})" class="text-[10px] text-red-500 font-bold uppercase">Radier</button>
                    </div>
                </div>`;
        });
        localStorage.setItem('arcadia_v6', JSON.stringify(listings));
    }

    function updatePreview() {
        document.getElementById('preTitle').innerText = document.getElementById('vTitle').value || "Nom de l'unité";
        document.getElementById('prePrice').innerText = (parseInt(document.getElementById('vPrice').value) || 0).toLocaleString() + " €";
        document.getElementById('preStatus').innerText = document.getElementById('vStatus').value;
        const imgUrl = document.getElementById('vImg').value;
        const preImg = document.getElementById('preImg');
        if(imgUrl) {
            preImg.src = imgUrl;
            preImg.classList.remove('hidden');
        }
    }

    function saveListing() {
        const id = document.getElementById('editId').value;
        const data = {
            id: id ? parseInt(id) : Date.now(),
            title: document.getElementById('vTitle').value,
            price: parseInt(document.getElementById('vPrice').value) || 0,
            status: document.getElementById('vStatus').value,
            img: document.getElementById('vImg').value || "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=400"
        };
        if(id) {
            const idx = listings.findIndex(l => l.id == id);
            listings[idx] = data;
        } else {
            listings.push(data);
        }
        render();
        closeStaffModal();
        resetForm();
    }

    function loadEdit(id) {
        const v = listings.find(l => l.id === id);
        document.getElementById('editId').value = v.id;
        document.getElementById('vTitle').value = v.title;
        document.getElementById('vPrice').value = v.price;
        document.getElementById('vStatus').value = v.status;
        document.getElementById('vImg').value = v.img;
        document.getElementById('saveBtn').innerText = "Enregistrer les modifications";
        document.getElementById('staffModal').classList.remove('hidden');
        updatePreview();
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('vTitle').value = "";
        document.getElementById('vPrice').value = "";
        document.getElementById('vImg').value = "";
        dropZone.innerHTML = `<p class="text-[10px] uppercase tracking-widest opacity-40">Glissez votre image ici</p>`;
    }

    function deleteListing(id) { if(confirm("Radier cette unité ?")) { listings = listings.filter(l => l.id !== id); render(); } }
    function closeStaffModal() { document.getElementById('staffModal').classList.add('hidden'); }
    function checkStaffAccess() { if(prompt("Code Terminal :") === "Immo30") document.getElementById('staffModal').classList.remove('hidden'); }

    AOS.init();
    render();
</script>
</body>
</html>
