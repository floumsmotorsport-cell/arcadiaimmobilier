<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Studio | Immobilier d'Exception</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">

    <style>
        :root { --gold:#b38e44; }
        body { font-family: 'Montserrat', sans-serif; background:#0a0a0a; color:white; overflow-x:hidden; }
        .font-serif { font-family:'Cormorant Garamond', serif; }

        /* Hero */
        .hero { height:100vh; position:relative; overflow:hidden; }
        .hero video { position:absolute; width:100%; height:100%; object-fit:cover; }
        .hero-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.6); }

        /* Animation au scroll */
        .fade-up { opacity:0; transform:translateY(40px); transition:1s ease-out; }
        .fade-up.show { opacity:1; transform:translateY(0); }

        /* Cards Style Luxe */
        .card { border-radius:20px; overflow:hidden; background:#111; transition:0.5s; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform:translateY(-10px); border-color: var(--gold); }
        .card img { transition: 0.8s; }
        .card:hover img { transform: scale(1.1); }

        .btn-view { border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; font-[9px] uppercase tracking-[3px]; transition: 0.4s; }
        .btn-view:hover { background: var(--gold); color: black; }
    </style>
</head>

<body>

    <nav class="fixed top-0 w-full z-50 flex justify-between items-center p-8 backdrop-blur-md">
        <h1 class="font-serif text-3xl italic tracking-tighter">Arcadia</h1>
        <div class="hidden md:block text-[10px] tracking-[5px] uppercase opacity-60">Curateurs de propriétés uniques</div>
        <a href="admin.html" class="text-[10px] uppercase border-b border-gold text-gold">Accès Privé</a>
    </nav>

    <section class="hero flex items-center justify-center">
        <video autoplay muted loop playsinline>
            <source src="https://cdn.coverr.co/videos/coverr-luxury-house-1574/1080p.mp4" type="video/mp4">
        </video>
        <div class="hero-overlay"></div>
        <div class="relative text-center z-10 px-4">
            <h1 class="font-serif text-6xl md:text-9xl italic fade-up show">Arcadia Studio</h1>
            <p class="mt-6 tracking-[8px] text-xs opacity-70 fade-up show">SÉLECTION IMMOBILIÈRE PRESTIGE</p>
        </div>
    </section>

    <section class="py-32 px-6 md:px-20 max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-end mb-20 gap-6">
            <h2 class="font-serif text-5xl md:text-7xl italic fade-up">La Collection</h2>
            <p class="text-xs opacity-40 tracking-widest uppercase fade-up">Disponibilités 2026</p>
        </div>

        <div id="catalogContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-12">
            <div class="col-span-full text-center py-20 opacity-20 tracking-widest">CHARGEMENT DE LA COLLECTION...</div>
        </div>
    </section>

    <footer class="py-20 text-center border-t border-white/5">
        <p class="font-serif italic text-2xl opacity-60">Arcadia Studio</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Ta config Firebase (La même que l'admin)
        const firebaseConfig = { databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CHARGEMENT DES BIENS ---
        const container = document.getElementById('catalogContainer');

        onValue(ref(db, 'listings'), (snap) => {
            const data = snap.val();
            if (!data) {
                container.innerHTML = "<p class='col-span-full text-center opacity-50'>Aucune propriété disponible actuellement.</p>";
                return;
            }

            let html = "";
            Object.entries(data).reverse().forEach(([id, item]) => {
                html += `
                <div class="card fade-up">
                    <div class="overflow-hidden h-[400px]">
                        <img src="${item.images[0]}" class="w-full h-full object-cover" alt="${item.title}">
                    </div>
                    <div class="p-8">
                        <span class="text-gold text-[10px] tracking-[3px] uppercase font-bold">${item.cat}</span>
                        <h3 class="font-serif text-3xl mt-2 mb-4 italic">${item.title}</h3>
                        <p class="text-sm opacity-50 mb-8 font-light leading-relaxed line-clamp-2">${item.desc}</p>
                        <div class="flex justify-between items-center border-t border-white/10 pt-6">
                            <span class="font-serif text-2xl">${item.price}</span>
                            <button class="btn-view">Découvrir</button>
                        </div>
                    </div>
                </div>
                `;
            });
            container.innerHTML = html;
            
            // Relancer l'observateur d'animation pour les nouveaux éléments
            initAnimations();
        });

        function initAnimations() {
            const observer = new IntersectionObserver(entries => {
                entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('show'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
        }
    </script>
</body>
</html>
