<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Immobilier | Gestion Administrative</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap');
        body { font-family: 'Montserrat', sans-serif; scroll-behavior: smooth; }
        .admin-panel { display: none; }
        .admin-active .admin-panel { display: block; }
        .admin-active .public-view { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md shadow-sm">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-emerald-700 italic">ARCADIA</h1>
            <div class="flex items-center space-x-4">
                <button onclick="toggleAdmin()" id="adminBtn" class="text-sm bg-gray-200 px-4 py-2 rounded-full hover:bg-gray-300 transition">
                    <i class="fas fa-lock mr-2"></i>Mode Admin
                </button>
            </div>
        </div>
    </nav>

    <div class="public-view">
        <header class="relative h-[60vh] flex items-center justify-center text-white">
            <div class="absolute inset-0 z-0">
                <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80" class="w-full h-full object-cover brightness-50">
            </div>
            <div class="relative z-10 text-center">
                <h2 class="text-5xl font-bold">Nos Propriétés d'Exception</h2>
                <p class="mt-4 text-xl italic text-emerald-200">Le luxe à votre portée</p>
            </div>
        </header>

        <section class="py-16 max-w-7xl mx-auto px-6">
            <div id="property-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </section>
    </div>

    <div class="admin-panel pt-24 min-h-screen bg-gray-100">
        <div class="max-w-4xl mx-auto p-6">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-emerald-800">Gestion du Catalogue</h2>
                <button onclick="toggleAdmin()" class="text-red-500 font-bold hover:underline">Quitter</button>
            </div>

            <div class="bg-white p-8 rounded-xl shadow-md mb-12">
                <h3 id="formTitle" class="text-xl font-bold mb-4 italic text-emerald-600">Ajouter un nouveau bien</h3>
                
                <form id="propForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="hidden" id="editIndex">
                    <input type="text" id="title" placeholder="Titre (ex: Villa Moderne)" class="p-3 border rounded" required>
                    <input type="text" id="price" placeholder="Prix (ex: 450 000 €)" class="p-3 border rounded" required>
                    <input type="text" id="loc" placeholder="Localisation (ex: Cannes)" class="p-3 border rounded" required>
                    <select id="type" class="p-3 border rounded">
                        <option value="Vente">Vente</option>
                        <option value="Location">Location</option>
                    </select>

                    <div class="md:col-span-2 bg-emerald-50 p-4 border-2 border-dashed border-emerald-200 rounded-lg">
                        <label class="block text-emerald-700 font-bold mb-2">Image du bien (depuis votre ordinateur)</label>
                        <input type="file" id="imgFile" accept="image/*" class="w-full">
                        <input type="hidden" id="existingImg"> </div>

                    <textarea id="desc" placeholder="Description courte" class="p-3 border rounded md:col-span-2" required></textarea>
                    
                    <button type="submit" id="submitBtn" class="md:col-span-2 bg-emerald-600 text-white py-3 rounded-lg font-bold hover:bg-emerald-700 transition">Enregistrer le bien</button>
                    <button type="button" id="cancelBtn" onclick="resetForm()" class="hidden md:col-span-2 bg-gray-400 text-white py-2 rounded-lg">Annuler la modification</button>
                </form>
            </div>

            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-emerald-50">
                        <tr>
                            <th class="p-4">Bien</th>
                            <th class="p-4">Prix</th>
                            <th class="p-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        // AJOUT DE L'IMPORT STORAGE
        import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBg9JIb2XAFacftazyDcAXOnCpfvaQ2PYI",
            authDomain: "arcadiaimmobilier-ee335.firebaseapp.com",
            databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arcadiaimmobilier-ee335",
            storageBucket: "arcadiaimmobilier-ee335.firebasestorage.app",
            messagingSenderId: "718967628351",
            appId: "1:718967628351:web:2c60b5bd68916773bdce8a",
            measurementId: "G-VFD54FY15P"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const storage = getStorage(app); // Initialisation du storage
        const dbRef = ref(db, 'properties');

        let properties = [];
        const propForm = document.getElementById('propForm');
        const grid = document.getElementById('property-grid');
        const adminList = document.getElementById('admin-list');

        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            properties = [];
            if (data) {
                Object.keys(data).forEach(key => {
                    properties.push({ id: key, ...data[key] });
                });
            }
            renderPublic();
            renderAdmin();
        });

        propForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const id = document.getElementById('editIndex').value;
            const file = document.getElementById('imgFile').files[0];
            let imageUrl = document.getElementById('existingImg').value;

            submitBtn.innerText = "Chargement en cours...";
            submitBtn.disabled = true;

            try {
                // Si un nouveau fichier est sélectionné, on l'upload
                if (file) {
                    const storageRef = sRef(storage, 'images/' + Date.now() + "_" + file.name);
                    const snapshot = await uploadBytes(storageRef, file);
                    imageUrl = await getDownloadURL(snapshot.ref);
                }

                if (!imageUrl) {
                    alert("Veuillez sélectionner une image.");
                    submitBtn.innerText = "Enregistrer le bien";
                    submitBtn.disabled = false;
                    return;
                }

                const newProp = {
                    title: document.getElementById('title').value,
                    price: document.getElementById('price').value,
                    loc: document.getElementById('loc').value,
                    type: document.getElementById('type').value,
                    img: imageUrl,
                    desc: document.getElementById('desc').value,
                    updatedAt: Date.now()
                };

                if (id === "") {
                    const newPostRef = push(dbRef);
                    await set(newPostRef, newProp);
                } else {
                    await update(ref(db, `properties/${id}`), newProp);
                }
                
                resetForm();
            } catch (error) {
                console.error(error);
                alert("Erreur lors de l'enregistrement");
            } finally {
                submitBtn.innerText = "Enregistrer le bien";
                submitBtn.disabled = false;
            }
        });

        window.deleteProperty = (id) => {
            if(confirm("Supprimer ce bien définitivement ?")) {
                remove(ref(db, `properties/${id}`));
            }
        };

        window.editProperty = (index) => {
            const p = properties[index];
            document.getElementById('editIndex').value = p.id;
            document.getElementById('title').value = p.title;
            document.getElementById('price').value = p.price;
            document.getElementById('loc').value = p.loc;
            document.getElementById('type').value = p.type;
            document.getElementById('existingImg').value = p.img; // On garde l'URL actuelle
            document.getElementById('desc').value = p.desc;
            
            document.getElementById('formTitle').innerText = "Modifier : " + p.title;
            document.getElementById('submitBtn').innerText = "Mettre à jour";
            document.getElementById('cancelBtn').classList.remove('hidden');
            window.scrollTo(0,0);
        };

        window.toggleAdmin = () => {
            document.body.classList.toggle('admin-active');
            const isAdmin = document.body.classList.contains('admin-active');
            document.getElementById('adminBtn').innerHTML = isAdmin ? 
                '<i class="fas fa-eye mr-2"></i>Voir le site' : 
                '<i class="fas fa-lock mr-2"></i>Mode Admin';
        };

        window.resetForm = () => {
            propForm.reset();
            document.getElementById('editIndex').value = "";
            document.getElementById('existingImg').value = "";
            document.getElementById('formTitle').innerText = "Ajouter un nouveau bien";
            document.getElementById('submitBtn').innerText = "Enregistrer le bien";
            document.getElementById('cancelBtn').classList.add('hidden');
        };

        function renderPublic() {
            if (properties.length === 0) {
                grid.innerHTML = '<p class="col-span-3 text-center text-gray-400 italic">Aucun bien disponible.</p>';
                return;
            }
            grid.innerHTML = properties.map(p => `
                <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100 hover:shadow-2xl transition-all">
                    <img src="${p.img}" class="w-full h-56 object-cover" onerror="this.src='https://placehold.co/600x400?text=Image+Indisponible'">
                    <div class="p-6">
                        <span class="text-xs font-bold text-emerald-600 uppercase bg-emerald-50 px-2 py-1 rounded">${p.type}</span>
                        <h4 class="text-xl font-bold mt-2">${p.title}</h4>
                        <p class="text-gray-500 text-sm mb-4 h-10 overflow-hidden">${p.desc}</p>
                        <div class="flex justify-between items-center border-t pt-4">
                            <span class="font-bold text-xl text-emerald-700">${p.price}</span>
                            <span class="text-gray-400 text-sm"><i class="fas fa-map-marker-alt"></i> ${p.loc}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderAdmin() {
            adminList.innerHTML = properties.map((p, index) => `
                <tr class="border-t hover:bg-gray-50 transition">
                    <td class="p-4 font-bold text-sm">${p.title}</td>
                    <td class="p-4 text-sm">${p.price}</td>
                    <td class="p-4 text-right">
                        <button onclick="editProperty(${index})" class="text-blue-500 hover:text-blue-700 mr-4"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteProperty('${p.id}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
