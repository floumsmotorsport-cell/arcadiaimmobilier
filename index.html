<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Immobilier | Prestige & Sécurité</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold:#b38e44; --dark:#0a0a0a; --glass: rgba(255,255,255,0.03); }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color:white; overflow-x:hidden; scroll-behavior: smooth; }
        .font-serif { font-family:'Cormorant Garamond', serif; }
        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); transition: 0.4s; }
        .btn-gold { border: 1px solid var(--gold); color: var(--gold); padding: 12px 24px; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; transition: 0.4s; cursor: pointer; background: transparent; }
        .btn-gold:hover { background: var(--gold); color: black; box-shadow: 0 0 20px rgba(179, 142, 68, 0.4); }
        #orderModal { display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.95); align-items:center; justify-content:center; padding: 20px; }
        .input-arcadia { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); padding:14px; border-radius:8px; color:white; margin-bottom:12px; outline:none; }
        .logo-nav { height: 40px; }
    </style>
</head>
<body>

    <div id="orderModal">
        <div class="glass p-10 rounded-3xl max-w-md w-full relative">
            <button onclick="closeOrder()" class="absolute top-6 right-6 text-2xl opacity-50 hover:opacity-100">✕</button>
            <h2 class="font-serif text-4xl italic mb-2 text-center">Réservation</h2>
            <p id="orderSummary" class="text-gold text-center text-[11px] uppercase tracking-[3px] mb-8 font-semibold"></p>
            <div id="userInfoFields">
                <input type="text" id="custNom" placeholder="Nom de famille" class="input-arcadia">
                <input type="text" id="custPrenom" placeholder="Prénom" class="input-arcadia">
                <input type="tel" id="custTel" placeholder="Numéro de téléphone" class="input-arcadia">
            </div>
            <button onclick="confirmOrder()" class="w-full bg-gold text-black font-bold py-5 rounded-xl uppercase text-xs tracking-widest hover:scale-[1.02] transition-transform">Confirmer la demande</button>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-50 flex justify-between items-center px-6 md:px-10 py-6 backdrop-blur-xl border-b border-white/5">
        <div class="flex items-center gap-4">
            <img src="https://image2url.com/r2/default/images/1774658704727-764cccce-eee7-41c4-a48c-90c16f0acc69.png" class="logo-nav">
            <span id="studioBadge" class="text-[8px] px-2 py-1 rounded-full border font-bold uppercase tracking-tighter transition-all">Chargement...</span>
        </div>
        <div class="flex items-center gap-8">
            <a href="#news" class="hidden md:block text-[10px] uppercase tracking-widest opacity-60 hover:opacity-100">Presse</a>
            <a href="#catalogue" class="text-[10px] uppercase tracking-widest opacity-60 hover:opacity-100">Collection</a>
            <a href="admin.html" class="px-4 py-2 border border-gold/20 text-[9px] uppercase hover:bg-gold hover:text-black transition-all">Staff</a>
        </div>
    </nav>

    <section class="h-screen flex items-center justify-center relative overflow-hidden">
        <video autoplay muted loop playsinline class="absolute inset-0 w-full h-full object-cover opacity-40">
            <source src="https://cdn.coverr.co/videos/coverr-luxury-house-1574/1080p.mp4" type="video/mp4">
        </video>
        <div class="relative text-center z-10 px-4">
            <h1 class="font-serif text-7xl md:text-[10rem] italic leading-none mb-4">Arcadia</h1>
            <p class="text-gold tracking-[10px] text-xs uppercase mb-12">L'excellence immobilière & sécuritaire</p>
            <a href="#catalogue" class="btn-gold">Voir la collection</a>
        </div>
    </section>

    <section id="clientDashboard" class="hidden py-20 px-6 max-w-7xl mx-auto">
        <div class="glass p-8 md:p-12 rounded-[40px] border-l-8 border-gold">
            <div class="flex justify-between items-center mb-10">
                <h3 class="font-serif text-4xl italic">Suivi de vos <span class="text-gold">Dossiers</span></h3>
                <button onclick="localStorage.clear(); location.reload();" class="text-[9px] uppercase opacity-40">Déconnexion</button>
            </div>
            <div id="myOrdersList" class="grid md:grid-cols-2 gap-6"></div>
        </div>
    </section>

    <section id="news" class="py-24 px-6 max-w-7xl mx-auto">
        <h2 class="font-serif text-5xl italic mb-12">Arcadia <span class="text-gold">Presse</span></h2>
        <div id="newsContainer" class="grid md:grid-cols-2 gap-8">
            </div>
    </section>

    <section id="catalogue" class="py-24 px-6 max-w-7xl mx-auto">
        <h2 class="font-serif text-5xl italic mb-12 text-right">La <span class="text-gold">Collection</span></h2>
        <div id="catalogContainer" class="grid md:grid-cols-3 gap-10"></div>
    </section>

    <footer class="py-20 bg-white/5 text-center border-t border-white/5">
        <img src="https://image2url.com/r2/default/images/1774658704727-764cccce-eee7-41c4-a48c-90c16f0acc69.png" class="h-16 mx-auto mb-8 opacity-50">
        <p class="text-[9px] opacity-20 uppercase tracking-[5px]">© 2026 Arcadia Group • Los Santos</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const activeUser = JSON.parse(localStorage.getItem('arcadia_user_rp'));
        let currentOrder = null;

        // --- ÉTAT DU STUDIO ---
        onValue(ref(db, 'studioStatus'), (snap) => {
            const isOpen = snap.val();
            const badge = document.getElementById('studioBadge');
            badge.innerText = isOpen ? "Studio Ouvert" : "Studio Fermé";
            badge.className = isOpen ? "text-[8px] px-2 py-1 rounded-full border border-green-500/30 text-green-400 bg-green-500/10 font-bold uppercase tracking-tighter" 
                                     : "text-[8px] px-2 py-1 rounded-full border border-red-500/30 text-red-400 bg-red-500/10 font-bold uppercase tracking-tighter";
        });

        // --- DASHBOARD & CHAT ---
        if(activeUser) {
            document.getElementById('clientDashboard').classList.remove('hidden');
            document.getElementById('userInfoFields').style.display = 'none';
            onValue(ref(db, 'orders'), (snap) => {
                const data = snap.val();
                const list = document.getElementById('myOrdersList');
                let html = "";
                if(data) {
                    Object.entries(data).reverse().forEach(([id, ord]) => {
                        if(ord.nom === activeUser.nom && ord.prenom === activeUser.prenom) {
                            html += `
                            <div class="bg-white/5 p-6 rounded-2xl border border-white/10">
                                <div class="flex justify-between mb-4">
                                    <span class="text-[10px] font-bold uppercase text-gold">${ord.service}</span>
                                    <span class="text-[9px] px-2 py-0.5 rounded bg-white/10">${ord.status}</span>
                                </div>
                                <div class="text-xs italic opacity-70 bg-black/30 p-4 rounded-lg border-l-2 border-gold mb-2">
                                    "${ord.reponseStaff || 'En attente de réponse...'}"
                                </div>
                                <p class="text-[8px] opacity-20 uppercase">${ord.date}</p>
                            </div>`;
                        }
                    });
                }
                list.innerHTML = html || "<p class='opacity-30'>Aucun dossier en cours.</p>";
            });
        }

        // --- CATALOGUE & NEWS ---
        onValue(ref(db, 'listings'), (snap) => {
            const data = snap.val();
            const catContainer = document.getElementById('catalogContainer');
            const newsContainer = document.getElementById('newsContainer');
            catContainer.innerHTML = "";
            newsContainer.innerHTML = "";
            
            if(data) {
                Object.entries(data).reverse().forEach(([id, it]) => {
                    if(it.cat === 'Article') {
                        newsContainer.innerHTML += `
                        <div class="glass flex flex-col md:flex-row overflow-hidden rounded-3xl">
                            <img src="${it.images[0]}" class="md:w-1/3 object-cover h-48 md:h-auto">
                            <div class="p-6 flex-1">
                                <span class="text-gold text-[9px] uppercase tracking-widest">${it.price}</span>
                                <h4 class="font-serif text-2xl italic my-2">${it.title}</h4>
                                <p class="text-xs opacity-60 mb-4">${it.desc}</p>
                            </div>
                        </div>`;
                    } else {
                        catContainer.innerHTML += `
                        <div class="glass group rounded-3xl overflow-hidden shadow-2xl">
                            <div class="h-64 overflow-hidden relative">
                                <img src="${it.images[0]}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                                <span class="absolute top-4 left-4 bg-black/60 text-gold text-[8px] uppercase px-3 py-1 rounded-full border border-gold/30">${it.cat}</span>
                            </div>
                            <div class="p-8">
                                <h4 class="font-serif text-3xl italic mb-4">${it.title}</h4>
                                <div class="flex justify-between items-center">
                                    <span class="font-serif text-xl">${it.price}</span>
                                    <button onclick="openOrder('${it.title}', '${it.price}')" class="btn-gold !py-2 !px-4 !text-[8px]">Réserver</button>
                                </div>
                            </div>
                        </div>`;
                    }
                });
            }
        });

        // --- FONCTIONS LOGIQUES ---
        window.openOrder = (service, prix) => {
            currentOrder = { service, prix };
            document.getElementById('orderSummary').innerText = `${service} • ${prix}`;
            document.getElementById('orderModal').style.display = 'flex';
        };
        window.closeOrder = () => document.getElementById('orderModal').style.display = 'none';
        window.confirmOrder = () => {
            let userData = activeUser || {
                nom: document.getElementById('custNom').value,
                prenom: document.getElementById('custPrenom').value,
                tel: document.getElementById('custTel').value
            };
            if(!userData.nom || !userData.prenom) return alert("Nom et prénom requis.");
            localStorage.setItem('arcadia_user_rp', JSON.stringify(userData));
            push(ref(db, 'orders'), {
                ...userData, ...currentOrder,
                status: 'En attente', date: new Date().toLocaleString('fr-FR')
            }).then(() => { alert("Demande envoyée !"); location.reload(); });
        };
    </script>
</body>
</html>
