<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Prestige | Excellence Immobilière</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; transition: opacity 0.3s ease; }
        .font-serif { font-family: 'Playfair Display', serif; }

        @keyframes revealUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: revealUp 0.8s ease forwards; }
        
        .hero-bg {
            background: linear-gradient(rgba(10, 15, 30, 0.85), rgba(10, 15, 30, 0.85)),
                        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; height: 90vh;
        }

        .view-section { display: none; }
        .active-view { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #adminBar { display: none; background: #0f172a; border-bottom: 2px solid #b45309; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        .is-admin #adminBar { display: flex; }
        
        #dropZone { border: 2px dashed #cbd5e1; background: #f8fafc; transition: all 0.4s ease; }
        #dropZone.dragover { border-color: #b45309; background: #fff7ed; transform: scale(1.02); }

        .card-hover { transition: all 0.4s ease; }
        .card-hover:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 30px 60px rgba(0,0,0,0.15); }

        img { transition: transform 0.7s ease; }
        .group:hover img { transform: scale(1.08); }

        .fav-badge { position: absolute; top: -5px; right: -5px; background: #b45309; color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="adminBar" class="fixed top-0 w-full text-white py-3 px-8 z-[100] justify-between items-center text-[10px] font-bold uppercase tracking-widest">
        <div class="flex items-center space-x-6">
            <span class="text-amber-500 border-r border-white/20 pr-6">STAFF: <span id="activeUserDisplay"></span></span>
            <button onclick="showView('adminPanel')" class="hover:text-amber-500 transition">GESTION CONTENT</button>
            <button onclick="showView('publicContent')" class="hover:text-amber-500 transition">RETOUR SITE</button>
        </div>
        <button id="btnLogout" class="bg-red-600 px-4 py-1 rounded-full hover:bg-red-700 transition">DECONNEXION</button>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/80 z-[999] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white max-w-2xl w-full rounded-[2rem] overflow-hidden shadow-2xl relative animate-[fadeIn_0.4s]">
            <button onclick="closeDetail()" class="absolute top-4 right-4 text-2xl z-10 bg-white/50 rounded-full w-10 h-10 flex items-center justify-center hover:bg-white transition">✕</button>
            <img id="detailImg" class="w-full h-80 object-cover">
            <div class="p-8">
                <h2 id="detailTitle" class="text-3xl font-serif font-bold mb-2 italic text-slate-900"></h2>
                <p id="detailPrice" class="text-amber-600 font-bold text-xl mb-4"></p>
                <div class="h-px w-16 bg-amber-200 mb-6"></div>
                <p id="detailDesc" class="text-slate-600 text-sm leading-relaxed whitespace-pre-line"></p>
                <button onclick="openDevis(); closeDetail();" class="mt-8 w-full bg-slate-900 text-white py-4 rounded-xl font-bold uppercase tracking-widest text-xs hover:bg-amber-600 transition">S'informer sur ce bien</button>
            </div>
        </div>
    </div>

    <div id="devisBox" class="fixed inset-0 bg-slate-900/80 z-[999] hidden flex items-center justify-center backdrop-blur-md">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-lg shadow-2xl mx-4">
            <h3 class="text-3xl font-serif font-bold mb-2 text-center">Estimation Privée</h3>
            <p class="text-center text-slate-400 text-xs uppercase tracking-widest mb-8">Discrétion & Prestige</p>
            <input id="devisName" placeholder="Votre Nom Complet" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none focus:ring-2 ring-amber-500 transition">
            <input id="devisEmail" placeholder="Email de contact" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none focus:ring-2 ring-amber-500 transition">
            <textarea id="devisMsg" placeholder="Détails de votre projet..." class="w-full p-4 bg-slate-100 rounded-2xl mb-6 h-32 outline-none focus:ring-2 ring-amber-500 transition"></textarea>
            <button onclick="sendDevis()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-amber-600 transition shadow-lg">Envoyer la demande</button>
            <button onclick="closeDevis()" class="mt-4 text-[10px] text-slate-400 w-full uppercase font-bold tracking-widest text-center">Fermer</button>
        </div>
    </div>

    <main id="publicContent" class="view-section active-view">
        <section class="hero-bg flex flex-col items-center justify-center text-center px-6 relative">
            <div class="reveal">
                <h1 class="text-white text-6xl md:text-9xl font-serif font-bold mb-4 drop-shadow-2xl">Arcadia</h1>
                <p class="text-amber-500 font-bold uppercase tracking-widest text-[12px] md:text-[14px] mb-12">L'Art de Vivre d'Exception</p>
                <div class="flex flex-col md:flex-row gap-6 justify-center">
                    <button onclick="openDevis()" class="bg-amber-600 text-white px-10 py-4 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-white hover:text-slate-900 transition-all shadow-2xl">Demander un Devis</button>
                    <button onclick="scrollToFavs()" class="bg-white/10 backdrop-blur-md text-white border border-white/20 px-10 py-4 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-white hover:text-slate-900 transition-all relative">
                        Mes Favoris <span id="favCount" class="fav-badge">0</span>
                    </button>
                </div>
            </div>
            <button onclick="openLogin()" class="absolute bottom-6 left-1/2 -translate-x-1/2 text-white/20 text-[10px] tracking-widest hover:text-white transition uppercase">Espace Staff Privé</button>
        </section>

        <section id="portfolio" class="py-24 bg-slate-50">
            <div class="container mx-auto px-6 mb-16 text-center reveal">
                <h2 class="text-4xl font-serif font-bold mb-4 italic">Le Portfolio</h2>
                <div class="h-1 w-20 bg-amber-600 mx-auto"></div>
            </div>
            <div id="allContent" class="container mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-12"></div>
        </section>

        <section id="favSection" class="py-24 bg-slate-900 text-white hidden">
            <div class="container mx-auto px-6">
                <h3 class="text-3xl font-serif font-bold mb-10 italic text-center text-amber-500">Mes Coups de Cœur ❤️</h3>
                <div id="favContent" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
            </div>
        </section>
    </main>

    <main id="adminPanel" class="view-section pt-32 pb-24 container mx-auto px-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
            <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 h-fit">
                <h2 class="text-3xl font-serif font-bold mb-8" id="adminFormTitle">Gestion de Propriété</h2>
                <div class="space-y-4">
                    <select id="inCategory" class="w-full p-4 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-amber-500 font-bold text-sm">
                        <option value="villas">Maison Villa en vente</option>
                        <option value="biens">Bien d'exception</option>
                        <option value="articles">Article & News</option>
                    </select>
                    <input type="text" id="inTitle" placeholder="Nom de la propriété" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                    <input type="text" id="inPrice" placeholder="Prix (ex: 12 500 000 €)" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                    <textarea id="inDesc" placeholder="Description détaillée..." class="w-full p-4 bg-slate-100 rounded-2xl h-32"></textarea>
                    
                    <div id="dropZone" class="w-full py-16 rounded-2xl flex flex-col items-center justify-center text-slate-400 group cursor-pointer hover:border-amber-500 transition-all">
                        <div class="text-4xl mb-4 group-hover:scale-110 transition">💎</div>
                        <p class="text-[10px] font-black uppercase tracking-widest" id="dropLabel">Glisser l'image HD</p>
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                    </div>
                    <button id="btnPublish" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold hover:bg-amber-600 transition shadow-xl tracking-widest uppercase text-xs">Sauvegarder sur Arcadia</button>
                </div>
            </div>

            <div class="flex flex-col">
                <h2 class="text-3xl font-serif font-bold mb-8 flex items-center gap-4">
                    Inbox <span id="msgCount" class="bg-amber-600 text-white text-xs px-3 py-1 rounded-full">0</span>
                </h2>
                <div id="adminMessages" class="space-y-6 max-h-[800px] overflow-y-auto pr-4"></div>
            </div>
        </div>
    </main>

    <div id="loginOverlay" class="fixed inset-0 z-[500] hidden flex items-center justify-center bg-slate-950/95 backdrop-blur-xl">
        <div class="bg-white p-12 rounded-[3.5rem] w-96 text-center">
            <div class="text-4xl mb-6">🗝️</div>
            <h3 class="text-2xl font-serif font-bold mb-8">Authentification Staff</h3>
            <input type="text" id="userLogin" placeholder="Identifiant" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 outline-none">
            <input type="password" id="passLogin" placeholder="Mot de passe" class="w-full p-4 bg-slate-100 rounded-2xl mb-8 outline-none">
            <button id="btnLoginAction" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold tracking-widest uppercase text-xs">Accéder au panel</button>
            <button onclick="closeLogin()" class="mt-6 text-[10px] text-slate-400 font-bold tracking-widest uppercase">Annuler</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "arcadiaimmobilier-ee335.firebaseapp.com",
            databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arcadiaimmobilier-ee335",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const get = id => document.getElementById(id);
        
        let globalData = {};
        let currentImg = "";
        window.editing = null;

        // --- UTILS ---
        function showLoader(){ document.body.style.opacity = 0.5; }
        function hideLoader(){ document.body.style.opacity = 1; }

        // --- NAVIGATION ---
        window.showView = (id) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
            get(id).classList.add('active-view');
            window.scrollTo(0,0);
        };
        window.openLogin = () => get('loginOverlay').classList.remove('hidden');
        window.closeLogin = () => get('loginOverlay').classList.add('hidden');
        window.openDevis = () => get('devisBox').classList.remove('hidden');
        window.closeDevis = () => get('devisBox').classList.add('hidden');
        window.scrollToFavs = () => {
            get('favSection').classList.remove('hidden');
            get('favSection').scrollIntoView({ behavior: 'smooth' });
        };

        // --- MODALE DETAIL ---
        window.openDetail = (item) => {
            get('detailImg').src = item.img;
            get('detailTitle').innerText = item.title;
            get('detailPrice').innerText = item.price || "Sur demande";
            get('detailDesc').innerText = item.desc || "Aucune description disponible pour ce bien d'exception.";
            get('detailModal').classList.remove('hidden');
        };
        window.closeDetail = () => get('detailModal').classList.add('hidden');

        // --- AUTH ---
        const ACCOUNTS = { "Axel": "Axel30", "Alden": "Alden30" };
        get('btnLoginAction').onclick = () => {
            const u = get('userLogin').value, p = get('passLogin').value;
            if(ACCOUNTS[u] === p){
                sessionStorage.setItem('arcadia_user', u);
                location.reload();
            } else alert("Accès refusé");
        };
        get('btnLogout').onclick = () => {
            sessionStorage.removeItem('arcadia_user');
            location.reload();
        };

        if(sessionStorage.getItem('arcadia_user')){
            document.body.classList.add('is-admin');
            get('activeUserDisplay').innerText = sessionStorage.getItem('arcadia_user');
        }

        // --- GESTION IMAGE ---
        const dropZone = get('dropZone');
        const fileInput = get('fileInput');
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if(!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = () => {
                currentImg = reader.result;
                get('dropLabel').innerText = "Image prête ✓";
                get('dropZone').style.borderColor = "#b45309";
            };
            reader.readAsDataURL(file);
        }

        // --- FIREBASE : MESSAGES ---
        window.sendDevis = () => {
            const name = get('devisName').value, email = get('devisEmail').value, msg = get('devisMsg').value;
            if(!name || !email || !msg) return alert("Veuillez remplir tous les champs.");
            showLoader();
            push(ref(db, 'messages'), { name, email, msg, date: new Date().toLocaleString('fr-FR') })
                .then(() => { hideLoader(); alert("Demande transmise."); closeDevis(); });
        };

        onValue(ref(db, 'messages'), (snap) => {
            const messages = snap.val() || {};
            const container = get('adminMessages');
            let html = ""; let count = 0;
            Object.entries(messages).reverse().forEach(([id, m]) => {
                count++;
                html += `
                <div class="bg-white p-6 rounded-[2rem] shadow-lg border border-slate-100 relative reveal">
                    <button onclick="deleteMsg('${id}')" class="absolute top-6 right-6 text-slate-300 hover:text-red-500 transition">✕</button>
                    <span class="text-[9px] bg-amber-100 text-amber-700 px-3 py-1 rounded-full font-black uppercase">${m.date}</span>
                    <h4 class="font-black text-lg mt-2">${m.name}</h4>
                    <p class="text-amber-600 text-xs font-bold mb-3">${m.email}</p>
                    <div class="bg-slate-50 p-4 rounded-2xl text-slate-700 italic text-sm">"${m.msg}"</div>
                </div>`;
            });
            container.innerHTML = html || "<p class='text-center text-slate-400'>Aucun message.</p>";
            get('msgCount').innerText = count;
        });
        window.deleteMsg = (id) => { if(confirm("Supprimer ce message ?")) remove(ref(db, `messages/${id}`)); };

        // --- FIREBASE : CONTENU ---
        onValue(ref(db, 'content'), (snap) => {
            globalData = snap.val() || {};
            renderAll(); renderFavs();
        });

        function renderAll(){
            let html = "";
            ['villas','biens','articles'].forEach(cat => {
                if(globalData[cat]) Object.entries(globalData[cat]).forEach(([id, item]) => html += createCard(id, item, cat));
            });
            get('allContent').innerHTML = html || "<p class='col-span-3 text-center text-slate-400 py-20'>Aucun bien disponible.</p>";
        }

        window.createCard = (id, item, cat) => {
            const isAdmin = document.body.classList.contains('is-admin');
            const itemString = JSON.stringify(item).replace(/'/g, "&apos;");
            
            return `
            <div class="card-hover bg-white rounded-[2.5rem] shadow-xl overflow-hidden group relative border border-slate-100 reveal cursor-pointer">
                <div onclick='openDetail(${itemString})'>
                    <button onclick="event.stopPropagation(); toggleFav('${id}')" class="absolute top-4 right-4 text-xl z-10 p-2 rounded-full bg-white/80 shadow hover:scale-110 transition">❤️</button>
                    <img src="${item.img}" class="h-80 w-full object-cover">
                    <div class="p-8">
                        <span class="text-[9px] font-black text-amber-600 uppercase tracking-widest">${cat}</span>
                        <h4 class="text-2xl font-serif font-bold mt-1 italic">${item.title}</h4>
                        <p class="text-slate-900 font-bold mt-2">${item.price || 'Sur demande'}</p>
                        
                        ${isAdmin ? `
                        <div class="flex gap-4 mt-6 pt-4 border-t border-slate-50">
                            <button onclick="event.stopPropagation(); editPost('${cat}','${id}')" class="text-blue-500 text-[10px] font-bold uppercase tracking-widest hover:underline">Modifier</button>
                            <button onclick="event.stopPropagation(); deletePost('${cat}','${id}')" class="text-red-500 text-[10px] font-bold uppercase tracking-widest hover:underline">Supprimer</button>
                        </div>` : ''}
                    </div>
                </div>
            </div>`;
        };

        window.editPost = (cat, id) => {
            const item = globalData[cat][id];
            get('inTitle').value = item.title;
            get('inPrice').value = item.price;
            get('inDesc').value = item.desc || "";
            get('inCategory').value = cat;
            get('adminFormTitle').innerText = "Modifier : " + item.title;
            get('btnPublish').innerText = "Mettre à jour le bien";
            window.editing = { cat, id };
            window.scrollTo({ top: get('adminPanel').offsetTop, behavior: 'smooth' });
        };

        get('btnPublish').onclick = () => {
            const title = get('inTitle').value, price = get('inPrice').value, 
                  cat = get('inCategory').value, desc = get('inDesc').value;
            
            if(!title) return alert("Le titre est obligatoire.");
            showLoader();

            if(window.editing){
                update(ref(db, `content/${window.editing.cat}/${window.editing.id}`), {
                    title, price, desc,
                    img: currentImg || globalData[window.editing.cat][window.editing.id].img
                }).then(() => {
                    hideLoader();
                    alert("Propriété mise à jour !");
                    window.editing = null;
                    location.reload();
                });
            } else {
                if(!currentImg) return alert("Une image est requise pour une nouvelle publication.");
                push(ref(db, `content/${cat}`), { title, price, img: currentImg, desc })
                    .then(() => { hideLoader(); alert("Propriété publiée !"); location.reload(); });
            }
        };

        window.deletePost = (cat, id) => { if(confirm("Supprimer définitivement ce bien ?")) remove(ref(db, `content/${cat}/${id}`)); };

        // --- FAVORIS ---
        window.toggleFav = (id) => {
            let favs = JSON.parse(localStorage.getItem("arcadia_favs") || "[]");
            favs = favs.includes(id) ? favs.filter(f => f !== id) : [...favs, id];
            localStorage.setItem("arcadia_favs", JSON.stringify(favs));
            renderFavs();
        };

        function renderFavs(){
            let favs = JSON.parse(localStorage.getItem("arcadia_favs") || "[]"), html = "", count = 0;
            ['villas','biens','articles'].forEach(cat => {
                if(globalData[cat]) Object.entries(globalData[cat]).forEach(([id, item]) => {
                    if(favs.includes(id)){ html += createCard(id, item, cat); count++; }
                });
            });
            get('favContent').innerHTML = html;
            get('favCount').innerText = count;
            get('favSection').classList.toggle('hidden', count === 0);
        }
    </script>
</body>
</html>
