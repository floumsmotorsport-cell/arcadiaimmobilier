<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Prestige | Excellence Immobilière</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }

        @keyframes revealUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .reveal { animation: revealUp 0.8s ease forwards; }
        
        .glass { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .hero-bg {
            background: linear-gradient(rgba(10, 15, 30, 0.85), rgba(10, 15, 30, 0.85)),
                        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; height: 90vh;
        }

        .view-section { display: none; }
        .active-view { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card-hover { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-hover:hover { transform: translateY(-15px) scale(1.03); box-shadow: 0 30px 60px rgba(0,0,0,0.15); }

        #adminBar { display: none; background: #0f172a; border-bottom: 2px solid #b45309; }
        .is-admin #adminBar { display: flex; }

        /* Music Player Enhanced */
        #musicControl { 
            position: fixed; bottom: 20px; left: 20px; z-index: 1000; 
            display: flex; flex-direction: column; gap: 5px; 
            background: rgba(15, 23, 42, 0.9); padding: 12px 18px; 
            border-radius: 24px; color: white; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            min-width: 200px;
        }
        #progressContainer { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; cursor: pointer; overflow: hidden; }
        #progressBar { width: 0%; height: 100%; background: #d97706; transition: width 0.1s linear; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="musicControl">
        <div class="flex items-center justify-between gap-4">
            <div class="flex flex-col">
                <span class="text-[8px] uppercase tracking-widest text-amber-500 font-bold">En écoute</span>
                <span id="trackName" class="text-[10px] font-medium truncate w-32">Arcadia Silence</span>
            </div>
            <button onclick="toggleMusic()" id="musicBtn" class="bg-amber-600 hover:bg-amber-500 w-8 h-8 rounded-full flex items-center justify-center transition shadow-lg">
                <span id="playIcon">▶</span>
            </button>
        </div>
        <div id="progressContainer" onclick="seekAudio(event)">
            <div id="progressBar"></div>
        </div>
        <audio id="bgAudio"></audio>
    </div>

    <div id="adminBar" class="fixed top-0 w-full text-white py-3 px-8 z-[100] justify-between items-center text-[10px] font-bold uppercase tracking-widest">
        <div class="flex items-center space-x-6">
            <span class="text-amber-500 border-r border-white/20 pr-6">STAFF: <span id="activeUserDisplay"></span></span>
            <button onclick="showView('adminPanel')" class="hover:text-amber-500 transition">GESTION & INBOX</button>
            <button onclick="showView('publicContent')" class="hover:text-amber-500 transition">RETOUR SITE</button>
        </div>
        <button id="btnLogout" class="bg-red-600 px-4 py-1 rounded-full hover:bg-red-700 transition">DECONNEXION</button>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/90 z-[999] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white max-w-3xl w-full rounded-[2.5rem] overflow-hidden relative shadow-2xl">
            <button onclick="closeDetail()" class="absolute top-6 right-6 z-50 bg-white/80 w-10 h-10 rounded-full flex items-center justify-center font-bold">✕</button>
            <div id="carousel" class="relative h-96 bg-slate-200">
                <img id="carouselImg" class="w-full h-full object-cover">
                <button onclick="prevImg()" class="absolute left-4 top-1/2 -translate-y-1/2 bg-white/70 w-10 h-10 rounded-full flex items-center justify-center hover:bg-white transition">‹</button>
                <button onclick="nextImg()" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white/70 w-10 h-10 rounded-full flex items-center justify-center hover:bg-white transition">›</button>
            </div>
            <div class="p-10">
                <h2 id="detailTitle" class="text-4xl font-serif font-bold mb-4 italic"></h2>
                <p id="detailPrice" class="text-amber-600 font-bold text-2xl mb-4"></p>
                <div id="detailDesc" class="text-slate-600 leading-relaxed max-h-48 overflow-y-auto whitespace-pre-line text-sm"></div>
                <button onclick="openDevis(); closeDetail();" class="mt-8 w-full bg-slate-900 text-white py-4 rounded-xl font-bold uppercase text-xs hover:bg-amber-600 transition">S'informer sur ce bien</button>
            </div>
        </div>
    </div>

    <main id="publicContent" class="view-section active-view">
        <section class="hero-bg flex flex-col items-center justify-center text-center px-6 relative">
            <div class="reveal">
                <h1 class="text-white text-7xl md:text-9xl font-serif font-bold mb-4">Arcadia</h1>
                <p class="text-amber-500 font-bold uppercase tracking-widest text-[14px] mb-12">Prestige & Articles d'Exception</p>
                <div class="flex flex-col md:flex-row gap-6 justify-center">
                    <button onclick="openDevis()" class="bg-amber-600 text-white px-10 py-4 rounded-full font-bold text-xs uppercase shadow-2xl">Demander une estimation</button>
                    <button onclick="openLogin()" class="glass text-white px-10 py-4 rounded-full font-bold text-xs uppercase">Accès Staff</button>
                    <button onclick="openClientSpace()" class="border border-white/30 text-white px-10 py-4 rounded-full font-bold text-xs uppercase hover:bg-white/10">Espace Client</button>
                </div>
            </div>
        </section>

        <section class="py-10 border-b border-slate-200 bg-white sticky top-0 z-40">
            <div class="container mx-auto px-6 flex flex-wrap justify-center items-center gap-6 md:gap-12 text-[10px] font-black uppercase tracking-[0.2em]">
                <button onclick="renderAll()" class="hover:text-amber-600 transition">Tout</button>
                <button onclick="filterCat('villas')" class="hover:text-amber-600 transition">Villas de Luxe</button>
                <button onclick="filterCat('biens')" class="hover:text-amber-600 transition">Biens Rares</button>
                <button onclick="filterCat('articles')" class="hover:text-amber-600 transition">Articles & News</button>
                <div class="h-4 w-[1px] bg-slate-200 mx-2"></div>
                <button onclick="sortByPrice()" class="text-amber-600 border border-amber-600 px-4 py-2 rounded-full hover:bg-amber-600 hover:text-white transition">Trier par prix ↑</button>
            </div>
        </section>

        <section class="py-20">
            <div id="allContent" class="container mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-12"></div>
        </section>
    </main>

    <main id="adminPanel" class="view-section pt-32 pb-24 container mx-auto px-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
            <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100">
                <h2 class="text-3xl font-serif font-bold mb-8 italic">Nouveau contenu</h2>
                <div class="space-y-4">
                    <select id="inCategory" class="w-full p-4 bg-slate-100 rounded-2xl outline-none font-bold">
                        <option value="villas">Villa de Luxe</option>
                        <option value="biens">Bien d'exception</option>
                        <option value="articles">Article / Actualité</option>
                    </select>
                    <input type="text" id="inTitle" placeholder="Titre" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                    <input type="text" id="inPrice" placeholder="Prix (ex: 2 500 000 €)" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
                    <textarea id="inDesc" placeholder="Description..." class="w-full p-4 bg-slate-100 rounded-2xl h-48 outline-none"></textarea>
                    <div class="p-6 border-2 border-dashed border-slate-200 rounded-2xl text-center">
                        <input type="file" id="multiFileInput" multiple accept="image/*" class="text-xs">
                    </div>
                    <button id="btnPublish" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold uppercase tracking-widest text-xs hover:bg-amber-600">Mettre en ligne</button>
                </div>
            </div>
            <div>
                <h2 class="text-3xl font-serif font-bold mb-8 flex justify-between items-center">
                    Inbox <span id="msgCount" class="text-sm bg-amber-600 text-white px-4 py-1 rounded-full">0</span>
                </h2>
                <div id="adminMessages" class="space-y-6 max-h-[900px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </main>

    <div id="loginOverlay" class="fixed inset-0 z-[500] hidden flex items-center justify-center bg-slate-950/95 backdrop-blur-xl">
        <div class="bg-white p-12 rounded-[3.5rem] w-96 text-center shadow-2xl">
            <h3 class="text-2xl font-serif font-bold mb-8 italic">Authentification Staff</h3>
            <input type="text" id="userLogin" placeholder="Staff ID" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 outline-none">
            <input type="password" id="passLogin" placeholder="Mot de passe" class="w-full p-4 bg-slate-100 rounded-2xl mb-8 outline-none">
            <button id="btnLoginAction" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase text-xs">Accéder</button>
            <button onclick="closeLogin()" class="mt-6 text-slate-400 text-[10px] uppercase font-bold block mx-auto">Fermer</button>
        </div>
    </div>

    <div id="clientSpace" class="hidden fixed inset-0 bg-slate-950/90 z-[999] flex items-center justify-center backdrop-blur-md">
        <div class="bg-white p-12 rounded-[3.5rem] w-96 text-center shadow-2xl">
            <h3 class="text-2xl font-serif font-bold mb-8 italic">Espace Client</h3>
            <input id="clientEmail" placeholder="Email" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <input id="clientPass" type="password" placeholder="Mot de passe" class="w-full p-4 bg-slate-100 rounded-2xl mb-6 outline-none">
            <button onclick="loginClient()" class="w-full bg-amber-600 text-white py-4 rounded-2xl font-bold uppercase text-xs">Connexion</button>
            <button onclick="get('clientSpace').classList.add('hidden')" class="mt-6 text-slate-400 text-[10px] uppercase font-bold block mx-auto">Fermer</button>
        </div>
    </div>

    <div id="devisBox" class="fixed inset-0 bg-slate-900/90 z-[999] hidden flex items-center justify-center backdrop-blur-md">
        <div class="bg-white p-12 rounded-[3rem] w-full max-w-lg shadow-2xl">
            <h3 class="text-3xl font-serif font-bold mb-8 text-center italic">Estimation & Contact</h3>
            <input id="devisName" placeholder="Votre nom" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <input id="devisEmail" placeholder="Votre email" class="w-full p-4 bg-slate-100 rounded-2xl mb-3 outline-none">
            <textarea id="devisMsg" placeholder="Votre message..." class="w-full p-4 bg-slate-100 rounded-2xl mb-6 h-40 outline-none"></textarea>
            <button onclick="sendDevis()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase tracking-widest text-xs">Envoyer la demande</button>
            <button onclick="closeDevis()" class="mt-4 text-slate-400 w-full text-center text-[10px] uppercase font-bold">Annuler</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "arcadiaimmobilier-ee335.firebaseapp.com",
            databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arcadiaimmobilier-ee335",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const get = id => document.getElementById(id);
        
        // --- MUSIQUE LOGIC ---
        const playlist = [
            { name: "La Fouine - Vision", file: "lafouine_vision.mp3" },
            { name: "RK - Chopard", file: "rk_chopardrk_chopard.mp3" },
            { name: "RNBOI - Bébé", file: "rnboi_bebe.mp3" }
        ];
        let currentTrack = 0;
        const audio = get('bgAudio');
        const progressBar = get('progressBar');

        window.toggleMusic = () => {
            if (audio.src === "" || audio.paused) {
                if(audio.src === "") audio.src = playlist[currentTrack].file;
                audio.play();
                get('playIcon').innerText = "⏸";
                get('trackName').innerText = playlist[currentTrack].name;
            } else {
                audio.pause();
                get('playIcon').innerText = "▶";
            }
        };

        audio.ontimeupdate = () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = pct + "%";
        };

        window.seekAudio = (e) => {
            const rect = get('progressContainer').getBoundingClientRect();
            const pos = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        };

        audio.onended = () => {
            currentTrack = (currentTrack + 1) % playlist.length;
            audio.src = playlist[currentTrack].file;
            get('trackName').innerText = playlist[currentTrack].name;
            audio.play();
        };

        // --- FIREBASE DATA & RENDER ---
        let globalData = {};
        let multiImages = [];
        let currentCarouselImages = [];
        let currentCarouselIndex = 0;

        window.get = get;
        window.showView = (id) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
            get(id).classList.add('active-view');
            window.scrollTo(0,0);
        };
        window.openLogin = () => get('loginOverlay').classList.remove('hidden');
        window.closeLogin = () => get('loginOverlay').classList.add('hidden');
        window.openDevis = () => get('devisBox').classList.remove('hidden');
        window.closeDevis = () => get('devisBox').classList.add('hidden');
        window.openClientSpace = () => get('clientSpace').classList.remove('hidden');

        // CARROUSEL
        window.openDetail = (item) => {
            currentCarouselImages = item.images || [item.img];
            currentCarouselIndex = 0;
            updateCarousel();
            get('detailTitle').innerText = item.title;
            get('detailPrice').innerText = item.price || "Sur demande";
            get('detailDesc').innerText = item.desc || "";
            get('detailModal').classList.remove('hidden');
        };
        function updateCarousel() { get('carouselImg').src = currentCarouselImages[currentCarouselIndex]; }
        window.closeDetail = () => get('detailModal').classList.add('hidden');
        window.nextImg = () => { currentCarouselIndex = (currentCarouselIndex + 1) % currentCarouselImages.length; updateCarousel(); };
        window.prevImg = () => { currentCarouselIndex = (currentCarouselIndex - 1 + currentCarouselImages.length) % currentCarouselImages.length; updateCarousel(); };

        // RENDU & TRI
        window.renderAll = () => render();
        window.filterCat = (cat) => render(cat);

        window.sortByPrice = () => {
            onValue(ref(db, 'content'), (snap) => {
                let data = snap.val() || {};
                let items = [];
                Object.keys(data).forEach(cat => {
                    Object.entries(data[cat]).forEach(([id, obj]) => items.push({ ...obj, id, cat }));
                });
                const getVal = (p) => {
                    if(!p) return 0;
                    let n = parseInt(p.replace(/[^0-9]/g, ''));
                    return isNaN(n) ? 0 : n;
                };
                items.sort((a, b) => getVal(a.price) - getVal(b.price));
                displayItems(items);
            }, { onlyOnce: true });
        };

        function displayItems(items) {
            let html = "";
            const isAdmin = document.body.classList.contains('is-admin');
            items.forEach(item => {
                const itemData = JSON.stringify(item).replace(/'/g, "&apos;");
                html += `
                <div class="card-hover bg-white rounded-[2.5rem] shadow-xl overflow-hidden reveal cursor-pointer" onclick='openDetail(${itemData})'>
                    <div class="h-80 overflow-hidden relative">
                        <img src="${item.img}" class="w-full h-full object-cover">
                        <span class="absolute top-4 left-4 bg-black/50 text-white text-[8px] font-black uppercase px-3 py-1 rounded-full backdrop-blur-md">${item.cat || 'bien'}</span>
                    </div>
                    <div class="p-8">
                        <h4 class="text-2xl font-serif font-bold italic">${item.title}</h4>
                        <p class="text-amber-600 font-bold mt-2">${item.price || ''}</p>
                        ${isAdmin ? `<button onclick="event.stopPropagation(); deletePost('${item.cat}','${item.id}')" class="mt-6 text-red-500 text-[10px] font-bold uppercase hover:underline">Supprimer</button>` : ''}
                    </div>
                </div>`;
            });
            get('allContent').innerHTML = html || "<p class='text-center col-span-3 py-20 text-slate-400'>Aucun contenu.</p>";
        }

        function render(filter = null) {
            onValue(ref(db, 'content'), (snap) => {
                let data = snap.val() || {};
                let items = [];
                const cats = filter ? [filter] : ['villas','biens','articles'];
                cats.forEach(c => {
                    if(data[c]) Object.entries(data[c]).forEach(([id, obj]) => items.push({...obj, id, cat: c}));
                });
                displayItems(items);
            }, { onlyOnce: true });
        }

        // ADMIN ACTIONS
        get('multiFileInput').onchange = (e) => {
            multiImages = [];
            Array.from(e.target.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = () => multiImages.push(reader.result);
                reader.readAsDataURL(file);
            });
        };

        get('btnPublish').onclick = () => {
            const title = get('inTitle').value, price = get('inPrice').value, cat = get('inCategory').value, desc = get('inDesc').value;
            if(!title || multiImages.length === 0) return alert("Titre et image requis.");
            push(ref(db, `content/${cat}`), { title, price, desc, img: multiImages[0], images: multiImages })
            .then(() => { alert("Publié !"); location.reload(); });
        };

        window.deletePost = (cat, id) => { if(confirm("Supprimer ?")) remove(ref(db, `content/${cat}/${id}`)); };

        // AUTH
        const ACCOUNTS = { "Axel": "Axel30", "Alden": "Alden30" };
        get('btnLoginAction').onclick = () => {
            const u = get('userLogin').value, p = get('passLogin').value;
            if(ACCOUNTS[u] === p){ sessionStorage.setItem('arcadia_user', u); location.reload(); }
            else alert("Accès refusé");
        };
        if(sessionStorage.getItem('arcadia_user')){
            document.body.classList.add('is-admin');
            get('activeUserDisplay').innerText = sessionStorage.getItem('arcadia_user');
        }
        get('btnLogout').onclick = () => { sessionStorage.removeItem('arcadia_user'); location.reload(); };

        render();
    </script>
</body>
</html>
