<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Immobilier | d'Exception</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { --gold:#b38e44; }
        body { font-family: 'Montserrat', sans-serif; background:#0a0a0a; color:white; overflow-x:hidden; }
        .font-serif { font-family:'Cormorant Garamond', serif; }
        .hero { height:100vh; position:relative; overflow:hidden; }
        .hero video { position:absolute; width:100%; height:100%; object-fit:cover; }
        .hero-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.6); }
        .card { border-radius:20px; overflow:hidden; background:#111; transition:0.5s; border: 1px solid rgba(255,255,255,0.05); }
        .card:hover { transform:translateY(-10px); border-color: var(--gold); }
        .btn-view { border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; font-size: 10px; text-transform: uppercase; tracking-widest: 3px; cursor: pointer; transition: 0.4s; }
        .btn-view:hover { background: var(--gold); color: black; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        #orderModal { display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; }
        .input-arcadia { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); padding:12px; border-radius:8px; color:white; margin-bottom:12px; outline:none; }
    </style>
</head>
<body>

    <div id="orderModal">
        <div class="glass p-10 rounded-2xl max-w-md w-full relative">
            <button onclick="closeOrder()" class="absolute top-4 right-4 opacity-50 hover:opacity-100">✕</button>
            <h2 class="font-serif text-3xl italic mb-2 text-center">Demande RP</h2>
            <p id="orderSummary" class="text-gold text-center text-[10px] uppercase tracking-widest mb-8"></p>
            <div id="userInfoFields">
                <input type="text" id="custNom" placeholder="Nom RP" class="input-arcadia">
                <input type="text" id="custPrenom" placeholder="Prénom RP" class="input-arcadia">
                <input type="tel" id="custTel" placeholder="Téléphone" class="input-arcadia">
            </div>
            <button onclick="confirmOrder()" class="w-full bg-gold text-black font-bold py-4 rounded uppercase text-xs tracking-widest hover:brightness-110">Envoyer</button>
        </div>
    </div>

    <nav class="fixed top-0 w-full z-50 flex justify-between items-center p-8 backdrop-blur-md border-b border-white/5">
        <h1 class="font-serif text-3xl italic">Arcadia</h1>
        <div id="userGreeting" class="text-[10px] tracking-[3px] uppercase text-gold"></div>
        <a href="admin.html" class="text-[9px] opacity-40 hover:opacity-100 uppercase">Staff</a>
    </nav>

    <section class="hero flex items-center justify-center text-center px-4">
        <video autoplay muted loop playsinline><source src="https://cdn.coverr.co/videos/coverr-luxury-house-1574/1080p.mp4" type="video/mp4"></video>
        <div class="hero-overlay"></div>
        <div class="relative z-10">
            <h1 class="font-serif text-6xl md:text-9xl italic">Arcadia</h1>
            <p class="mt-6 tracking-[8px] text-xs opacity-70">IMMOBILIER DE PRESTIGE</p>
        </div>
    </section>

    <section id="clientDashboard" class="hidden py-10 px-6 max-w-7xl mx-auto">
        <div class="glass p-8 rounded-3xl border-l-4 border-gold">
            <h3 class="font-serif text-2xl italic mb-6">Suivi de mes demandes RP</h3>
            <div id="myOrdersList" class="space-y-4 text-sm"></div>
        </div>
    </section>

    <section class="py-24 px-6 max-w-7xl mx-auto">
        <div id="catalogContainer" class="grid md:grid-cols-3 gap-8"></div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentOrder = null;
        const activeUser = JSON.parse(localStorage.getItem('arcadia_user_rp'));

        if(activeUser) {
            document.getElementById('userGreeting').innerText = `Citoyen: ${activeUser.prenom} ${activeUser.nom}`;
            document.getElementById('userInfoFields').style.display = 'none';
            document.getElementById('clientDashboard').classList.remove('hidden');
            loadMyOrders(activeUser.nom, activeUser.prenom);
        }

        window.openOrder = (service, prix) => {
            currentOrder = { service, prix };
            document.getElementById('orderSummary').innerText = `${service} — ${prix}`;
            document.getElementById('orderModal').style.display = 'flex';
        };

        window.closeOrder = () => document.getElementById('orderModal').style.display = 'none';

        window.confirmOrder = () => {
            let userData = activeUser || {
                nom: document.getElementById('custNom').value,
                prenom: document.getElementById('custPrenom').value,
                tel: document.getElementById('custTel').value || "N/A"
            };

            if(!userData.nom || !userData.prenom) return alert("Nom/Prénom RP requis");
            localStorage.setItem('arcadia_user_rp', JSON.stringify(userData));

            push(ref(db, 'orders'), {
                ...userData, ...currentOrder,
                date: new Date().toLocaleString('fr-FR'),
                status: 'En attente',
                reponseStaff: 'Votre demande est en cours de traitement...'
            }).then(() => location.reload());
        };

        function loadMyOrders(nom, prenom) {
            onValue(ref(db, 'orders'), (snap) => {
                const data = snap.val();
                let html = "";
                if(!data) return;
                Object.entries(data).reverse().forEach(([id, ord]) => {
                    if(ord.nom === nom && ord.prenom === prenom) {
                        html += `<div class="bg-white/5 p-4 rounded-xl border border-white/10 mb-4">
                            <div class="flex justify-between mb-2">
                                <span class="font-bold text-gold uppercase text-[10px]">${ord.service}</span>
                                <span class="text-[10px] uppercase font-bold">${ord.status}</span>
                            </div>
                            <p class="text-white/80 text-xs italic">"${ord.reponseStaff}"</p>
                        </div>`;
                    }
                });
                document.getElementById('myOrdersList').innerHTML = html || "<p class='opacity-30'>Aucune demande.</p>";
            });
        }

        onValue(ref(db, 'listings'), (snap) => {
            const data = snap.val();
            let html = "";
            if(!data) return;
            Object.entries(data).reverse().forEach(([id, it]) => {
                html += `<div class="card p-4">
                    <img src="${it.images[0]}" class="h-48 w-full object-cover rounded-xl mb-4">
                    <h4 class="font-serif text-2xl mb-4">${it.title}</h4>
                    <div class="flex justify-between items-center">
                        <span class="text-gold">${it.price}</span>
                        <button onclick="openOrder('${it.title}', '${it.price}')" class="btn-view">Réserver</button>
                    </div>
                </div>`;
            });
            document.getElementById('catalogContainer').innerHTML = html;
        });
    </script>
</body>
</html>
