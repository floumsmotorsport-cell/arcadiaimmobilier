<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Prestige | Conciergerie Internationale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .hero-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)), 
                        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; height: 75vh;
        }
        .view-section { display: none; }
        .active-view { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #adminBar { display: none; background: #0f172a; border-bottom: 2px solid #b45309; }
        .is-admin #adminBar { display: flex; }
        
        .fav-badge { position: absolute; top: -5px; right: -5px; background: #b45309; color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="fixed top-4 right-4 bg-white shadow-xl px-4 py-2 rounded-full z-50 border border-slate-100 flex items-center gap-2">
        <select id="langSelect" class="bg-transparent outline-none font-bold text-xs cursor-pointer">
            <option value="fr">FR</option>
            <option value="en">EN</option>
            <option value="ar">AR</option>
        </select>
    </div>

    <div id="chatBox" class="fixed bottom-24 right-6 w-80 bg-white shadow-2xl rounded-2xl hidden flex flex-col z-50 border border-slate-100 overflow-hidden">
        <div class="bg-slate-900 text-white p-4 font-bold">Concierge IA</div>
        <div id="chatMessages" class="p-4 h-60 overflow-y-auto text-sm space-y-2 bg-slate-50"></div>
        <div class="flex border-t">
            <input id="chatInput" class="flex-1 p-3 outline-none text-xs" placeholder="Demandez un devis...">
            <button id="sendChat" class="px-4 bg-amber-600 text-white">➤</button>
        </div>
    </div>
    <button onclick="toggleChat()" class="fixed bottom-6 right-6 bg-amber-600 text-white w-14 h-14 rounded-full shadow-xl text-xl z-50 flex items-center justify-center">💬</button>

    <div id="adminBar" class="fixed top-0 w-full text-white py-3 px-8 z-[100] justify-between items-center text-[10px] font-bold uppercase tracking-widest">
        <div class="flex items-center space-x-6">
            <span class="text-amber-500">STAFF: <span id="activeUserDisplay"></span></span>
            <button onclick="showView('adminPanel')">PANEL</button>
            <button onclick="showView('publicContent')">SITE</button>
        </div>
        <button id="btnLogout" class="bg-red-600 px-3 py-1 rounded-full hover:bg-red-700 transition">SORTIR</button>
    </div>

    <main id="publicContent" class="view-section active-view">
        <section class="hero-bg flex flex-col items-center justify-center text-center px-6 relative">
            <h1 class="text-white text-5xl md:text-7xl font-serif font-bold mb-4">Arcadia Prestige</h1>
            <p class="text-amber-400 font-bold uppercase tracking-[0.4em] text-[11px] mb-8">L'Excellence Immobilière</p>
            <div class="flex gap-4">
                <a href="#portfolio" class="bg-white text-slate-900 px-8 py-3 rounded-full font-bold text-sm uppercase">Découvrir</a>
                <button onclick="scrollToFavs()" class="bg-amber-600 text-white px-8 py-3 rounded-full font-bold text-sm uppercase relative">
                    Mes Favoris <span id="favCount" class="fav-badge">0</span>
                </button>
            </div>
            <button onclick="openLogin()" class="absolute bottom-4 left-6 text-white/10 text-[9px] hover:text-white/40">STAFF LOGIN</button>
        </section>

        <section id="portfolio" class="py-20 bg-white">
            <div class="container mx-auto px-6 text-center mb-12">
                <h3 class="text-3xl font-serif font-bold italic">Portefeuille d'Exception</h3>
            </div>
            <div id="allContent" class="container mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-10">
                </div>
        </section>

        <section id="favSection" class="py-20 bg-slate-900 text-white hidden">
            <div class="container mx-auto px-6">
                <h3 class="text-3xl font-serif font-bold mb-10 text-center">Mes Coups de Cœur ❤️</h3>
                <div id="favContent" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
            </div>
        </section>

        <section class="py-20 bg-slate-50">
            <div class="max-w-4xl mx-auto px-6 bg-white p-12 rounded-[3rem] shadow-xl text-center border border-slate-100">
                <h2 class="text-3xl font-serif font-bold mb-6">Une demande particulière ?</h2>
                <p class="text-slate-500 mb-8">Notre conciergerie privée vous répond sous 1 heure.</p>
                <button class="bg-slate-900 text-white px-12 py-4 rounded-2xl font-bold uppercase tracking-widest hover:bg-amber-600 transition">Contacter un expert</button>
            </div>
        </section>
    </main>

    <main id="adminPanel" class="view-section pt-24 pb-20 container mx-auto px-6">
        <div class="max-w-lg mx-auto bg-white p-8 rounded-[2rem] shadow-2xl">
            <h2 class="text-2xl font-serif font-bold mb-6 text-center">Publier un nouveau bien</h2>
            <div class="space-y-4">
                <input type="file" id="fileInput" class="w-full text-xs border p-2 rounded">
                <input type="text" id="inTitle" placeholder="Nom de la propriété" class="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-amber-500">
                <input type="text" id="inPrice" placeholder="Prix (ex: 4 500 000 €)" class="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-amber-500">
                <button id="btnPublish" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-amber-600 transition">PUBLIER</button>
            </div>
        </div>
    </main>

    <div id="loginOverlay" class="fixed inset-0 z-[500] hidden flex items-center justify-center bg-slate-900/90 backdrop-blur-sm">
        <div class="bg-white p-10 rounded-[2rem] w-80 text-center shadow-2xl">
            <h3 class="text-xl font-serif font-bold mb-6">Accès Staff</h3>
            <input type="text" id="userLogin" placeholder="Identifiant" class="w-full p-3 bg-slate-100 rounded mb-3 outline-none">
            <input type="password" id="passLogin" placeholder="Mot de passe" class="w-full p-3 bg-slate-100 rounded mb-6 outline-none">
            <button id="btnLoginAction" class="w-full bg-slate-900 text-white py-3 rounded font-bold">ENTRER</button>
            <button onclick="closeLogin()" class="mt-4 text-[10px] text-slate-400 uppercase">Fermer</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSy...", // Remplace par ta clé complète
            authDomain: "arcadiaimmobilier-ee335.firebaseapp.com",
            databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arcadiaimmobilier-ee335",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let globalData = {};

        /* =========================
           UTILITAIRE DOM
        ========================= */
        const get = id => document.getElementById(id);

        /* =========================
           NAVIGATION
        ========================= */
        window.showView = (id) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
            get(id).classList.add('active-view');
        };

        window.openLogin = () => get('loginOverlay').classList.remove('hidden');
        window.closeLogin = () => get('loginOverlay').classList.add('hidden');

        window.scrollToFavs = () => {
            const el = get('favSection');
            if(el) el.scrollIntoView({ behavior: 'smooth' });
        };

        /* =========================
           AUTHENTIFICATION
        ========================= */
        const ACCOUNTS = { "Axel": "Axel30", "Alden": "Alden30" };

        get('btnLoginAction').onclick = () => {
            const u = get('userLogin').value;
            const p = get('passLogin').value;

            if(ACCOUNTS[u] === p){
                sessionStorage.setItem('arcadia_user', u);
                location.reload();
            } else alert("Identifiants incorrects");
        };

        get('btnLogout')?.addEventListener('click', () => {
            sessionStorage.removeItem('arcadia_user');
            location.reload();
        });

        if(sessionStorage.getItem('arcadia_user')){
            document.body.classList.add('is-admin');
            get('activeUserDisplay').innerText = sessionStorage.getItem('arcadia_user');
        }

        /* =========================
           FIREBASE & RENDER
        ========================= */
        onValue(ref(db, 'content'), (snap) => {
            globalData = snap.val() || {};
            renderAll();
            renderFavs();
        });

        function renderAll(){
            let html = "";
            ['villas','creations','articles'].forEach(cat => {
                if(globalData[cat]){
                    Object.entries(globalData[cat]).forEach(([id, item]) => {
                        html += createCard(id, item, cat);
                    });
                }
            });
            get('allContent').innerHTML = html || "<p class='text-center col-span-3 text-slate-400'>Aucun contenu disponible</p>";
        }

        function createCard(id, item, cat){
            return `
            <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden group relative border border-slate-100 transition-all hover:shadow-2xl">
                <button onclick="toggleFav('${id}')" class="absolute top-4 right-4 text-xl z-10 p-2 rounded-full bg-white/80 shadow hover:scale-110 transition">❤️</button>
                <img src="${item.img}" class="h-64 w-full object-cover group-hover:scale-105 transition duration-500">
                <div class="p-8">
                    <span class="text-[9px] font-black text-amber-600 uppercase tracking-widest">${cat}</span>
                    <h4 class="text-2xl font-serif font-bold mt-1">${item.title}</h4>
                    <p class="text-amber-700 font-bold mt-2">${item.price || 'Prix sur demande'}</p>
                    <button onclick="generatePDF('${item.title}','${item.price}')" 
                    class="mt-4 text-[10px] bg-slate-900 text-white px-4 py-2 rounded-xl uppercase font-bold tracking-tighter hover:bg-amber-600 transition">
                    Télécharger PDF
                    </button>
                </div>
            </div>`;
        }

        /* =========================
           LOGIQUE FAVORIS
        ========================= */
        window.toggleFav = (id) => {
            let favs = JSON.parse(localStorage.getItem("favs") || "[]");
            if(favs.includes(id)) favs = favs.filter(f => f !== id);
            else favs.push(id);
            localStorage.setItem("favs", JSON.stringify(favs));
            renderFavs();
        };

        function renderFavs(){
            let favs = JSON.parse(localStorage.getItem("favs") || "[]");
            let html = "";
            let count = 0;

            ['villas','creations','articles'].forEach(cat => {
                if(globalData[cat]){
                    Object.entries(globalData[cat]).forEach(([id, item]) => {
                        if(favs.includes(id)){
                            html += createCard(id, item, cat);
                            count++;
                        }
                    });
                }
            });

            get('favContent').innerHTML = html;
            get('favCount').innerText = count;
            get('favSection').classList.toggle('hidden', count === 0);
        }

        /* =========================
           FONCTIONS CLIENTS (PDF, CHAT, LANGUE)
        ========================= */
        window.generatePDF = (title, price) => {
            const win = window.open('', '', 'width=600,height=600');
            win.document.write(`
            <html><body style="font-family:serif;text-align:center;padding:50px; border:10px solid #b45309">
                <h1 style="font-size:40px; color:#0f172a">ARCADIA PRESTIGE</h1>
                <p style="text-transform:uppercase; letter-spacing:5px">Document Confidentiel</p>
                <hr style="margin:40px 0">
                <h2 style="font-size:30px">${title}</h2>
                <h3 style="color:#b45309; font-size:24px">${price}</h3>
                <p style="margin-top:50px; font-style:italic">Contactez notre conciergerie pour plus de détails.</p>
            </body></html>`);
            win.print();
        };

        window.toggleChat = () => get('chatBox').classList.toggle("hidden");

        get('sendChat').onclick = () => {
            const input = get('chatInput');
            const msg = input.value.trim().toLowerCase();
            if(!msg) return;

            const box = get('chatMessages');
            box.innerHTML += `<div class="text-right text-xs mb-2"><span class="bg-slate-200 p-2 rounded-lg inline-block">${msg}</span></div>`;

            let reply = "Notre concierge traite votre demande immédiatement.";
            if(msg.includes("prix")) reply = "Nos tarifs sont exclusifs. Un expert vous contactera pour un devis personnalisé.";
            if(msg.includes("visite")) reply = "Nous pouvons organiser une visite privée sous 24h.";

            setTimeout(() => {
                box.innerHTML += `<div class="text-left text-xs text-amber-600 font-bold">IA: ${reply}</div>`;
                box.scrollTop = box.scrollHeight;
            }, 700);

            input.value = "";
        };

        get('langSelect').onchange = (e) => {
            const l = e.target.value;
            document.body.style.direction = (l === "ar") ? "rtl" : "ltr";
            document.body.style.textAlign = (l === "ar") ? "right" : "left";
        };

        /* =========================
           UPLOAD ADMIN
        ========================= */
        let currentImg = "";

        get('fileInput').onchange = e => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = () => currentImg = reader.result;
            reader.readAsDataURL(file);
        };

        get('btnPublish').onclick = () => {
            const title = get('inTitle').value;
            const price = get('inPrice').value;

            if(!title || !currentImg){
                alert("Veuillez remplir le titre et charger une image.");
                return;
            }

            push(ref(db, 'content/villas'), {
                title,
                price,
                img: currentImg
            }).then(() => {
                alert("Bien publié avec succès !");
                location.reload();
            });
        };
    </script>
</body>
</html>
