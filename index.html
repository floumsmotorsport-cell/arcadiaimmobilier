<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Prestige | Conciergerie Internationale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .hero-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)),
                        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; height: 75vh;
        }
        .view-section { display: none; }
        .active-view { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #adminBar { display: none; background: #0f172a; border-bottom: 2px solid #b45309; }
        .is-admin #adminBar { display: flex; }
        
        .fav-badge { position: absolute; top: -5px; right: -5px; background: #b45309; color: white; font-size: 10px; padding: 2px 6px; border-radius: 50%; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="fixed top-4 right-4 bg-white shadow-xl px-4 py-2 rounded-full z-50 border border-slate-100 flex items-center gap-2">
        <select id="langSelect" class="bg-transparent outline-none font-bold text-xs cursor-pointer">
            <option value="fr">FR</option>
            <option value="en">EN</option>
            <option value="ar">AR</option>
        </select>
    </div>

    <div id="devisBox" class="fixed inset-0 bg-black/70 z-[999] hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white p-10 rounded-[2rem] w-full max-w-lg shadow-2xl mx-4">
            <h3 class="text-2xl font-serif font-bold mb-6 text-center">Demande de devis</h3>
            <input id="devisName" placeholder="Nom" class="w-full p-3 bg-slate-100 rounded mb-3 outline-none focus:ring-1 ring-amber-500">
            <input id="devisEmail" placeholder="Email" class="w-full p-3 bg-slate-100 rounded mb-3 outline-none focus:ring-1 ring-amber-500">
            <textarea id="devisMsg" placeholder="Votre demande..." class="w-full p-3 bg-slate-100 rounded mb-4 h-32 outline-none focus:ring-1 ring-amber-500"></textarea>
            <button onclick="sendDevis()" class="w-full bg-amber-600 text-white py-3 rounded-xl font-bold hover:bg-amber-700 transition">Envoyer la demande</button>
            <button onclick="closeDevis()" class="mt-3 text-xs text-slate-400 w-full hover:text-slate-600">Annuler</button>
        </div>
    </div>

    <div id="adminBar" class="fixed top-0 w-full text-white py-3 px-8 z-[100] justify-between items-center text-[10px] font-bold uppercase tracking-widest">
        <div class="flex items-center space-x-6">
            <span class="text-amber-500">STAFF: <span id="activeUserDisplay"></span></span>
            <button onclick="showView('adminPanel')">PANEL</button>
            <button onclick="showView('publicContent')">SITE</button>
        </div>
        <button id="btnLogout" class="bg-red-600 px-3 py-1 rounded-full hover:bg-red-700 transition">SORTIR</button>
    </div>

    <main id="publicContent" class="view-section active-view">
        <section class="hero-bg flex flex-col items-center justify-center text-center px-6 relative">
            <h1 class="text-white text-5xl md:text-7xl font-serif font-bold mb-4">Arcadia Prestige</h1>
            <p class="text-amber-400 font-bold uppercase tracking-[0.4em] text-[11px] mb-8">L'Excellence Immobilière</p>
            <div class="flex gap-4">
                <a href="#portfolio" class="bg-white text-slate-900 px-8 py-3 rounded-full font-bold text-sm uppercase">Découvrir</a>
                <button onclick="scrollToFavs()" class="bg-amber-600 text-white px-8 py-3 rounded-full font-bold text-sm uppercase relative">
                    Mes Favoris <span id="favCount" class="fav-badge">0</span>
                </button>
            </div>
            <button onclick="openLogin()" class="absolute bottom-4 left-6 text-white/10 text-[9px] hover:text-white/40">STAFF LOGIN</button>
        </section>

        <section id="portfolio" class="py-20 bg-white">
            <div id="allContent" class="container mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-10"></div>
        </section>

        <section id="favSection" class="py-20 bg-slate-900 text-white hidden">
            <div class="container mx-auto px-6">
                <h3 class="text-3xl font-serif font-bold mb-10 text-center">Mes Coups de Cœur ❤️</h3>
                <div id="favContent" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
            </div>
        </section>
    </main>

    <main id="adminPanel" class="view-section pt-24 pb-20 container mx-auto px-6">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10 max-w-6xl mx-auto mb-16">
            <div class="bg-white p-8 rounded-[2rem] shadow-2xl border border-slate-100">
                <h2 class="text-2xl font-serif font-bold mb-6">Publier un nouveau bien</h2>
                <div class="space-y-4">
                    <input type="file" id="fileInput" class="w-full text-xs border p-2 rounded">
                    <input type="text" id="inTitle" placeholder="Nom de la propriété" class="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-amber-500">
                    <input type="text" id="inPrice" placeholder="Prix (ex: 4 500 000 €)" class="w-full p-4 bg-slate-100 rounded-xl outline-none focus:ring-2 ring-amber-500">
                    <button id="btnPublish" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-amber-600 transition">PUBLIER</button>
                </div>
            </div>

            <div class="bg-slate-900 text-white p-8 rounded-[2rem] border border-slate-700 flex flex-col justify-center">
                <p class="text-xs text-slate-400 mb-4 tracking-[0.2em] uppercase text-center">Aperçu en temps réel</p>
                <div id="previewCard" class="bg-[#2b2d31] rounded-2xl p-6 border-l-8 border-amber-600 shadow-2xl">
                    <h4 id="previewTitle" class="font-serif font-bold text-2xl mb-1 italic">Titre du bien</h4>
                    <p id="previewPrice" class="text-amber-500 font-bold text-lg">Prix</p>
                    <img id="previewImg" class="mt-4 rounded-xl w-full h-48 object-cover hidden shadow-lg"/>
                </div>
            </div>
        </div>

        <div class="max-w-6xl mx-auto">
            <h2 class="text-2xl font-serif font-bold mb-6 flex items-center gap-2">
                📬 Boîte de réception <span id="msgCount" class="text-xs bg-amber-600 text-white px-2 py-1 rounded-full">0</span>
            </h2>
            <div id="adminMessages" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>
    </main>

    <div id="loginOverlay" class="fixed inset-0 z-[500] hidden flex items-center justify-center bg-slate-900/90 backdrop-blur-sm">
        <div class="bg-white p-10 rounded-[2rem] w-80 text-center shadow-2xl">
            <h3 class="text-xl font-serif font-bold mb-6">Accès Staff</h3>
            <input type="text" id="userLogin" placeholder="Identifiant" class="w-full p-3 bg-slate-100 rounded mb-3 outline-none">
            <input type="password" id="passLogin" placeholder="Mot de passe" class="w-full p-3 bg-slate-100 rounded mb-6 outline-none">
            <button id="btnLoginAction" class="w-full bg-slate-900 text-white py-3 rounded font-bold">ENTRER</button>
            <button onclick="closeLogin()" class="mt-4 text-[10px] text-slate-400 uppercase">Fermer</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "arcadiaimmobilier-ee335.firebaseapp.com",
            databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arcadiaimmobilier-ee335",
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const get = id => document.getElementById(id);
        const currentUser = sessionStorage.getItem('arcadia_user') || "Admin";
        let globalData = {};

        /* NAVIGATION & AUTH */
        window.showView = (id) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
            get(id).classList.add('active-view');
        };
        window.openLogin = () => get('loginOverlay').classList.remove('hidden');
        window.closeLogin = () => get('loginOverlay').classList.add('hidden');
        window.scrollToFavs = () => get('favSection').scrollIntoView({ behavior: 'smooth' });

        const ACCOUNTS = { "Axel": "Axel30", "Alden": "Alden30" };
        get('btnLoginAction').onclick = () => {
            const u = get('userLogin').value, p = get('passLogin').value;
            if(ACCOUNTS[u] === p){
                sessionStorage.setItem('arcadia_user', u);
                location.reload();
            } else alert("Identifiants incorrects");
        };
        get('btnLogout')?.addEventListener('click', () => {
            sessionStorage.removeItem('arcadia_user');
            location.reload();
        });

        if(sessionStorage.getItem('arcadia_user')){
            document.body.classList.add('is-admin');
            get('activeUserDisplay').innerText = sessionStorage.getItem('arcadia_user');
        }

        /* MESSAGES & REPLIES */
        window.openDevis = () => get('devisBox').classList.remove('hidden');
        window.closeDevis = () => get('devisBox').classList.add('hidden');

        window.sendDevis = () => {
            const name = get('devisName').value, email = get('devisEmail').value, msg = get('devisMsg').value;
            if(!name || !email || !msg) return alert("Champs vides");
            push(ref(db, 'messages'), { name, email, msg, date: new Date().toLocaleString() })
                .then(() => { alert("Envoyé !"); closeDevis(); });
        };

        onValue(ref(db, 'messages'), (snap) => {
            const messages = snap.val() || {};
            const container = get('adminMessages');
            let html = ""; let count = 0;
            
            Object.entries(messages).reverse().forEach(([id, m]) => {
                count++;
                let repliesHtml = "";
                if(m.replies) {
                    Object.values(m.replies).forEach(r => {
                        repliesHtml += `
                        <div class="mt-2 p-3 bg-slate-900 text-white rounded-2xl text-xs ml-8 border-l-2 border-amber-500 shadow-sm">
                            <p class="font-bold text-amber-500 text-[9px] uppercase">MOI (${r.author}) :</p>
                            <p class="mt-1">${r.text}</p>
                        </div>`;
                    });
                }

                html += `
                <div class="bg-white p-6 rounded-[2rem] shadow-lg border border-slate-100 relative mb-4">
                    <button onclick="deleteMsg('${id}')" class="absolute top-6 right-6 text-slate-300 hover:text-red-500 transition">✕</button>
                    <div class="mb-4">
                        <span class="text-[9px] bg-amber-100 text-amber-700 px-3 py-1 rounded-full font-black uppercase">${m.date}</span>
                        <h4 class="font-black text-lg mt-2 text-slate-900">${m.name}</h4>
                        <p class="text-amber-600 text-xs font-bold">${m.email}</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl mb-4 text-slate-700 italic border border-slate-100 text-sm">"${m.msg}"</div>
                    <div id="replies-${id}" class="space-y-2 mb-4">${repliesHtml}</div>
                    <div class="flex gap-2 bg-slate-100 p-2 rounded-2xl border border-slate-200">
                        <input type="text" id="input-${id}" placeholder="Répondre..." class="flex-1 bg-transparent outline-none px-3 text-sm">
                        <button onclick="sendReply('${id}')" class="bg-slate-900 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase">Répondre</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html || "<p class='text-slate-400 text-center py-10'>Aucun message.</p>";
            if(get('msgCount')) get('msgCount').innerText = count;
        });

        window.sendReply = (msgId) => {
            const text = get(`input-${msgId}`).value.trim();
            if(!text) return;
            push(ref(db, `messages/${msgId}/replies`), { author: currentUser.toUpperCase(), text, date: new Date().toLocaleString() })
                .then(() => get(`input-${msgId}`).value = "");
        };

        window.deleteMsg = (id) => { if(confirm("Supprimer ?")) remove(ref(db, `messages/${id}`)); };

        /* PORTFOLIO & FAVS */
        onValue(ref(db, 'content'), (snap) => {
            globalData = snap.val() || {};
            renderAll(); renderFavs();
        });

        function renderAll(){
            let html = "";
            ['villas','creations','articles'].forEach(cat => {
                if(globalData[cat]) Object.entries(globalData[cat]).forEach(([id, item]) => html += createCard(id, item, cat));
            });
            get('allContent').innerHTML = html || "<p class='text-center col-span-3 text-slate-400'>Aucun bien disponible</p>";
        }

        window.createCard = (id, item, cat) => `
            <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden group relative border border-slate-100 transition-all hover:shadow-2xl">
                <button onclick="toggleFav('${id}')" class="absolute top-4 right-4 text-xl z-10 p-2 rounded-full bg-white/80 shadow hover:scale-110 transition">❤️</button>
                <img src="${item.img}" class="h-64 w-full object-cover group-hover:scale-105 transition duration-500">
                <div class="p-8">
                    <span class="text-[9px] font-black text-amber-600 uppercase tracking-widest">${cat}</span>
                    <h4 class="text-2xl font-serif font-bold mt-1">${item.title}</h4>
                    <p class="text-amber-700 font-bold mt-2">${item.price || 'Sur demande'}</p>
                </div>
            </div>`;

        window.toggleFav = (id) => {
            let favs = JSON.parse(localStorage.getItem("favs") || "[]");
            favs = favs.includes(id) ? favs.filter(f => f !== id) : [...favs, id];
            localStorage.setItem("favs", JSON.stringify(favs));
            renderFavs();
        };

        function renderFavs(){
            let favs = JSON.parse(localStorage.getItem("favs") || "[]"), html = "", count = 0;
            ['villas','creations','articles'].forEach(cat => {
                if(globalData[cat]) Object.entries(globalData[cat]).forEach(([id, item]) => {
                    if(favs.includes(id)){ html += createCard(id, item, cat); count++; }
                });
            });
            get('favContent').innerHTML = html; get('favCount').innerText = count;
            get('favSection').classList.toggle('hidden', count === 0);
        }

        /* PUBLISHING */
        let currentImg = "";
        get('inTitle').oninput = e => get('previewTitle').innerText = e.target.value || "Titre";
        get('inPrice').oninput = e => get('previewPrice').innerText = e.target.value || "Prix";
        get('fileInput').onchange = e => {
            const reader = new FileReader();
            reader.onload = () => { currentImg = reader.result; get('previewImg').src = currentImg; get('previewImg').classList.remove('hidden'); };
            reader.readAsDataURL(e.target.files[0]);
        };

        get('btnPublish').onclick = () => {
            const title = get('inTitle').value, price = get('inPrice').value;
            if(!title || !currentImg) return alert("Données manquantes");
            push(ref(db, 'content/villas'), { title, price, img: currentImg }).then(() => location.reload());
        };
    </script>
</body>
</html>
