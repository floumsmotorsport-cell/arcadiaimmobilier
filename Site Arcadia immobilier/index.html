<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia Immobilier | Prestige & Excellence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .hero-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.6)), 
                        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1920&q=80');
            background-size: cover; background-position: center; height: 50vh;
        }
        .view-section { display: none; }
        .active-view { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #adminBar { display: none; background: #0f172a; border-bottom: 2px solid #b45309; }
        .is-admin #adminBar { display: flex; }
        .login-card { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); }
        
        /* Style pour le lecteur de musique */
        .music-player {
            position: fixed; bottom: 20px; right: 20px; z-index: 200;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 12px 20px; border-radius: 50px; border: 1px solid rgba(0,0,0,0.1);
            display: flex; items-center; gap: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="music-player shadow-lg">
        <button id="playPauseBtn" onclick="toggleMusic()" class="bg-amber-600 text-white p-2 rounded-full w-10 h-10 flex items-center justify-center">
            <span id="musicIcon">▶</span>
        </button>
        <div class="flex flex-col">
            <span class="text-[9px] font-black uppercase tracking-widest text-slate-400">Ambiance</span>
            <span class="text-[11px] font-bold text-slate-700">Arcadia Prestige Mix</span>
        </div>
        <audio id="bgMusic" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>
    </div>

    <div id="loginOverlay" class="fixed inset-0 z-[300] hidden flex items-center justify-center bg-slate-900/90 backdrop-blur-sm p-6">
        <div class="login-card w-full max-w-md p-10 rounded-[3rem] shadow-2xl border border-slate-700 text-white text-center">
            <h2 class="text-3xl font-serif font-bold mb-6">Espace Privé</h2>
            <div class="space-y-4">
                <input type="text" id="userLogin" placeholder="Identifiant" class="w-full bg-slate-800/50 p-4 rounded-2xl outline-none border border-slate-700">
                <input type="password" id="passLogin" placeholder="Mot de passe" class="w-full bg-slate-800/50 p-4 rounded-2xl outline-none border border-slate-700">
                <p id="loginError" class="text-red-500 text-[10px] font-bold hidden">Accès refusé.</p>
                <button id="btnLogin" class="w-full bg-amber-600 py-4 rounded-2xl font-bold uppercase">Entrer</button>
                <button onclick="closeLogin()" class="w-full text-slate-500 text-[10px] uppercase">Fermer</button>
            </div>
        </div>
    </div>

    <div id="adminBar" class="fixed top-0 w-full text-white py-3 px-8 z-[100] justify-between items-center text-[10px] font-bold uppercase tracking-widest">
        <div class="flex items-center space-x-6">
            <span class="text-amber-500">SESSION : <span id="activeUserDisplay"></span></span>
            <button onclick="showView('adminPanel')">PANEL DE CONTRÔLE</button>
            <button onclick="showView('publicContent')">VUE CLIENT</button>
        </div>
        <button onclick="logout()" class="bg-red-600 px-4 py-1 rounded-full">Déconnexion</button>
    </div>

    <main id="publicContent" class="view-section active-view">
        <section class="hero-bg flex items-center justify-center relative">
            <h1 class="text-white text-5xl font-serif font-bold tracking-tight">Arcadia Prestige</h1>
            <button onclick="openLogin()" class="absolute bottom-4 right-6 text-white/20 hover:text-white/60 text-[10px] uppercase font-bold">Accès Staff</button>
        </section>
        <section class="container mx-auto py-16 px-6">
            <div id="allContent" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
        </section>
    </main>

    <main id="adminPanel" class="view-section pt-24 pb-20 container mx-auto px-6">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-7 bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100">
                <div class="flex justify-between items-center mb-10">
                    <div class="flex space-x-2">
                        <button onclick="switchTab('V')" id="tabV" class="tab-btn px-6 py-3 rounded-xl font-bold bg-slate-900 text-white text-[10px]">🏠 VILLAS</button>
                        <button onclick="switchTab('C')" id="tabC" class="tab-btn px-6 py-3 rounded-xl font-bold bg-slate-50 text-slate-400 text-[10px]">🛠 CRÉATIONS</button>
                        <button onclick="switchTab('A')" id="tabA" class="tab-btn px-6 py-3 rounded-xl font-bold bg-slate-50 text-slate-400 text-[10px]">📰 ARTICLES</button>
                    </div>
                    <span id="editIndicator" class="hidden text-[10px] font-black text-amber-600 animate-pulse">MODE ÉDITION ACTIF</span>
                </div>
                
                <div class="space-y-6">
                    <div onclick="document.getElementById('fileInput').click()" class="border-2 border-dashed border-slate-200 p-10 rounded-[2rem] text-center cursor-pointer hover:bg-slate-50 transition">
                        <input type="file" id="fileInput" class="hidden" accept="image/*">
                        <p id="fileStatus" class="text-[10px] font-bold text-slate-400 uppercase">Modifier / Ajouter une photo</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col"><label class="text-[9px] font-bold text-slate-400 ml-2 uppercase">Titre</label><input type="text" id="inTitle" class="w-full bg-slate-50 p-4 rounded-xl border"></div>
                        <div class="flex flex-col"><label class="text-[9px] font-bold text-slate-400 ml-2 uppercase">Prix (€)</label><input type="number" id="inPrice" class="w-full bg-slate-50 p-4 rounded-xl border"></div>
                    </div>
                    <div class="flex flex-col"><label class="text-[9px] font-bold text-slate-400 ml-2 uppercase">Description</label><textarea id="inDesc" rows="5" class="w-full bg-slate-50 p-4 rounded-xl border"></textarea></div>
                    
                    <div class="flex gap-4">
                        <button id="btnPublish" class="flex-1 bg-slate-900 text-white py-5 rounded-2xl font-bold uppercase shadow-lg">Mettre en ligne</button>
                        <button id="btnCancelEdit" onclick="cancelEdit()" class="hidden bg-slate-200 text-slate-600 px-8 rounded-2xl font-bold uppercase">Annuler</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div class="sticky top-24">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4">Gestion du catalogue</h3>
                    <div id="adminList" class="bg-white p-6 rounded-3xl shadow-xl max-h-[500px] overflow-y-auto space-y-3 border border-slate-100"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBg9JIb2XAFacftazyDcAXOnCpfvaQ2PYI",
            authDomain: "arcadiaimmobilier-ee335.firebaseapp.com",
            databaseURL: "https://arcadiaimmobilier-ee335-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "arcadiaimmobilier-ee335",
            storageBucket: "arcadiaimmobilier-ee335.firebasestorage.app",
            messagingSenderId: "718967628351",
            appId: "1:718967628351:web:2c60b5bd68916773bdce8a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const ACCOUNTS = { "Axel": "Axel30", "Alden": "Alden30" };
        let currentUser = sessionStorage.getItem('arcadia_user');
        let currentMode = 'V';
        let currentImg = "";
        let editModeId = null; // Stocke l'ID si on est en train de modifier
        let globalData = { villas: {}, creations: {}, articles: {} };

        // --- MUSIQUE ---
        window.toggleMusic = () => {
            const audio = document.getElementById('bgMusic');
            const icon = document.getElementById('musicIcon');
            if (audio.paused) {
                audio.play();
                icon.innerText = "⏸";
            } else {
                audio.pause();
                icon.innerText = "▶";
            }
        };

        // --- NAVIGATION & AUTH ---
        window.openLogin = () => document.getElementById('loginOverlay').classList.remove('hidden');
        window.closeLogin = () => document.getElementById('loginOverlay').classList.add('hidden');
        window.logout = () => { sessionStorage.removeItem('arcadia_user'); location.reload(); };
        window.showView = (id) => {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active-view'));
            document.getElementById(id).classList.add('active-view');
        };

        document.getElementById('btnLogin').onclick = () => {
            const u = document.getElementById('userLogin').value;
            const p = document.getElementById('passLogin').value;
            if (ACCOUNTS[u] === p) {
                sessionStorage.setItem('arcadia_user', u);
                location.reload();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        };

        // --- TABS ---
        window.switchTab = (m) => {
            cancelEdit();
            currentMode = m;
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('bg-slate-900', 'text-white');
                b.classList.add('bg-slate-50', 'text-slate-400');
            });
            document.getElementById('tab' + m).classList.replace('bg-slate-50', 'bg-slate-900');
            document.getElementById('tab' + m).classList.replace('text-slate-400', 'text-white');
            refreshAdminList();
        };

        // --- GESTION IMAGES ---
        document.getElementById('fileInput').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentImg = ev.target.result;
                document.getElementById('fileStatus').innerText = "✅ Image chargée";
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // --- PUBLIER / ÉDITER ---
        document.getElementById('btnPublish').onclick = () => {
            const types = { 'V': 'villas', 'C': 'creations', 'A': 'articles' };
            const typeKey = types[currentMode];
            const title = document.getElementById('inTitle').value;
            const price = document.getElementById('inPrice').value;
            const desc = document.getElementById('inDesc').value;

            if(!title) return alert("Le titre est obligatoire");

            const itemData = { title, price: price || 0, desc, type: typeKey, date: Date.now() };
            if(currentImg) itemData.img = currentImg; // Ne change l'image que si une nouvelle est choisie
            else if (editModeId) itemData.img = globalData[typeKey][editModeId].img; // Garde l'ancienne
            else return alert("Une image est requise !");

            if (editModeId) {
                set(ref(db, `content/${typeKey}/${editModeId}`), itemData).then(() => {
                    alert("Modifié !");
                    cancelEdit();
                });
            } else {
                push(ref(db, `content/${typeKey}`), itemData).then(() => {
                    alert("Publié !");
                    cancelEdit();
                });
            }
        };

        // --- FONCTIONS ÉDITION ---
        window.startEdit = (type, key) => {
            const item = globalData[type][key];
            editModeId = key;
            document.getElementById('inTitle').value = item.title;
            document.getElementById('inPrice').value = item.price;
            document.getElementById('inDesc').value = item.desc;
            document.getElementById('btnPublish').innerText = "Enregistrer les modifications";
            document.getElementById('btnCancelEdit').classList.remove('hidden');
            document.getElementById('editIndicator').classList.remove('hidden');
            document.getElementById('fileStatus').innerText = "📷 Changer la photo (optionnel)";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.cancelEdit = () => {
            editModeId = null;
            document.getElementById('inTitle').value = "";
            document.getElementById('inPrice').value = "";
            document.getElementById('inDesc').value = "";
            currentImg = "";
            document.getElementById('btnPublish').innerText = "Mettre en ligne";
            document.getElementById('btnCancelEdit').classList.add('hidden');
            document.getElementById('editIndicator').classList.add('hidden');
            document.getElementById('fileStatus').innerText = "Ajouter des photos haute résolution";
        };

        window.deleteItem = (type, key) => {
            if(confirm("Supprimer définitivement ?")) remove(ref(db, `content/${type}/${key}`));
        };

        // --- SYNC FIREBASE ---
        onValue(ref(db, 'content'), (snap) => {
            globalData = snap.val() || { villas: {}, creations: {}, articles: {} };
            renderPublic();
            refreshAdminList();
        });

        function renderPublic() {
            const container = document.getElementById('allContent');
            let html = "";
            ['villas', 'creations', 'articles'].forEach(cat => {
                if(globalData[cat]) {
                    Object.values(globalData[cat]).forEach(item => {
                        html += `
                        <div class="bg-white rounded-[3rem] shadow-xl overflow-hidden border border-slate-100 hover:shadow-2xl transition duration-500">
                            <img src="${item.img}" class="h-72 w-full object-cover">
                            <div class="p-10">
                                <span class="text-[9px] font-black text-amber-600 uppercase tracking-widest">${item.type}</span>
                                <h4 class="text-3xl font-serif font-bold text-slate-900">${item.title}</h4>
                                ${item.price > 0 ? `<p class="font-bold text-amber-700 text-xl mt-2">${new Intl.NumberFormat().format(item.price)} €</p>` : ''}
                                <p class="text-slate-500 text-sm mt-4 leading-relaxed">${item.desc}</p>
                            </div>
                        </div>`;
                    });
                }
            });
            container.innerHTML = html || `<p class="col-span-3 text-center text-slate-400 py-20">Catalogue en cours de mise à jour...</p>`;
        }

        function refreshAdminList() {
            const types = { 'V': 'villas', 'C': 'creations', 'A': 'articles' };
            const typeKey = types[currentMode];
            const list = globalData[typeKey] || {};
            const container = document.getElementById('adminList');
            
            let html = "";
            Object.keys(list).forEach(key => {
                html += `
                <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex flex-col gap-3">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <img src="${list[key].img}" class="w-12 h-12 rounded-xl object-cover">
                            <span class="text-[11px] font-bold text-slate-800 uppercase truncate max-w-[150px]">${list[key].title}</span>
                        </div>
                        <span class="text-[9px] font-bold text-slate-400">${new Intl.NumberFormat().format(list[key].price)}€</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="startEdit('${typeKey}', '${key}')" class="flex-1 bg-amber-50 text-amber-700 text-[9px] font-black py-2 rounded-lg hover:bg-amber-100">ÉDITER</button>
                        <button onclick="deleteItem('${typeKey}', '${key}')" class="flex-1 bg-red-50 text-red-600 text-[9px] font-black py-2 rounded-lg hover:bg-red-100">SUPPRIMER</button>
                    </div>
                </div>`;
            });
            container.innerHTML = html || `<p class="text-center text-slate-400 text-[10px] py-10">Aucun élément dans cette catégorie.</p>`;
        }

        if (currentUser) {
            document.body.classList.add('is-admin');
            document.getElementById('activeUserDisplay').innerText = currentUser;
        }
    </script>
</body>
</html>
